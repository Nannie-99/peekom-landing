      function readSettingsForm() {
        const triggerSelect = document.getElementById("triggerSelect");
        const pinToggleSelect = document.getElementById("pinToggleSelect");
        const memoAspectSelect = document.getElementById("memoAspectSelect");
        const langSelect = document.getElementById("langSelect");

        if (triggerSelect) appState.global.triggerMode = triggerSelect.value;
        if (appState.global.triggerMode === "shortcut") {
          appState.global.shortcut = getShortcutInputValue(
            document.getElementById("shortcutInput"),
            "CommandOrControl+Shift+M"
          );
          appState.global.shortcutSlotPrev = getShortcutInputValue(
            document.getElementById("shortcutSlotPrevInput"),
            "CommandOrControl+Shift+Up"
          );
          appState.global.shortcutSlotNext = getShortcutInputValue(
            document.getElementById("shortcutSlotNextInput"),
            "CommandOrControl+Shift+Down"
          );
        }
        const hoverDelayInput = document.getElementById("hoverDelayInput");
        if (hoverDelayInput && appState.global.triggerMode === "hover") {
          const sec = getHoverDelaySecFromInput();
          appState.global.hoverDelayMs = clamp(
            Math.round(sec * 1000),
            HOVER_DELAY_MIN_MS,
            HOVER_DELAY_MAX_MS
          );
        }
        if (pinToggleSelect) appState.global.pinToggleMode = pinToggleSelect.value;
        const panelEdgeSelect = document.getElementById("panelEdgeSelect");
        if (panelEdgeSelect) {
          const nextEdge = panelEdgeSelect.value === "left" ? "left" : "right";
          appState.global.panelEdge = isPremium ? nextEdge : "right";
        }
        if (memoAspectSelect) {
          appState.global.memoAspectRatio = normalizeMemoAspectRatio(memoAspectSelect.value);
        }
        if (langSelect) {
          appState.global.language = langSelect.value;
        }

        const opacityRange = document.getElementById("memoOpacityRange");
        if (opacityRange && isPremium) {
          appState.global.memoDefaultOpacity = clamp(Number(opacityRange.value) || 100, 40, 100);
        }

        for (let s = 0; s < appState.enabledCount; s++) {
          const inp = document.getElementById(`slot${s}Label`);
          if (inp) {
            const chars = Array.from(inp.value);
            appState.slots[s].label = chars.slice(0, LABEL_MAX).join("");
          }

          const ySlotSel = document.getElementById(`slot${s}YSlot`);
          if (ySlotSel && isPremium) {
            const nextY = Number(ySlotSel.value);
            if (nextY !== appState.slots[s].ySlot) {
              appState.slots[s].ySlot = nextY;
              appState.slots[s].ySlotUpdatedAt = Date.now();
            }
          }

          const fontSel = document.getElementById(`slot${s}FontFamily`);
          if (fontSel && isPremium) {
            appState.slots[s].fontFamily = fontSel.value || "";
          }

          const themeGroup = panelHost.querySelector(`[data-theme-group="${s}"]`);
          if (themeGroup) {
            const activeThemeBtn = themeGroup.querySelector(".theme-btn.active");
            if (activeThemeBtn) {
              const themeName = activeThemeBtn.dataset.theme;
              if (THEME_NAMES.includes(themeName)) {
                appState.slots[s].theme = themeName;
              }
            }
          }

          const bgHexInp = document.getElementById(`bgHexInput${s}`);
          const textHexInp = document.getElementById(`textHexInput${s}`);
          const bgColorInp = panelHost.querySelector(`[data-custom-bg="${s}"]`);
          const textColorInp = panelHost.querySelector(`[data-custom-text="${s}"]`);
          const bgVal = (bgHexInp?.value || bgColorInp?.value || "").trim();
          const textVal = (textHexInp?.value || textColorInp?.value || "").trim();
          if (/^#[0-9A-Fa-f]{6}$/.test(bgVal)) appState.slots[s].customBg = bgVal;
          if (/^#[0-9A-Fa-f]{6}$/.test(textVal)) appState.slots[s].customText = textVal;
        }
      }

      function isValidFontOptionName(name) {
        if (typeof name !== "string") return false;
        const trimmed = name.trim();
        if (!trimmed || trimmed.includes("\uFFFD")) return false;
        if (/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/.test(trimmed)) return false;
        if (/^(Regular|Bold|Light|Medium|Semilight|Semibold|Black|Heavy|Thin|Italic)$/i.test(trimmed)) {
          return false;
        }
        if (/(?:^|[\s-])(symbol|symbols|wingdings|webdings|marlett|assets|icons?)(?:$|[\s-])/i.test(trimmed)) {
          return false;
        }
        return Array.from(trimmed).length <= 64;
      }

      async function populateFontSelects() {
        if (!cachedSystemFonts) {
          try {
            const result = await ipcRenderer.invoke("system:list-fonts");
            cachedSystemFonts = (result?.fonts && Array.isArray(result.fonts))
              ? result.fonts.filter(isValidFontOptionName)
              : [];
          } catch {
            cachedSystemFonts = [];
          }
        }
        const fonts = cachedSystemFonts;
        for (let s = 0; s < appState.enabledCount; s++) {
          const sel = document.getElementById(`slot${s}FontFamily`);
          if (!sel || sel.dataset.fontsLoaded) continue;
          sel.dataset.fontsLoaded = "1";
          const current = appState.slots[s].fontFamily || "";
          fonts.forEach((name) => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
          });
          sel.value = current;
          updateFontFamilyPreview(s);
        }
      }

      function buildDisplayLabel(display) {
        const name = display.label || ti("monitorDisplayFallback", { id: display.id });
        return ti("monitorDisplayLabel", {
          name,
          width: display.bounds.width,
          height: display.bounds.height
        });
      }

      async function loadDisplays() {
        const monitorSelect = document.getElementById("monitorSelect");
        if (!monitorSelect) return;
        try {
          const payload = await ipcRenderer.invoke("display:list");
          monitorSelect.innerHTML = "";

          const autoOption = document.createElement("option");
          autoOption.value = "auto";
          autoOption.textContent = ti("monitorAuto");
          monitorSelect.appendChild(autoOption);

          payload.displays.forEach((display) => {
            const option = document.createElement("option");
            option.value = String(display.id);
            option.textContent = buildDisplayLabel(display);
            monitorSelect.appendChild(option);
          });

          const currentVal = payload.windowState.followCursorMode
            ? "auto"
            : String(payload.windowState.targetDisplayId ?? "auto");
          monitorSelect.value = currentVal;

          draftMonitorTarget =
            payload.windowState.followCursorMode ? null : payload.windowState.targetDisplayId;
          if (appState.global.monitorMode === "fixed" && appState.global.monitorTargetId !== null) {
            draftMonitorTarget = appState.global.monitorTargetId;
            monitorSelect.value = String(appState.global.monitorTargetId);
          } else if (appState.global.monitorMode !== "fixed") {
            monitorSelect.value = "auto";
            draftMonitorTarget = null;
          }
        } catch (err) {
          console.error(err);
        }
      }

      async function applyAndSync() {
        if (!applyBtn) return;
        applyBtn.disabled = true;
        try {
          readSettingsForm();

          try {
            await ipcRenderer.invoke("memo:flush");
          } catch {
            /* ignore */
          }

          clearAllSlotLabelErrors();
          for (let s = 0; s < appState.enabledCount; s++) {
            const labelVal = (document.getElementById(`slot${s}Label`)?.value || "").trim();
            if (!labelVal) {
              activeTab = `idx${s}`;
              applyActivePanel();
              showSlotLabelError(s);
              setStatus(ti("indexTitleRequired"), 5000);
              return;
            }
            appState.slots[s].label = Array.from(labelVal).slice(0, LABEL_MAX).join("");
          }

          if (appState.global.triggerMode === "shortcut" && !validateShortcutUniqueness()) {
            setStatus(ti("shortcutOverlapError"), 5000);
            return;
          }

          enforceFreeSlotDefaults();
          resolveYSlotConflicts(appState.slots, appState.enabledCount);

          const payload = {
            anchor: appState.global.anchor,
            lengthMode: appState.global.lengthMode,
            triggerMode: appState.global.triggerMode,
            shortcut: appState.global.shortcut,
            shortcutSlotPrev: appState.global.shortcutSlotPrev,
            shortcutSlotNext: appState.global.shortcutSlotNext,
            manualYOffset: appState.global.manualYOffset,
            panelEdge: isPremium && appState.global.panelEdge === "left" ? "left" : "right"
          };

          try {
            const result = await ipcRenderer.invoke("settings:update", payload);
            if (result?.shortcutStatus?.ok === false) {
              setStatus(ti("statusShortcutFail"), 5000);
              return;
            }
          } catch (err) {
            console.error(err);
            setStatus(ti("statusApplyError"), 5000);
            return;
          }

          try {
            await ipcRenderer.invoke("startup:set", Boolean(appState.global.openAtLogin));
          } catch (err) {
            console.error(err);
          }

          try {
            await ipcRenderer.invoke("window:set-target-display", draftMonitorTarget);
          } catch (err) {
            console.error(err);
          }

          appState.global.monitorMode = draftMonitorTarget === null ? "auto" : "fixed";
          appState.global.monitorTargetId = draftMonitorTarget;
          appState.global.setupCompleted = true;

          await refreshSlotMemosFromDisk();
          const saved = await saveStateAsync({ ...appState, version: 5 });
          if (!saved.json) {
            setStatus(ti("applySyncFail"), 5000);
            return;
          }

          try {
            await ipcRenderer.invoke("settings:notify-applied", {
              skipSettingsReload: true,
              stateJson: saved.json,
              language: appState.global?.language
            });
          } catch (err) {
            console.error(err);
            setStatus(ti("applySyncFail"), 5000);
            return;
          }

          markSettingsLocalMutation();
          applySettingsForm();
          renderTabs();
          syncThemeGroupSelection();
          syncCustomColorVisibility();
          renderAllSlotImageThumbs();
          patchBaseline();
          setStatus(ti("statusApplied"), 2500);
        } catch (err) {
          console.error(err);
          setStatus(ti("statusApplyError"), 5000);
        } finally {
          refreshApplyButton();
        }
      }

      applyBtn?.addEventListener("click", () => {
        void applyAndSync();
      });

      closeBtn.addEventListener("click", () => {
        void requestSettingsClose();
      });

      document.getElementById("unsavedModalCancelBtn")?.addEventListener("click", () => {
        revertToBaseline();
        hideUnsavedModal();
      });

      document.getElementById("unsavedModalApplyBtn")?.addEventListener("click", async () => {
        const shouldClose = pendingCloseAfterApply;
        const targetTab = pendingTabAfterApply;
        hideUnsavedModal();
        await applyAndSync();
        if (shouldClose && !isDirty()) {
          await ipcRenderer.invoke("settings:close-window");
        } else if (targetTab && !isDirty()) {
          performSwitchTab(targetTab);
        }
      });

      async function initialize() {
        appState = await loadStateAsync();
        await syncPremiumState();
        enforceSlotLimits();
        enforceFreeSlotDefaults();
        draftMonitorTarget =
          appState.global.monitorMode === "fixed" ? appState.global.monitorTargetId : null;
        populateLangSelect();
        if (!appState.global.language) {
          appState.global.language = typeof PeekomI18n !== "undefined" ? PeekomI18n.getCurrentLang() : "en";
        }
        if (typeof PeekomI18n !== "undefined") {
          PeekomI18n.setLang(appState.global.language);
        }
        renderTabs();
        renderPanels();
        applySettingsForm();
        applyStaticSettingsLabels();
        measureSettingControlWidth();
        updateSettingsTitle();
        patchBaseline();
        refreshApplyButton();

        const settingsRoot = document.querySelector(".settings-root");
        (settingsRoot || panelHost).addEventListener("click", (e) => {
          const a = e.target.closest("a[data-external-url]");
          if (!a) return;
          e.preventDefault();
          ipcRenderer.invoke("shell:open-external", a.dataset.externalUrl);
        });

        ipcRenderer
          .invoke("startup:get")
          .then((st) => {
            if (st?.ok) {
              appState.global.openAtLogin = st.openAtLogin;
              const cb = document.getElementById("runZoomitOnStartupCheckbox");
              if (cb) cb.checked = Boolean(st.openAtLogin);
              patchBaseline();
              refreshApplyButton();
            }
          })
          .catch(() => {});

        ipcRenderer.on("startup:synced", (_event, payload) => {
          if (!payload || typeof payload.openAtLogin !== "boolean") return;
          appState.global.openAtLogin = payload.openAtLogin;
          const cb = document.getElementById("runZoomitOnStartupCheckbox");
          if (cb) cb.checked = Boolean(payload.openAtLogin);
          patchBaseline();
          refreshApplyButton();
        });
      }

        ipcRenderer.on("state:partial-changed", async (_event, payload = {}) => {
          const fields = Array.isArray(payload?.fields) ? payload.fields : [];
          const isMemoSync =
            fields.includes("memoHtml") || fields.includes("images") || fields.includes("slots");
          if (!isMemoSync && Date.now() < settingsLocalMutationUntil) return;
          const diskState = await loadStateAsync();
          if (!diskState) return;
          const memoOnly =
            fields.length > 0 &&
            fields.every((f) => f === "memoHtml" || f === "images");
          if (!memoOnly && diskState.enabledCount !== appState.enabledCount) {
            await reloadStateFromDisk({ force: true });
            return;
          }
          syncSlotFieldsFromDisk(diskState);
        });

        ipcRenderer.on("state:changed", async () => {
          if (Date.now() < settingsLocalMutationUntil) return;

          const diskState = await loadStateAsync();
          if (!diskState) return;

          if (diskState.enabledCount !== appState.enabledCount) {
            await reloadStateFromDisk({ force: true });
            return;
          }
          if (isDirty()) {
            await reloadStateFromDisk({ fontSizeOnly: true });
            return;
          }
          await reloadStateFromDisk();
        });

        ipcRenderer.on("settings:request-close", () => {
          void requestSettingsClose();
        });

        ipcRenderer.on("premium:changed", async (_e, payload) => {
          isPremium = Boolean(payload?.isPremium);
          enforceSlotLimits();
          if (!isPremium) enforceFreeSlotDefaults();
          prepareSlotRoster();
          updateSettingsTitle();
          updateAppBrandingAssets();
          renderTabs();
          renderPanels();
          applySettingsForm();
          applyPremiumGating();
          patchBaseline();
          refreshApplyButton();
        });

        ipcRenderer.on("premium:show-modal", () => {
          if (typeof PeekomPremiumUI !== "undefined") PeekomPremiumUI.showPremiumModal();
        });

        initialize()
          .then(() => loadDisplays())
          .then(() => {
            patchBaseline();
            refreshApplyButton();
          })
          .catch((err) => console.error(err));
    </script>
  </body>
</html>
