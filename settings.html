<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peekom Settings</title>
    <link rel="icon" id="appFavicon" href="build/icon.ico" type="image/x-icon" />
    <script src="assets/i18n.js"></script>
    <script src="assets/i18n-locale-extra.js"></script>
    <script src="assets/memo-sanitize.js"></script>
    <script src="assets/memo-state-helpers.js"></script>
    <script src="assets/premium-config.js"></script>
    <script src="assets/premium-ui.js"></script>
    <style>
      :root {
        --accent: #0067c0;
        --accent-subtle: rgba(0, 103, 192, 0.08);
        --text: #202020;
        --muted: #616161;
        --border: #e0e0e0;
        --surface: #ffffff;
        --surface-alt: #f9f9f9;
        --canvas: #f3f3f3;
        --danger: #c42b1c;
        --radius: 4px;
        --radius-md: 5px;
        --field-label-width: 112px;
        --field-gap: 6px;
        --setting-control-width: 220px;
        --about-text-offset: 68px;
        --settings-gutter: 10px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--canvas);
        font-family: "Segoe UI Variable", "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
        font-size: 13px;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .settings-root {
        width: 100%;
        height: 100%;
        padding: 6px 6px 5px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        background: var(--canvas);
      }

      .settings-header-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 7px;
        padding: 2px 2px 0;
      }

      .settings-header-left {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }

      .settings-title {
        font-size: 15px;
        font-weight: 600;
        flex-shrink: 0;
        letter-spacing: -0.01em;
      }

      .settings-tier-badge {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
      }

      .settings-root .premium-lock-badge,
      .premium-lock-badge {
        display: inline-flex;
        align-items: center;
        font-size: 11px;
        color: #fff;
        background: #8e44ad;
        font-weight: 500;
        margin-left: 4px;
        padding: 1px 6px;
        border-radius: 4px;
        line-height: 1.35;
        white-space: nowrap;
      }

      .premium-control-locked {
        opacity: 0.72;
        cursor: not-allowed;
      }

      .premium-trigger-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex: 1;
        min-width: 0;
      }

      .slot-image-thumb-box {
        margin-top: 6px;
        padding: 8px;
        border-radius: var(--radius-md);
        background: #eceef1;
        border: 1px solid var(--border);
        min-height: 72px;
      }

      .slot-image-thumb-grid {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        width: 100%;
        align-items: stretch;
      }

      .slot-image-thumb {
        flex: 1 1 0;
        max-width: calc(20% - 5px);
        aspect-ratio: 1;
        min-width: 0;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        background: var(--surface);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .slot-image-thumb-empty {
        width: 100%;
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--muted);
      }

      .color-advanced-btn {
        flex-shrink: 0;
        height: 30px;
        padding: 0 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        cursor: pointer;
        font-size: 11px;
        font-family: inherit;
        color: var(--text);
        white-space: nowrap;
      }
      .color-advanced-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .popover-native-wrap input[type="color"].color-input-hidden {
        position: absolute;
        width: 0;
        height: 0;
        opacity: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .image-lightbox {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: rgba(0, 0, 0, 0.72);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .image-lightbox.hidden {
        display: none;
      }

      .image-lightbox-card {
        background: #fff;
        border-radius: 8px;
        max-width: min(92vw, 720px);
        max-height: 88vh;
        overflow: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .image-lightbox-card img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .image-lightbox-note {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }

      .image-lightbox-close {
        align-self: flex-end;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 4px 10px;
        cursor: pointer;
        font-size: 12px;
      }

      .settings-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .settings-home-link {
        font-size: 11px;
        color: var(--accent);
        text-decoration: none;
      }

      .settings-home-link:hover {
        text-decoration: underline;
      }

      .lang-select-header {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
      }

      .lang-globe-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--muted);
        line-height: 0;
      }

      .lang-globe-icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .lang-select-compact {
        height: 26px;
        padding: 0 6px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 12px;
        font-family: inherit;
        color: var(--text);
        background: var(--surface);
        max-width: 132px;
      }

      .lang-select-compact:focus {
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }

      .settings-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 0;
      }

      .settings-tab-row {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        align-items: center;
        max-height: 58px;
        overflow: hidden;
        padding: 1px 0;
      }

      .settings-tab-wrap {
        position: relative;
        flex: 1 1 calc((100% - 36px) / 6);
        min-width: 0;
        max-width: calc((100% - 36px) / 6);
      }

      .settings-tab-wrap .settings-tab {
        width: 100%;
      }

      .settings-tab {
        flex: 0 1 auto;
        min-width: 0;
        height: 26px;
        padding: 0 6px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 11px;
        font-family: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .settings-tab.settings-tab-common {
        flex: 0 0 28px;
        width: 28px;
        height: 28px;
        min-width: 28px;
        padding: 0;
        border-radius: var(--radius);
        background: var(--surface-alt);
        color: #5c5c5c;
      }

      .settings-tab.settings-tab-common svg {
        display: block;
        width: 15px;
        height: 15px;
      }

      .settings-tab.active {
        border-color: var(--accent);
        background: var(--accent-subtle);
        font-weight: 600;
        color: var(--accent);
      }

      .settings-tab.settings-tab-common.active {
        background: #ebebeb;
        color: #323130;
        border-color: #c8c8c8;
      }

      .settings-tab .tab-color-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.12);
        flex-shrink: 0;
      }

      .settings-tab-wrap:hover .tab-delete-btn {
        opacity: 1;
        pointer-events: auto;
      }

      .tab-delete-btn {
        position: absolute;
        top: -3px;
        right: -3px;
        width: 14px;
        height: 14px;
        border: 1px solid #fff;
        border-radius: 50%;
        background: var(--danger);
        color: #fff;
        font-size: 10px;
        line-height: 1;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .add-tab-btn {
        flex: 0 0 26px;
        width: 26px;
        height: 26px;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 14px;
        cursor: pointer;
        color: var(--muted);
      }

      .add-tab-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-subtle);
      }

      .add-tab-btn[disabled] {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .panel-host {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding-right: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
      }

      .settings-panel {
        display: none;
        flex-direction: column;
        gap: 5px;
        min-height: 0;
        overflow: hidden;
      }

      .settings-panel.active {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .panel-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        gap: 11px;
        padding: 6px 5px 6px 0;
      }

      .panel-scope-intro {
        margin: 0;
        padding: 0 var(--settings-gutter);
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
      }

      .setting-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .field-inline {
        display: flex;
        align-items: center;
        gap: var(--field-gap);
        min-height: 28px;
        padding-left: var(--settings-gutter);
      }

      .field-inline.field-block-nested {
        padding-left: 0;
      }

      .field-inline > label {
        flex: 0 0 var(--field-label-width);
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
      }

      .field-inline > .setting-select,
      .field-inline > .setting-input,
      .field-inline > .font-size-row,
      .field-inline > .hover-delay-stepper,
      .field-inline > .premium-trigger-wrap {
        flex: 0 0 auto;
        width: var(--setting-control-width);
        min-width: 0;
      }

      .field-stack {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding-left: var(--settings-gutter);
      }

      .field-stack .field-inline {
        padding-left: 0;
      }

      .field-hint-below {
        margin: 0;
        padding-left: calc(var(--field-label-width) + var(--field-gap));
        font-size: 11px;
        color: var(--muted);
        line-height: 1.3;
      }

      .font-family-sample {
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 6px 10px;
        background: #eceef1;
        display: flex;
        align-items: center;
        box-sizing: border-box;
        width: var(--setting-control-width);
        height: 60px;
        overflow: hidden;
        margin-left: calc(var(--field-label-width) + var(--field-gap));
        user-select: none;
        pointer-events: none;
      }

      .font-family-sample__text {
        display: block;
        font-size: 15px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }

      .field-error {
        margin: 4px 0 0;
        padding-left: calc(var(--field-label-width) + var(--field-gap));
        font-size: 11px;
        color: #d04646;
        line-height: 1.35;
      }

      .field-error.hidden {
        display: none;
      }

      .setting-input.input-invalid {
        border-color: #d04646;
        box-shadow: 0 0 0 1px rgba(208, 70, 70, 0.25);
      }

      .field-block {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding-left: var(--settings-gutter);
      }

      .field-block.field-block-nested {
        padding-left: 0;
      }

      .field-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }

      .field-block > .setting-select,
      .field-block > .setting-input {
        width: var(--setting-control-width);
      }

      .field-hint {
        margin-left: calc(var(--settings-gutter) + var(--field-label-width) + var(--field-gap));
        font-size: 11px;
        color: var(--muted);
        line-height: 1.3;
      }

      .field-hint.field-hint-flush {
        margin-left: var(--settings-gutter);
      }

      .field-hint.font-size-hint-error {
        color: var(--danger);
      }

      .setting-row > label:not(.setting-checkbox-label) {
        font-size: 12px;
        color: var(--muted);
      }

      .about-card {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 8px;
        padding: 6px 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface-alt);
      }

      .about-logo {
        width: 48px;
        height: 48px;
        border-radius: var(--radius-md);
        flex-shrink: 0;
        object-fit: cover;
        border: 1px solid var(--border);
      }

      .about-body {
        flex: 1;
        min-width: 0;
      }

      .backup-section {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 5px 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        background: var(--surface-alt);
      }

      .backup-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 5px;
      }

      .backup-head-left {
        display: flex;
        align-items: baseline;
        gap: 5px;
        flex-wrap: wrap;
        min-width: 0;
      }

      .backup-section h4 {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }

      .backup-head-hint {
        font-size: 11px;
        color: var(--muted);
      }

      .backup-toggle-btn {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 11px;
        font-family: inherit;
        color: var(--muted);
        padding: 2px 6px;
        cursor: pointer;
        flex-shrink: 0;
      }

      .backup-body.hidden {
        display: none;
      }

      .backup-action-row {
        display: flex;
        gap: 4px;
      }

      .backup-tab-btn {
        flex: 1;
        height: 26px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
      }

      .backup-tab-btn.active {
        border-color: var(--accent);
        background: var(--accent-subtle);
        font-weight: 600;
        color: var(--accent);
      }

      .backup-panel.hidden {
        display: none;
      }

      .export-indices-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px 5px;
        max-height: 120px;
        overflow-y: auto;
        margin: 2px 0;
      }

      .row-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 5px;
      }

      .char-count {
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .setting-checkbox-label {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        cursor: pointer;
        user-select: none;
      }

      .setting-checkbox-label input[type="checkbox"] {
        margin-top: 1px;
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        cursor: pointer;
      }

      .setting-hint {
        font-size: 11px;
        color: var(--muted);
        font-weight: 400;
        margin-top: 1px;
        padding-left: 0;
        line-height: 1.35;
      }

      .setting-hint.indented {
        padding-left: 22px;
      }

      .setting-input,
      .setting-select {
        height: 28px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0 7px;
        font-size: 12px;
        font-family: inherit;
        color: var(--text);
        background: var(--surface);
      }

      .setting-input:focus,
      .setting-select:focus {
        outline: 1px solid var(--accent);
        outline-offset: -1px;
        border-color: var(--accent);
      }

      .setting-input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .setting-input[type="number"]::-webkit-inner-spin-button,
      .setting-input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      #memoOpacityWrap .field-inline {
        overflow: hidden;
        isolation: isolate;
      }

      .theme-group {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 4px;
      }

      .custom-color-row {
        display: grid;
        visibility: hidden;
        pointer-events: none;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        margin-top: 4px;
        min-height: 32px;
      }

      .custom-color-row.visible {
        visibility: visible;
        pointer-events: auto;
      }

      .color-picker-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 11px;
        color: var(--muted);
      }

      .color-picker-label input[type="color"] {
        width: 100%;
        height: 32px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1px;
        cursor: pointer;
        background: var(--surface);
      }

      .export-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .export-item {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .export-btn {
        height: 32px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        text-align: left;
        padding: 0 8px;
      }

      .export-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-subtle);
      }

      .theme-btn {
        height: 30px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
      }

      .theme-btn[data-theme="yellow"] {
        background: #fff4b8;
        color: #2f3750;
      }

      .theme-btn[data-theme="pink"] {
        background: #ffd9e8;
        color: #3b3350;
      }

      .theme-btn[data-theme="blue"] {
        background: #ddebff;
        color: #2b3d5d;
      }

      .theme-btn[data-theme="green"] {
        background: #dcf5de;
        color: #2a4b38;
      }

      .theme-btn-custom {
        background: linear-gradient(90deg, #f66, #fc0, #3c3, #09f, #93c);
        color: #fff;
      }

      .theme-btn.active {
        border-color: var(--accent);
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }

      .delete-row {
        margin-top: 5px;
        padding-top: 7px;
        border-top: 1px solid var(--border);
      }

      .delete-btn {
        height: 32px;
        width: 100%;
        border: 1px solid var(--danger);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--danger);
        font-size: 12px;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .delete-btn[disabled] {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .delete-btn.confirming {
        background: var(--danger);
        color: #fff;
      }

      .delete-warning {
        margin-top: 5px;
        font-size: 12px;
        color: var(--danger);
        line-height: 1.35;
        display: none;
      }

      .delete-warning.visible {
        display: block;
      }

      .settings-action-btn {
        height: 26px;
        min-width: 68px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        color: var(--text);
      }

      .settings-action-btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
      }

      .settings-action-btn.primary[disabled] {
        background: #c8c8c8;
        border-color: #c8c8c8;
        color: #fff;
        cursor: not-allowed;
        opacity: 1;
      }

      .status-text {
        font-size: 11px;
        color: var(--muted);
        min-height: 12px;
      }

      .about-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .about-desc {

    <script>
      const ipcRenderer = {
        invoke: (channel, ...args) => window.peekom.invoke(channel, ...args),
        send: (channel, ...args) => window.peekom.send(channel, ...args),
        sendSync: (channel, ...args) => window.peekom.sendSync(channel, ...args),
        on(channel, listener) {
          return window.peekom.on(channel, (...args) => listener(null, ...args));
        }
      };

      const STATE_KEY = "ppaekkom-plus-state-v5";
      const STATE_KEY_BACKUP = "ppaekkom-plus-state-v5-backup";
      const STATE_KEY_V4 = "ppaekkom-plus-state-v4";
      const LEGACY_V3_KEY = "ppaekkom-app-state-v3";
      const LEGACY_SETTINGS_KEY = "ppaekkom-app-settings-v2";
      const LEGACY_MEMO_KEY = "ppaekkom-memo-html-v2";
      const RECENT_BG_KEY = "ppaekkom-recent-bg";
      const RECENT_TEXT_KEY = "ppaekkom-recent-text";

      const LABEL_MAX = 6;
      const MAX_SLOTS = 10;
      const FREE_MAX_SLOTS = (typeof PeekomPremiumConfig !== "undefined")
        ? PeekomPremiumConfig.FREE_MAX_SLOTS
        : 3;
      const PREMIUM_MAX_SLOTS = (typeof PeekomPremiumConfig !== "undefined")
        ? PeekomPremiumConfig.PREMIUM_MAX_SLOTS
        : 10;
      const CONTACT_EMAIL = (typeof PeekomPremiumConfig !== "undefined")
        ? PeekomPremiumConfig.CONTACT_EMAIL
        : "hello.peekom@gmail.com";
      let isPremium = false;
      const FONT_SIZE_MIN = 8;
      const FONT_SIZE_MAX = 36;
      const HOVER_DELAY_MIN_SEC = 0.1;
      const HOVER_DELAY_MAX_SEC = 10;
      const HOVER_DELAY_STEP_SEC = 0.1;
      const HOVER_DELAY_MIN_MS = 100;
      const HOVER_DELAY_MAX_MS = 10000;
      const THEME_NAMES = ["yellow", "pink", "blue", "green", "custom"];
      const THEME_LABELS = {
        yellow: "노랑",
        pink: "분홍",
        blue: "파랑",
        green: "초록",
        custom: "커스텀"
      };
      const THEME_MAP = {
        yellow: { bg: "#FFF4B8", text: "#2F3750", accent: "#4A79FF" },
        pink: { bg: "#FFD9E8", text: "#3B3350", accent: "#B1457A" },
        blue: { bg: "#DDEBFF", text: "#2B3D5D", accent: "#2F67D8" },
        green: { bg: "#DCF5DE", text: "#2A4B38", accent: "#2A7C44" },
        custom: null
      };

      function clamp(n, a, b) {
        return Math.max(a, Math.min(b, n));
      }

      function normalizeMemoAspectRatio(ratio) {
        return ratio === "1:1" ? "1:1" : "3:4";
      }

      function defaultGlobal() {
        return {
          anchor: "middle",
          lengthMode: "long",
          triggerMode: "hover",
          shortcut: "CommandOrControl+Shift+M",
          shortcutSlotPrev: "CommandOrControl+Shift+Up",
          shortcutSlotNext: "CommandOrControl+Shift+Down",
          hoverDelayMs: 300,
          manualYOffset: 0,
          openAtLogin: false,
          language: null,
          monitorMode: "auto",
          monitorTargetId: null,
          pinToggleMode: "dblclick",
          setupCompleted: false,
          showTrayIcon: true,
          memoAspectRatio: "3:4",
          imageLayout: "below",
          lastOpenedSlotIndex: 0,
          memoDefaultOpacity: 100,
          panelEdge: "right"
        };
      }

      function defaultSlot(index = 0) {
        return {
          label: "",
          theme: "yellow",
          memoHtml: "",
          ySlot: index,
          ySlotUpdatedAt: 0,
          fontSize: 18,
          customBg: "#FFF4B8",
          customText: "#2F3750",
          fontFamily: "",
          imageData: null,
          imageScale: 100,
          images: []
        };
      }

      function normalizeSlotImageEntry(raw) {
        if (!raw || typeof raw !== "object") return null;
        const dataUrl =
          typeof raw.dataUrl === "string" && raw.dataUrl.startsWith("data:image/") ? raw.dataUrl : null;
        if (!dataUrl) return null;
        return {
          id: typeof raw.id === "string" && raw.id ? raw.id : crypto.randomUUID(),
          sourcePath: typeof raw.sourcePath === "string" ? raw.sourcePath : null,
          dataUrl,
          scale:
            typeof raw.scale === "number" && Number.isFinite(raw.scale)
              ? clamp(Math.round(raw.scale), 50, 150)
              : 100,
          insertedAt: typeof raw.insertedAt === "string" ? raw.insertedAt : new Date().toISOString()
        };
      }

      function syncSlotImagesFromMemo(slot) {
        if (!slot) return;
        const parsed = parseImagesFromMemoHtml(slot.memoHtml || "", slot);
        const liveIds = new Set(parsed.map((entry) => entry.id));
        if (!Array.isArray(slot.images)) slot.images = [];
        slot.images = slot.images.filter((entry) => liveIds.has(entry.id));
        parsed.forEach((img) => {
          const idx = slot.images.findIndex((entry) => entry.id === img.id);
          if (idx >= 0) {
            slot.images[idx] = {
              ...slot.images[idx],
              ...img,
              insertedAt: slot.images[idx].insertedAt || img.insertedAt || new Date().toISOString()
            };
          } else {
            slot.images.push({
              ...img,
              insertedAt: img.insertedAt || new Date().toISOString()
            });
          }
        });
        if (!parsed.length) {
          slot.images = [];
          if (slot.imageData) {
            slot.imageData = null;
            slot.imageScale = 100;
          }
        }
      }

      function syncAllSlotsImagesFromMemo() {
        if (!appState?.slots) return;
        for (let i = 0; i < appState.enabledCount; i++) {
          syncSlotImagesFromMemo(appState.slots[i]);
        }
      }

      function syncSlotsImagesFromMemoState(state) {
        if (!state?.slots) return;
        const count = clamp(Math.round(state.enabledCount) || 1, 1, MAX_SLOTS);
        for (let i = 0; i < count; i++) {
          syncSlotImagesFromMemo(state.slots[i]);
        }
      }

      function collectSlotImages(slot) {
        return parseImagesFromMemoHtml(slot?.memoHtml || "", slot);
      }

      function parseImagesFromMemoHtml(memoHtml, slot) {
        const images = [];
        try {
          const doc = new DOMParser().parseFromString(memoHtml || "", "text/html");
          doc.querySelectorAll("img[data-peekom-id]").forEach((img) => {
            const id = img.getAttribute("data-peekom-id");
            const src = img.getAttribute("src") || "";
            if (!id || !src.startsWith("data:image/")) return;
            const meta = (slot?.images || []).find((entry) => entry.id === id);
            const widthStyle = img.getAttribute("style") || "";
            const percentMatch = widthStyle.match(/width:\s*(\d+)%/);
            const pxMatch = widthStyle.match(/width:\s*(\d+)px/);
            const parsedScale = percentMatch
              ? Number(percentMatch[1])
              : pxMatch
                ? Number(pxMatch[1])
                : null;
            images.push(
              meta
                ? {
                    ...meta,
                    dataUrl: src,
                    scale: parsedScale ?? meta.scale,
                    widthPx: pxMatch ? Number(pxMatch[1]) : meta.widthPx
                  }
                : {
                    id,
                    sourcePath: null,
                    dataUrl: src,
                    scale: parsedScale ?? 100,
                    widthPx: pxMatch ? Number(pxMatch[1]) : undefined,
                    insertedAt: ""
                  }
            );
          });
        } catch {
          /* ignore */
        }
        return images;
      }

      function normalizeSlot(raw, index) {
        const base = defaultSlot(index);
        return {
          label: typeof raw?.label === "string" ? raw.label.slice(0, LABEL_MAX) : "",
          theme: THEME_NAMES.includes(raw?.theme) ? raw.theme : "yellow",
          memoHtml: typeof raw?.memoHtml === "string" ? raw.memoHtml : "",
          ySlot:
            typeof raw?.ySlot === "number" && Number.isFinite(raw.ySlot)
              ? clamp(Math.round(raw.ySlot), 0, 9)
              : index,
          ySlotUpdatedAt:
            typeof raw?.ySlotUpdatedAt === "number" && Number.isFinite(raw.ySlotUpdatedAt)
              ? raw.ySlotUpdatedAt
              : 0,
          fontSize:
            typeof raw?.fontSize === "number" && Number.isFinite(raw.fontSize)
              ? clamp(Math.round(raw.fontSize), FONT_SIZE_MIN, FONT_SIZE_MAX)
              : 18,
          customBg:
            typeof raw?.customBg === "string" && /^#[0-9A-Fa-f]{6}$/.test(raw.customBg)
              ? raw.customBg
              : base.customBg,
          customText:
            typeof raw?.customText === "string" && /^#[0-9A-Fa-f]{6}$/.test(raw.customText)
              ? raw.customText
              : base.customText,
          fontFamily: typeof raw?.fontFamily === "string" ? raw.fontFamily : "",
          imageData:
            typeof raw?.imageData === "string" && raw.imageData.startsWith("data:image/")
              ? raw.imageData
              : null,
          imageScale:
            typeof raw?.imageScale === "number" && Number.isFinite(raw.imageScale)
              ? clamp(Math.round(raw.imageScale), 50, 150)
              : 100,
          images: Array.isArray(raw?.images)
            ? raw.images.map(normalizeSlotImageEntry).filter(Boolean)
            : []
        };
      }

      function clampSlotIndex(slot, enabledCount) {
        return clamp(slot, 0, enabledCount - 1);
      }

      function normalizeOrder(order, enabledCount) {
        const base = [];
        for (let i = 0; i < enabledCount; i++) base.push(i);
        if (!Array.isArray(order) || order.length !== enabledCount) return base;
        const set = new Set(order);
        if (set.size !== enabledCount) return base;
        for (let i = 0; i < enabledCount; i++) {
          if (!set.has(i)) return base;
        }
        return order;
      }

      function migrateLegacy() {
        let g = defaultGlobal();
        try {
          const raw = localStorage.getItem(LEGACY_SETTINGS_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            g = { ...g, ...parsed };
          }
        } catch {
          /* ignore */
        }
        const memoHtml = localStorage.getItem(LEGACY_MEMO_KEY) || "";
        const theme = g.theme || "yellow";
        delete g.theme;
        return {
          version: 4,
          global: g,
          enabledCount: 1,
          slots: Array.from({ length: MAX_SLOTS }, (_, i) =>
            i === 0 ? { ...defaultSlot(0), theme, memoHtml } : defaultSlot(i)
          ),
          order: [0],
          activeSlot: 0
        };
      }

      function migrateFromV3(v3) {
        const enabledCount = clamp(Math.round(v3.enabledCount) || 1, 1, MAX_SLOTS);
        const slots = Array.from({ length: MAX_SLOTS }, (_, i) => defaultSlot(i));
        for (let i = 0; i < Math.min(3, MAX_SLOTS); i++) {
          if (v3.slots?.[i]) slots[i] = normalizeSlot(v3.slots[i], i);
        }
        return {
          version: 4,
          global: { ...defaultGlobal(), ...v3.global },
          enabledCount,
          slots,
          order: normalizeOrder(v3.order, enabledCount),
          activeSlot: clampSlotIndex(v3.activeSlot, enabledCount)
        };
      }

      function ensureMinimumOneSlot(state) {
        if (!state.enabledCount || state.enabledCount < 1) {
          state.enabledCount = 1;
          if (!state.slots[0] || typeof state.slots[0].memoHtml !== "string") {
            state.slots[0] = defaultSlot(0);
          }
          state.order = [0];
          state.activeSlot = 0;
        }
        return state;
      }

      function createFreshState() {
        return {
          version: 5,
          global: defaultGlobal(),
          enabledCount: 1,
          slots: Array.from({ length: MAX_SLOTS }, (_, i) => defaultSlot(i)),
          order: [0],
          activeSlot: 0
        };
      }

      function parseStateFromRaw(raw) {
        if (!raw) return null;
        try {
          const s = JSON.parse(raw);
          if (!s || s.version !== 5 || !Array.isArray(s.slots) || s.slots.length !== MAX_SLOTS) return null;
          s.global = { ...defaultGlobal(), ...s.global };
          delete s.global.imageSize;
          s.global.memoAspectRatio = normalizeMemoAspectRatio(s.global.memoAspectRatio);
          s.slots = s.slots.map((sl, i) => normalizeSlot(sl, i));
          s.enabledCount = clamp(Math.round(s.enabledCount) || 1, 1, MAX_SLOTS);
          s.order = normalizeOrder(s.order, s.enabledCount);
          s.activeSlot = clampSlotIndex(s.activeSlot, s.enabledCount);
          syncSlotsImagesFromMemoState(s);
          return ensureMinimumOneSlot(s);
        } catch {
          return null;
        }
      }

      function loadStateFromLocal() {
        const parsed = parseStateFromRaw(localStorage.getItem(STATE_KEY));
        if (parsed) return parsed;

        try {
          const parsedBackup = parseStateFromRaw(localStorage.getItem(STATE_KEY_BACKUP));
          if (parsedBackup) return parsedBackup;
        } catch {
          /* fallthrough */
        }

        try {
          const rawV4 = localStorage.getItem(STATE_KEY_V4);
          if (rawV4) {
            const s = JSON.parse(rawV4);
            if (s && s.version === 4 && Array.isArray(s.slots) && s.slots.length === MAX_SLOTS) {
              s.version = 5;
              s.global = { ...defaultGlobal(), ...s.global };
              delete s.global.imageSize;
              s.global.memoAspectRatio = normalizeMemoAspectRatio(s.global.memoAspectRatio);
              s.slots = s.slots.map((sl, i) => normalizeSlot(sl, i));
              s.enabledCount = clamp(Math.round(s.enabledCount) || 1, 1, MAX_SLOTS);
              s.order = normalizeOrder(s.order, s.enabledCount);
              s.activeSlot = clampSlotIndex(s.activeSlot, s.enabledCount);
              return ensureMinimumOneSlot(s);
            }
          }

          const rawV3 = localStorage.getItem(LEGACY_V3_KEY);
          if (rawV3) {
            const v3 = JSON.parse(rawV3);
            if (v3 && v3.version === 3 && Array.isArray(v3.slots)) {
              return ensureMinimumOneSlot(migrateFromV3(v3));
            }
          }
        } catch {
          /* fallthrough */
        }
        return migrateLegacy();
      }

      async function loadStateAsync() {
        try {
          const res = await ipcRenderer.invoke("shared-state:get");
          if (res?.ok) {
            const parsed = parseStateFromRaw(res.raw) || parseStateFromRaw(res.backup);
            if (parsed) return parsed;
          }
        } catch (err) {
          console.error(err);
        }
        return loadStateFromLocal();
      }

      function loadState() {
        return loadStateFromLocal();
      }

      function saveStateLocal(state) {
        const next = { ...state, version: 5 };
        const json = JSON.stringify(next);
        let prev = null;
        try {
          prev = localStorage.getItem(STATE_KEY);
        } catch {
          /* ignore */
        }
        try {
          localStorage.setItem(STATE_KEY, json);
        } catch (err) {
          try {
            localStorage.removeItem(STATE_KEY_BACKUP);
            localStorage.setItem(STATE_KEY, json);
          } catch (err2) {
            console.error("saveStateLocal failed (storage quota?)", err2);
            return;
          }
        }
        if (prev) {
          try {
            localStorage.setItem(STATE_KEY_BACKUP, prev);
          } catch {
            try {
              localStorage.removeItem(STATE_KEY_BACKUP);
            } catch {
              /* ignore */
            }
          }
        }
      }

      async function saveStateAsync(state) {
        const next = { ...state, version: 5 };
        const json = JSON.stringify(next);
        let syncOk = false;
        for (let attempt = 0; attempt < 2 && !syncOk; attempt++) {
          try {
            const res = await ipcRenderer.invoke("shared-state:set", json);
            syncOk = Boolean(res?.ok);
            if (!syncOk) {
              console.error("shared-state:set failed", res);
            }
          } catch (err) {
            console.error(err);
          }
        }
        saveStateLocal(next);
        return { syncOk, json, state: next };
      }

      async function saveState(state) {
        return saveStateAsync(state);
      }

      async function saveAndNotifyMain(state, options = {}) {
        const { skipSettingsReload = true } = options;
        const saved = await saveStateAsync(state);
        if (!saved.json) {
          return { ok: false, state: saved.state };
        }
        try {
          await ipcRenderer.invoke("settings:notify-applied", {
            skipSettingsReload,
            stateJson: saved.json,
            language: state?.global?.language
          });
        } catch (err) {
          console.error(err);
          return { ok: false, ...saved };
        }
        return { ok: true, json: saved.json, state: saved.state, syncOk: saved.syncOk };
      }

      function mergeSettingsFromPending(target, pending) {
        target.global = { ...target.global, ...pending.global };
        target.enabledCount = pending.enabledCount;
        target.activeSlot = pending.activeSlot;
        target.order = normalizeOrder(pending.order, pending.enabledCount);
        for (let i = 0; i < pending.enabledCount; i++) {
          const src = pending.slots[i];
          const dst = target.slots[i];
          const preservedMemoHtml = pickMemoHtml(dst.memoHtml, src.memoHtml);
          const preservedImages = pickMemoImages(dst.images, src.images);
          dst.label = src.label;
          dst.theme = src.theme;
          dst.ySlot = src.ySlot;
          dst.ySlotUpdatedAt = src.ySlotUpdatedAt;
          dst.fontSize = src.fontSize;
          dst.fontFamily = src.fontFamily;
          dst.customBg = src.customBg;
          dst.customText = src.customText;
          dst.imageScale = src.imageScale;
          if (src.imageData != null) dst.imageData = src.imageData;
          dst.memoHtml = preservedMemoHtml;
          dst.images = preservedImages;
        }
        return target;
      }

      function normalizeActiveTab() {
        if (!activeTab.startsWith("idx")) return;
        const idx = Number(activeTab.slice(3));
        if (!Number.isFinite(idx) || idx >= appState.enabledCount) {
          activeTab = appState.enabledCount > 0 ? `idx${Math.max(0, appState.enabledCount - 1)}` : "common";
        }
      }


      let reloadConfirmOpen = false;
      let suppressExternalReloadUntil = 0;
      let settingsLocalMutationUntil = 0;

      function markSettingsLocalMutation() {
        const until = Date.now() + 8000;
        settingsLocalMutationUntil = until;
        suppressExternalReloadUntil = until;
      }

      function syncSlotFieldsFromDisk(diskState) {
        // 사용자가 설정창에서 편집 중(미저장 변경 존재)이면, 설정창이 소유한 필드
        // (라벨/테마/색/글꼴/ySlot 등)는 디스크 값으로 덮어쓰지 않는다. 그렇지 않으면
        // 메인 창의 메모 저장 알림이 올 때마다 사용자의 편집이 되돌려진다.
        // 메모 본문/이미지는 메인 창이 원본이므로 항상 동기화한다.
        const editing = isDirty();
        const count = Math.min(appState.enabledCount, diskState.enabledCount);
        for (let s = 0; s < count; s++) {
          const src = diskState.slots[s];
          const dst = appState.slots[s];
          dst.memoHtml = src.memoHtml;
          dst.images = Array.isArray(src.images) ? src.images.slice() : [];

          if (!editing) {
            dst.fontSize = src.fontSize;
            dst.ySlot = src.ySlot;
            dst.ySlotUpdatedAt = src.ySlotUpdatedAt;
            dst.label = src.label;
            dst.theme = src.theme;
            dst.customBg = src.customBg;
            dst.customText = src.customText;
            dst.fontFamily = src.fontFamily;

            updateFontDisplay(s);
            const ySlotSel = document.getElementById(`slot${s}YSlot`);
            if (ySlotSel) ySlotSel.value = String(dst.ySlot ?? s);
            const inp = document.getElementById(`slot${s}Label`);
            if (inp) inp.value = getSlotLabelFormValue(s);
            const tabLabel = tabRow.querySelector(`[data-settings-tab="idx${s}"] span:last-child`);
            if (tabLabel) tabLabel.textContent = resolveSlotLabel(dst.label, s);
            const dot = tabRow.querySelector(`[data-settings-tab="idx${s}"] .tab-color-dot`);
            if (dot) {
              dot.style.background =
                dst.theme === "custom" ? dst.customBg || "#fff" : THEME_MAP[dst.theme]?.bg || "#fff";
            }
            const fontSel = document.getElementById(`slot${s}FontFamily`);
            if (fontSel) fontSel.value = dst.fontFamily || "";
          }
        }
        if (!editing) {
          syncThemeGroupSelection();
          syncCustomColorVisibility();
        }
        renderAllSlotImageThumbs();
      }

      async function reloadStateFromDisk(options = {}) {
        const { force = false, fontSizeOnly = false } = options;
        if (Date.now() < suppressExternalReloadUntil) return false;
        if (reloadConfirmOpen) return false;

        const diskState = await loadStateAsync();

        if (fontSizeOnly) {
          const count = Math.min(appState.enabledCount, diskState.enabledCount);
          for (let s = 0; s < count; s++) {
            appState.slots[s].fontSize = diskState.slots[s].fontSize;
            updateFontDisplay(s);
          }
          return true;
        }

        const structuralChange = diskState.enabledCount !== appState.enabledCount;

        if (!force && !structuralChange && isDirty()) {
          reloadConfirmOpen = true;
          let ok = false;
          try {
            ok = confirm(
              ti("stateChangedConfirm")
            );
          } finally {
            reloadConfirmOpen = false;
          }
          if (!ok) {
            suppressExternalReloadUntil = Date.now() + 3000;
            return false;
          }
        }

        appState = diskState;
        draftMonitorTarget =
          appState.global.monitorMode === "fixed" ? appState.global.monitorTargetId : null;
        normalizeActiveTab();
        renderTabs();
        renderPanels();
        applySettingsForm();
        await loadDisplays();
        patchBaseline();
        refreshApplyButton();
        return true;
      }

      function revertToBaseline() {
        try {
          const parsed = JSON.parse(baselineSnapshot);
          appState.global.triggerMode = parsed.triggerMode;
          appState.global.shortcut = parsed.shortcut;
          appState.global.shortcutSlotPrev = parsed.shortcutSlotPrev;
          appState.global.shortcutSlotNext = parsed.shortcutSlotNext;
          appState.global.language = parsed.language;
          appState.global.pinToggleMode = parsed.pinToggleMode;
          appState.global.memoAspectRatio = parsed.memoAspectRatio;
          appState.global.memoDefaultOpacity = parsed.memoDefaultOpacity;
          appState.global.imageLayout = parsed.imageLayout;
          appState.global.hoverDelayMs = parsed.hoverDelayMs;
          appState.global.openAtLogin = parsed.openAtLogin;
          appState.global.showTrayIcon = parsed.showTrayIcon;
          appState.enabledCount = parsed.enabledCount;
          appState.activeSlot = parsed.activeSlot;
          draftMonitorTarget = parsed.monitorTarget;
          parsed.slots.forEach((sl, i) => {
            if (!appState.slots[i]) return;
            Object.assign(appState.slots[i], sl);
          });
          if (typeof PeekomI18n !== "undefined" && appState.global.language) {
            PeekomI18n.setLang(appState.global.language);
          }
          normalizeActiveTab();
          renderTabs();
          renderPanels();
          applySettingsForm();
          refreshApplyButton();
        } catch (err) {
          console.error(err);
        }
      }

      let pendingCloseAfterApply = false;
      let pendingTabAfterApply = null;

      async function requestSettingsClose() {

      async function refreshSlotMemosFromDisk() {
        const diskState = await loadStateAsync();
        if (!diskState || !Array.isArray(diskState.slots)) return;
        const count = Math.min(appState.enabledCount, diskState.enabledCount, MAX_SLOTS);
        for (let i = 0; i < count; i++) {
          if (typeof diskState.slots[i]?.memoHtml === "string") {
            appState.slots[i].memoHtml = diskState.slots[i].memoHtml;
          }
          if (Array.isArray(diskState.slots[i]?.images)) {
            appState.slots[i].images = diskState.slots[i].images.slice();
          }
        }
      }

      async function persistEditableState() {
        await refreshSlotMemosFromDisk();
        return saveStateAsync(appState);
      }

      function htmlToPlainText(html) {
        const div = document.createElement("div");
        div.innerHTML = html || "";
        return div.textContent || "";
      }

      function htmlToMarkdown(html) {
        let md = html || "";
        md = md.replace(/<h1[^>]*>(.*?)<\/h1>/gi, "# $1\n");
        md = md.replace(/<h2[^>]*>(.*?)<\/h2>/gi, "## $1\n");
        md = md.replace(/<h3[^>]*>(.*?)<\/h3>/gi, "### $1\n");
        md = md.replace(/<strong[^>]*>(.*?)<\/strong>/gi, "**$1**");
        md = md.replace(/<b[^>]*>(.*?)<\/b>/gi, "**$1**");
        md = md.replace(/<em[^>]*>(.*?)<\/em>/gi, "*$1*");
        md = md.replace(/<i[^>]*>(.*?)<\/i>/gi, "*$1*");
        md = md.replace(/<li[^>]*>(.*?)<\/li>/gi, "- $1\n");
        md = md.replace(/<\/?ul[^>]*>/gi, "\n");
        md = md.replace(/<br\s*\/?>/gi, "\n");
        md = md.replace(/<div[^>]*>(.*?)<\/div>/gi, "$1\n");
        md = md.replace(/<[^>]+>/g, "");
        return htmlToPlainText(md).trim();
      }

      function hexToRgb(hex) {
        const normalized = String(hex || "").trim().replace("#", "");
        if (!/^[0-9a-fA-F]{6}$/.test(normalized)) return null;
        return {
          r: parseInt(normalized.slice(0, 2), 16),
          g: parseInt(normalized.slice(2, 4), 16),
          b: parseInt(normalized.slice(4, 6), 16)
        };
      }

      function relativeLuminance({ r, g, b }) {
        const srgb = [r, g, b].map((v) => {
          const c = v / 255;
          return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
      }

      function contrastRatio(bgHex, fgHex) {
        const bg = hexToRgb(bgHex);
        const fg = hexToRgb(fgHex);
        if (!bg || !fg) return 21;
        const l1 = relativeLuminance(bg);
        const l2 = relativeLuminance(fg);
        const lighter = Math.max(l1, l2);
        const darker = Math.min(l1, l2);
        return (lighter + 0.05) / (darker + 0.05);
      }

      function updateContrastWarning(slotIndex) {
        const row = panelHost.querySelector(`[data-custom-colors="${slotIndex}"]`);
        if (!row) return;
        let warn = row.querySelector(".contrast-warning");
        const bg = appState.slots[slotIndex].customBg || "#FFF4B8";
        const fg = appState.slots[slotIndex].customText || "#2F3750";
        const ratio = contrastRatio(bg, fg);
        if (ratio >= 4.5) {
          if (warn) warn.remove();
          return;
        }
        if (!warn) {
          warn = document.createElement("p");
          warn.className = "contrast-warning";
          row.appendChild(warn);
        }
        warn.textContent = ti("contrastWarning", { ratio: ratio.toFixed(1) });
      }

      function applyCustomColor(slotIndex, isBg, hex, recordRecent = true) {
        if (isBg) {
          appState.slots[slotIndex].customBg = hex;
          if (recordRecent) saveRecentColor(RECENT_BG_KEY, hex);
          const swatch = document.getElementById(`bgSwatch${slotIndex}`);
          const label = document.getElementById(`bgHexLabel${slotIndex}`);
          const inp = document.querySelector(`[data-custom-bg="${slotIndex}"]`);
          if (swatch) swatch.style.background = hex;
          if (label) label.textContent = hex;
          if (inp) inp.value = hex;
        } else {
          appState.slots[slotIndex].customText = hex;
          if (recordRecent) saveRecentColor(RECENT_TEXT_KEY, hex);
          const swatch = document.getElementById(`textSwatch${slotIndex}`);
          const label = document.getElementById(`textHexLabel${slotIndex}`);
          const inp = document.querySelector(`[data-custom-text="${slotIndex}"]`);
          if (swatch) swatch.style.background = hex;
          if (label) label.textContent = hex;
          if (inp) inp.value = hex;
        }
        appState.slots[slotIndex].theme = "custom";
        syncThemeGroupSelection();
        syncCustomColorVisibility();
        const dotInTab = tabRow.querySelector(`[data-settings-tab="idx${slotIndex}"] .tab-color-dot`);
        if (dotInTab) dotInTab.style.background = appState.slots[slotIndex].customBg;
        updateContrastWarning(slotIndex);
        refreshApplyButton();
      }

      async function onExportSelected() {
        if (showPremiumModalIfFree()) return;
        await refreshSlotMemosFromDisk();
        const format = (document.querySelector('input[name="exportFormat"]:checked') || {}).value || "txt";
        const statusEl = document.getElementById("exportStatusText");

        if (format === "json") {
          const content = JSON.stringify(appState, null, 2);
          try {
            const result = await ipcRenderer.invoke("export:save", { format: "json", content, defaultName: "ppaekkom-plus-backup.json" });
            if (result?.ok) setStatus(ti("exportDone"), 2500);
            else if (!result?.canceled) setStatus(result?.message || ti("exportFail"), 5000);
          } catch (err) { setStatus(ti("exportFail"), 5000); }
          return;
        }

        const checkedIndices = Array.from(document.querySelectorAll(".export-idx-check"))
          .filter(cb => cb.checked)
          .map(cb => Number(cb.dataset.idx));

        if (checkedIndices.length === 0) {
          setStatus(ti("exportSelectOneError"), 3000);
          return;
        }

        let done = 0;
        for (const idx of checkedIndices) {
          if (statusEl) statusEl.textContent = `${done + 1} / ${checkedIndices.length}${ti("exportDoing")}`;
          const memoHtml = appState.slots[idx]?.memoHtml || "";
          const label = appState.slots[idx]?.label || `index${idx + 1}`;
          let content;
          if (format === "md") content = htmlToMarkdown(memoHtml);
          else content = htmlToPlainText(memoHtml);
          try {
            const result = await ipcRenderer.invoke("export:save", { format, content, defaultName: `${label}.${format}` });
            if (!result?.ok && !result?.canceled) { setStatus(result?.message || ti("exportFail"), 5000); return; }
          } catch (err) { setStatus(ti("exportFail"), 5000); return; }
          done++;
        }
        if (statusEl) statusEl.textContent = "";
        setStatus(ti("exportDone"), 2500);
      }

      async function onImportBackup() {
        if (showPremiumModalIfFree()) return;
        const ok = confirm(ti("importConfirm"));
        if (!ok) return;
        try {
          const result = await ipcRenderer.invoke("import:load");
          if (result?.canceled) return;
          if (!result?.ok) { setStatus(ti("importError"), 5000); return; }
          const data = result.data;
          if (!data || !Array.isArray(data.slots) || data.slots.length !== 10) {
            setStatus(ti("importFail"), 5000); return;
          }
          const imported = await saveAndNotifyMain(data);
          if (!imported.ok) {
            setStatus(ti("importSyncFail"), 5000);
          }
          appState = await loadStateAsync();

      function formatHoverDelaySec(sec) {
        return clamp(sec, HOVER_DELAY_MIN_SEC, HOVER_DELAY_MAX_SEC).toFixed(1);
      }

      function sanitizeHoverDelayInputString(raw) {
        let s = String(raw).replace(/[^\d.]/g, "");
        const dot = s.indexOf(".");
        if (dot !== -1) {
          s = s.slice(0, dot + 1) + s.slice(dot + 1).replace(/\./g, "");
        }
        const parts = s.split(".");
        if (parts.length === 2 && parts[1].length > 1) {
          s = `${parts[0]}.${parts[1].slice(0, 1)}`;
        }
        return s;
      }

      function clearHoverDelayError() {
        const err = document.getElementById("hoverDelayError");
        const input = document.getElementById("hoverDelayInput");
        if (err) err.classList.add("hidden");
        if (input) {
          input.classList.remove("input-invalid");
          input.removeAttribute("aria-invalid");
        }
      }

      function showHoverDelayError() {
        const err = document.getElementById("hoverDelayError");
        const input = document.getElementById("hoverDelayInput");
        if (err) {
          err.textContent = ti("hoverDelayRangeError");
          err.classList.remove("hidden");
        }
        if (input) {
          input.classList.add("input-invalid");
          input.setAttribute("aria-invalid", "true");
        }
      }

      function normalizeHoverDelayInput() {
        const input = document.getElementById("hoverDelayInput");
        if (!input) return HOVER_DELAY_MIN_SEC;

        const sanitized = sanitizeHoverDelayInputString(input.value.trim());
        if (sanitized !== input.value) input.value = sanitized;

        const parsed = Number(sanitized);
        if (!sanitized || !Number.isFinite(parsed)) {
          input.value = formatHoverDelaySec(HOVER_DELAY_MIN_SEC);
          clearHoverDelayError();
          return HOVER_DELAY_MIN_SEC;
        }

        const rounded = Math.round(parsed * 10) / 10;
        const outOfRange = rounded < HOVER_DELAY_MIN_SEC || rounded > HOVER_DELAY_MAX_SEC;
        const sec = clamp(rounded, HOVER_DELAY_MIN_SEC, HOVER_DELAY_MAX_SEC);
        input.value = formatHoverDelaySec(sec);
        if (outOfRange) showHoverDelayError();
        else clearHoverDelayError();
        return sec;
      }

      function getHoverDelaySecFromInput() {
        return normalizeHoverDelayInput();
      }

      function stepHoverDelay(deltaSec) {
        const input = document.getElementById("hoverDelayInput");
        if (!input) return;
        const current = normalizeHoverDelayInput();
        const next = Math.round((current + deltaSec) * 10) / 10;
        const clamped = clamp(next, HOVER_DELAY_MIN_SEC, HOVER_DELAY_MAX_SEC);
        input.value = formatHoverDelaySec(clamped);
        clearHoverDelayError();
        refreshApplyButton();
      }

      function bindHoverDelayControls() {
        const input = document.getElementById("hoverDelayInput");
        const decBtn = document.getElementById("hoverDelayDecBtn");
        const incBtn = document.getElementById("hoverDelayIncBtn");
        if (!input || input.dataset.bound) return;
        input.dataset.bound = "1";

        input.addEventListener("input", () => {
          input.value = sanitizeHoverDelayInputString(input.value);
          const trimmed = input.value.trim();
          if (!trimmed || trimmed.endsWith(".")) {
            clearHoverDelayError();
            refreshApplyButton();
            return;
          }
          const parsed = Number(trimmed);
          if (!Number.isFinite(parsed)) {
            refreshApplyButton();
            return;
          }
          if (parsed > HOVER_DELAY_MAX_SEC) {
            input.value = formatHoverDelaySec(HOVER_DELAY_MAX_SEC);
            showHoverDelayError();
          } else if (parsed < HOVER_DELAY_MIN_SEC) {
            input.value = formatHoverDelaySec(HOVER_DELAY_MIN_SEC);
            showHoverDelayError();
          } else {
            clearHoverDelayError();
          }
          refreshApplyButton();
        });

        input.addEventListener("blur", () => {
          normalizeHoverDelayInput();
          refreshApplyButton();
        });

        if (decBtn && !decBtn.dataset.bound) {
          decBtn.dataset.bound = "1";
          decBtn.addEventListener("click", () => stepHoverDelay(-HOVER_DELAY_STEP_SEC));
        }
        if (incBtn && !incBtn.dataset.bound) {
          incBtn.dataset.bound = "1";
          incBtn.addEventListener("click", () => stepHoverDelay(HOVER_DELAY_STEP_SEC));
        }
      }

      function packFreeYSlots() {
        if (isPremium) return false;
        const ec = appState.enabledCount;
        if (ec <= 0) return false;
        const ord = appState.order.slice(0, ec);
        const minY = Math.min(...ord.map((si) => appState.slots[si].ySlot ?? 0));
        const baseY = clamp(minY, 0, 9 - ec + 1);
        const now = Date.now();
        let changed = false;
        ord.forEach((si, i) => {
          const next = baseY + i;
          if (appState.slots[si].ySlot !== next) changed = true;
          appState.slots[si].ySlot = next;
          appState.slots[si].ySlotUpdatedAt = now;
        });
        return changed;
      }

      function enforceFreeSlotDefaults() {
        if (isPremium) return;
        for (let i = 0; i < appState.enabledCount; i++) {
          appState.slots[i].fontSize = 18;
          appState.slots[i].fontFamily = "";
        }
        if (appState.global) {
          appState.global.memoDefaultOpacity = 100;
          appState.global.panelEdge = "right";
        }
        packFreeYSlots();
      }

      function assignNextFreeYSlot(slots, enabledCount, slotIndex) {
        const occupied = new Set();
        for (let i = 0; i < enabledCount; i++) {
          if (i === slotIndex) continue;
          occupied.add(clamp(slots[i].ySlot ?? i, 0, 9));
        }
        let free = 0;
        while (occupied.has(free) && free < 10) free++;
        slots[slotIndex].ySlot = free < 10 ? free : clamp(slotIndex, 0, 9);
        slots[slotIndex].ySlotUpdatedAt = Date.now();
      }

      function prepareSlotRoster() {
        const ec = appState.enabledCount;
        appState.order = normalizeOrder(appState.order, ec);
        resolveYSlotConflicts(appState.slots, ec);
      }

      function resolveYSlotConflicts(slots, enabledCount) {
        if (!isPremium) {
          packFreeYSlots();
          return;
        }
        const entries = [];
        for (let i = 0; i < enabledCount; i++) {
          entries.push({
            slot: i,
            ySlot: clamp(slots[i].ySlot ?? i, 0, 9),
            at: slots[i].ySlotUpdatedAt ?? 0
          });
        }
        entries.sort((a, b) => b.at - a.at);
        const occupied = new Set();
        const displaced = [];
        for (const e of entries) {
          if (!occupied.has(e.ySlot)) {
            occupied.add(e.ySlot);
            slots[e.slot].ySlot = e.ySlot;
          } else {
            displaced.push(e.slot);
          }
        }
        for (const slot of displaced) {
          let free = 0;
          while (occupied.has(free) && free < 10) free++;
          const assigned = free < 10 ? free : clamp(slot, 0, 9);
          occupied.add(assigned);
          slots[slot].ySlot = assigned;
          if (!slots[slot].ySlotUpdatedAt) {

        for (let i = 0; i < appState.enabledCount; i++) {
          const label = resolveSlotLabel(appState.slots[i].label, i);
          html += `<label class="export-check-row"><input type="checkbox" class="export-idx-check" data-idx="${i}" checked />${label}</label>`;

      function measureSettingControlWidth() {
        const samples = [
          ti("triggerHover"),
          ti("triggerShortcut"),
          ti("pinToggleDblclickDefault"),
          ti("monitorAuto"),
          ti("memoAspectSquare"),
          ti("memoAspectPortrait")
        ];
        const probe = document.createElement("span");
        probe.style.cssText = "position:absolute;visibility:hidden;white-space:nowrap;font-size:14px;padding:0 8px;";
        document.body.appendChild(probe);
        let maxW = 180;
        samples.forEach((t) => {
          probe.textContent = t;
          maxW = Math.max(maxW, probe.offsetWidth + 28);
        });
        document.body.removeChild(probe);
        document.documentElement.style.setProperty("--setting-control-width", `${Math.min(240, maxW)}px`);
      }

      function getMaxEnabledSlots() {
        return isPremium ? MAX_SLOTS : FREE_MAX_SLOTS;
      }

      function enforceSlotLimits() {
        const max = getMaxEnabledSlots();
        if (appState.enabledCount > max) {
          appState.enabledCount = max;
          appState.order = normalizeOrder(appState.order, max);
          appState.activeSlot = clampSlotIndex(appState.activeSlot, max);
        }
      }

      async function syncPremiumState() {
        try {
          const p = await ipcRenderer.invoke("premium:get");
          isPremium = Boolean(p.isPremium);

          isPremium = false;

      }

        const titleEl = document.getElementById("settingsTitle");
        const lang = appState.global.language || (typeof PeekomI18n !== "undefined" ? PeekomI18n.getCurrentLang() : "en");
        const prefix = isPremium
          ? (lang === "ko" ? ti("settingsTitlePlusKo") : ti("settingsTitlePlus"))
          : (lang === "ko" ? ti("settingsTitleFreeKo") : ti("settingsTitleFree"));
        const tier = isPremium ? ti("settingsTierPaid") : ti("settingsTierFree");
        if (titleEl) {

      function applyPremiumGating() {
        const backupBadge = document.getElementById("backupPremiumBadge");
        if (backupBadge) backupBadge.hidden = isPremium;

        const opacityBadge = document.getElementById("opacityPremiumBadge");
        if (opacityBadge) opacityBadge.hidden = isPremium;

        const opacityRange = document.getElementById("memoOpacityRange");
        const opacityMaxLabel = document.getElementById("memoOpacityMaxLabel");
        const opacityWrap = document.getElementById("memoOpacityTriggerWrap");
        if (opacityRange) {
          if (!isPremium) {
            opacityRange.value = "100";
            opacityRange.disabled = true;
            opacityRange.style.pointerEvents = "none";
          } else {
            opacityRange.disabled = false;
            opacityRange.style.pointerEvents = "";
          }
        }
        if (opacityMaxLabel) opacityMaxLabel.textContent = "100%";
        if (opacityWrap) {
          opacityWrap.toggleAttribute("data-premium-trigger", !isPremium);
        }

        const panelEdgeSel = document.getElementById("panelEdgeSelect");
        const panelEdgeBadge = document.getElementById("panelEdgePremiumBadge");
        const panelEdgeWrap = document.getElementById("panelEdgeTriggerWrap");
        if (panelEdgeSel) {
          panelEdgeSel.classList.toggle("premium-control-locked", !isPremium);
          panelEdgeSel.style.pointerEvents = isPremium ? "" : "none";
          if (!isPremium) panelEdgeSel.value = "right";
        }
        if (panelEdgeBadge) panelEdgeBadge.hidden = isPremium;
        if (panelEdgeWrap) panelEdgeWrap.toggleAttribute("data-premium-trigger", !isPremium);

        for (let s = 0; s < (appState?.enabledCount || 0); s++) {
          const ySlotSel = document.getElementById(`slot${s}YSlot`);
          const ySlotBadge = document.getElementById(`slot${s}YSlotBadge`);
          const ySlotWrap = document.getElementById(`slot${s}YSlotWrap`);
          if (ySlotSel) {
            ySlotSel.classList.toggle("premium-control-locked", !isPremium);
            ySlotSel.style.pointerEvents = isPremium ? "" : "none";
            if (!isPremium) ySlotSel.value = String(appState.slots[s]?.ySlot ?? s);
          }
          if (ySlotBadge) ySlotBadge.hidden = isPremium;
          if (ySlotWrap) ySlotWrap.toggleAttribute("data-premium-trigger", !isPremium);
        }

        const backupBody = document.getElementById("backupBody");
        const backupToggle = document.getElementById("backupToggleBtn");
        if (backupBody && !isPremium) {
          backupBody.classList.add("hidden");
          if (backupToggle) {
            backupToggle.setAttribute("aria-expanded", "false");
            backupToggle.textContent = ti("backupExpand");
          }
        }
        if (backupToggle) {
          backupToggle.toggleAttribute("data-premium-trigger", !isPremium);
        }
        document.querySelectorAll("#backupBody [data-premium-trigger-backup]").forEach((el) => {
          el.toggleAttribute("data-premium-trigger", !isPremium);
        });

        document.querySelectorAll("[data-font-dec], [data-font-inc]").forEach((btn) => {
          btn.disabled = !isPremium;
          btn.toggleAttribute("data-premium-trigger", !isPremium);
        });
        for (let s = 0; s < (appState?.enabledCount || 0); s++) {
          const fontSel = document.getElementById(`slot${s}FontFamily`);
          const fontFamilyWrap = document.getElementById(`slot${s}FontFamilyWrap`);
          if (fontSel) {
            fontSel.classList.toggle("premium-control-locked", !isPremium);
            fontSel.style.pointerEvents = isPremium ? "" : "none";
            if (!isPremium) fontSel.value = "";
          }
          if (fontFamilyWrap) {
            fontFamilyWrap.toggleAttribute("data-premium-trigger", !isPremium);
          }
          const fontDisplay = document.getElementById(`slot${s}FontDisplay`);
          if (fontDisplay) {
            fontDisplay.classList.toggle("premium-control-locked", !isPremium);
            fontDisplay.toggleAttribute("data-premium-trigger", !isPremium);
          }
          const fontSizeBadge = document.getElementById(`slot${s}FontSizeBadge`);
          if (fontSizeBadge) fontSizeBadge.hidden = isPremium;
          const fontFamilyBadge = document.getElementById(`slot${s}FontFamilyBadge`);
          if (fontFamilyBadge) fontFamilyBadge.hidden = isPremium;
        }

        document.querySelectorAll(".theme-btn[data-theme='custom']").forEach((btn) => {
          btn.classList.toggle("premium-control-locked", !isPremium);
          btn.toggleAttribute("data-premium-trigger", !isPremium);
        });

        syncCustomColorVisibility();
      }

      function bindPremiumTriggers() {

            e.preventDefault();

          true
        );
      }

      async function onAddIndex() {
        if (!isPremium && appState.enabledCount >= FREE_MAX_SLOTS) {
          showPremiumModalIfFree();
          return;

        const max = getMaxEnabledSlots();
        if (appState.enabledCount >= max) {
          return;
        }
        markSettingsLocalMutation();
        readSettingsForm();
        const newSlotIndex = appState.enabledCount;
        appState.slots[newSlotIndex] = {
          ...defaultSlot(newSlotIndex),
          label: resolveSlotLabel("", newSlotIndex)
        };
        appState.enabledCount += 1;
        appState.order = normalizeOrder(appState.order, appState.enabledCount);
        appState.global.setupCompleted = true;
        if (isPremium) {
          assignNextFreeYSlot(appState.slots, appState.enabledCount, newSlotIndex);
        } else {
          packFreeYSlots();
        }
        prepareSlotRoster();
        const saved = await saveAndNotifyMain(appState);
        if (!saved.ok) {
          setStatus(ti("indexAddSyncFail"), 5000);
          await reloadStateFromDisk({ force: true });
          return;
        }
        patchBaseline();
        activeTab = `idx${newSlotIndex}`;
        renderTabs();
        renderPanels();
        applySettingsForm();
        refreshApplyButton();

      async function performDelete(slotIndex) {
        if (slotIndex < 0 || slotIndex >= appState.enabledCount) return;
        if (appState.enabledCount <= 1) return;

        markSettingsLocalMutation();
        readSettingsForm();

        for (let i = slotIndex; i < MAX_SLOTS - 1; i++) {
          appState.slots[i] = appState.slots[i + 1];
        }
        appState.slots[MAX_SLOTS - 1] = defaultSlot(MAX_SLOTS - 1);
        appState.enabledCount -= 1;
        if (appState.enabledCount < 1) appState.enabledCount = 1;
        appState.order = normalizeOrder(appState.order, appState.enabledCount);
        appState.activeSlot = clampSlotIndex(appState.activeSlot, appState.enabledCount);
        appState.global.setupCompleted = true;

        try {
          const saved = await saveAndNotifyMain(appState, { skipSettingsReload: true });
          if (!saved.ok) {
            setStatus(ti("deleteSyncFail"), 5000);
            await reloadStateFromDisk({ force: true });
            return;
          } else {
            setStatus(ti("indexDeleted"), 2500);
            patchBaseline();

        } catch (err) {
          console.error(err);
          setStatus(ti("deleteSyncFail"), 5000);
        } finally {
          normalizeActiveTab();
          activeTab = "common";
          renderTabs();
          renderPanels();
          applySettingsForm();
          refreshApplyButton();
        }
      }

      function formatShortcutDisplay(accelerator) {
        return String(accelerator || "").replace(/CommandOrControl/g, "Ctrl");
      }

      function formatAcceleratorFromEvent(event) {
        if (event.key === "Escape") return null;
        const mods = [];
        if (event.ctrlKey || event.metaKey) mods.push("CommandOrControl");
        if (event.altKey) mods.push("Alt");
        if (event.shiftKey) mods.push("Shift");
        const key = event.key;
        if (["Control", "Shift", "Alt", "Meta"].includes(key)) return null;
        let keyName = key;
        if (key === " ") keyName = "Space";
        else if (key.length === 1) keyName = key.toUpperCase();
        mods.push(keyName);
        if (mods.length < 2) return null;
        return mods.join("+");
      }

      function bindShortcutCapture(input, onCaptured) {
        if (!input || input.dataset.shortcutBound) return;
        input.dataset.shortcutBound = "1";
        input.readOnly = true;
        input.addEventListener("focus", () => {
          input.dataset.recording = "1";
          input.placeholder = ti("shortcutCapturePlaceholder");
        });
        input.addEventListener("blur", () => {
          delete input.dataset.recording;
          if (!input.value) input.placeholder = ti("shortcutCapturePlaceholder");
        });
        input.addEventListener("keydown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (event.key === "Escape") {
            input.blur();
            return;
          }
          const acc = formatAcceleratorFromEvent(event);
          if (!acc) return;
          onCaptured(acc);
          input.value = formatShortcutDisplay(acc);
          input.dataset.accelerator = acc;
          input.blur();
          refreshApplyButton();
        });
      }

      function setShortcutInputValue(input, accelerator) {
        if (!input) return;
        const acc = accelerator || "";
        input.dataset.accelerator = acc;
        input.value = formatShortcutDisplay(acc);
      }

      function getShortcutInputValue(input, fallback) {
        if (!input) return fallback;
        return input.dataset.accelerator || input.value.trim() || fallback;
      }

      function validateShortcutUniqueness() {
        const toggle = getShortcutInputValue(
          document.getElementById("shortcutInput"),
          appState.global.shortcut
        );

          appState.global.shortcutSlotPrev
        );
        const next = getShortcutInputValue(
          document.getElementById("shortcutSlotNextInput"),
          appState.global.shortcutSlotNext
        );
        const values = [toggle, prev, next].map((v) => v.toLowerCase());
        return new Set(values).size === values.length;
      }

      // 최근 색상 관리
      function loadRecentColors(key) {
        try {
          const raw = JSON.parse(localStorage.getItem(key) || "[]");
          if (!Array.isArray(raw)) return [];
          return raw
            .filter((c) => typeof c === "string" && /^#[0-9A-Fa-f]{6}$/.test(c))
            .slice(0, 7);
        } catch {
          return [];
        }
      }
      function saveRecentColor(key, hex) {
        const normalized = String(hex || "").trim().toUpperCase();
        if (!/^#[0-9A-F]{6}$/.test(normalized)) return;
        const list = loadRecentColors(key).filter((c) => c.toUpperCase() !== normalized);
        list.unshift(normalized);
        localStorage.setItem(key, JSON.stringify(list.slice(0, 7)));
      }
      function renderRecentColors(gridEl, hex, onPick) {
        const list = loadRecentColors(gridEl.id.includes("bg") ? RECENT_BG_KEY : RECENT_TEXT_KEY);
        gridEl.innerHTML = "";
        if (list.length === 0) {
          gridEl.innerHTML = `<span style="font-size:11px;color:var(--muted)">${ti("recentColorsEmpty")}</span>`;
          return;
        }
        list.forEach(color => {
          const sw = document.createElement("button");
          sw.type = "button";
          sw.className = "recent-color-swatch";
          sw.style.background = color;
          sw.title = color;
          sw.addEventListener("click", () => onPick(color));
          gridEl.appendChild(sw);
        });
      }

      function bindColorScreenInputs() {
        panelHost.querySelectorAll("[data-custom-bg], [data-custom-text]").forEach((inp) => {
          if (inp.dataset.inputBound) return;
          inp.dataset.inputBound = "1";
          const isBg = inp.hasAttribute("data-custom-bg");
          const slotIndex = Number(isBg ? inp.dataset.customBg : inp.dataset.customText);
          inp.addEventListener("input", () => {
            applyCustomColor(slotIndex, isBg, inp.value, false);
          });
          inp.addEventListener("change", () => {
            applyCustomColor(slotIndex, isBg, inp.value, true);
          });
        });

        panelHost.querySelectorAll("[data-color-advanced]").forEach((btn) => {
          if (btn.dataset.advancedBound) return;
          btn.dataset.advancedBound = "1";
          const key = btn.dataset.colorAdvanced;
          const isBg = key.startsWith("bg-");
          const slotIndex = Number(key.split("-")[1]);
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (showPremiumModalIfFree()) return;
            const inp = panelHost.querySelector(
              isBg ? `[data-custom-bg="${slotIndex}"]` : `[data-custom-text="${slotIndex}"]`
            );
            if (!inp) return;
            const popoverId = isBg ? `bgPopover${slotIndex}` : `textPopover${slotIndex}`;
            // 현재 색을 picker 초기값으로 맞춤
            const currentHex = isBg
              ? (appState.slots[slotIndex].customBg || "#FFF4B8")
              : (appState.slots[slotIndex].customText || "#2F3750");
            inp.value = currentHex;

            let restored = false;
            const finishRestore = () => {
              if (restored) return;
              restored = true;
              ipcRenderer.invoke("color:restore-advanced-picker").catch(() => {});
            };
            // 색을 실제로 고르면 input/change 이벤트로 적용 (bindColorScreenInputs의
            // input 핸들러가 applyCustomColor를 호출). 여기서는 picker가 닫힐 때
            // 창을 복원하고 HEX 라벨/입력칸을 최신값으로 갱신한다.
            const onChange = () => {
              applyCustomColor(slotIndex, isBg, inp.value);
              const hexInput = document.getElementById(
                isBg ? `bgHexInput${slotIndex}` : `textHexInput${slotIndex}`
              );
              if (hexInput) hexInput.value = inp.value;
              finishRestore();
              inp.removeEventListener("change", onChange);
            };
            inp.addEventListener("change", onChange);

            try {
              await ipcRenderer.invoke("color:prepare-advanced-picker");
              if (typeof inp.showPicker === "function") {
                inp.showPicker();
              } else {
                inp.click();
              }
            } catch {
              finishRestore();
              inp.removeEventListener("change", onChange);
            }
            // picker는 별도 창이므로, 일정 시간 뒤 사용자가 취소했더라도 창 복원 보장
            setTimeout(finishRestore, 15000);
          });
        });
      }
