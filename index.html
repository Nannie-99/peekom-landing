        const mode = appState.global.pinToggleMode || "dblclick";
        if (mode === "dblclick") {
          setPinned(!isPinned);
        }
      });

      // 설정 아이콘 호버 노출 기능 제거: 펼침 상태에서 고정 표시

      memoEditor.addEventListener("focus", () => {
        memoEditorFocused = true;
        refreshAutoCollapsePolicy();
      });

      memoEditor.addEventListener("blur", () => {
        memoEditorFocused = false;
        normalizeMemoTypography(appState.activeSlot, { preserveCaret: false });
        persistActiveMemo();
        refreshAutoCollapsePolicy();
      });

      memoEditor.addEventListener("input", (event) => {
        const lineEl = getCurrentLineElement();
        if (lineEl && lineMayHaveInlineMarkdown(lineEl)) {
          if (markdownInputRaf) cancelAnimationFrame(markdownInputRaf);
          markdownInputRaf = requestAnimationFrame(() => {
            markdownInputRaf = null;
            processMarkdownInput();
          });
        }
        persistActiveMemo();
        scheduleUrlScan();
        updateToolbarActiveState();
      });

      memoEditor.addEventListener("keydown", (event) => {
        if (event.key === "Backspace" || event.key === "Delete") {
          const sel = window.getSelection();
          if (sel && sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            const img =
              range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
                ? range.commonAncestorContainer.closest?.(".peekom-memo-image")
                : range.commonAncestorContainer.parentElement?.closest?.(".peekom-memo-image");
            if (img && memoEditor.contains(img)) {
              event.preventDefault();
              const wrap = img.closest(".peekom-image-wrap");
              (wrap || img).remove();
              persistActiveMemo();
              return;
            }
          }
        }
        if (event.key !== "Enter" || event.shiftKey) return;
        handleMarkdownEnter(event);
      });

      memoEditor.addEventListener(
        "wheel",
        (event) => {
          if (!event.ctrlKey && !event.metaKey) return;
          if (!isPremium) {
            event.preventDefault();
            window.PeekomPremiumUI?.showPremiumModal();
            return;
          }
          event.preventDefault();
          adjustFontSize(event.deltaY < 0 ? 1 : -1);
        },
        { passive: false }
      );

      memoEditor.addEventListener("paste", () => {
        setTimeout(() => {
          normalizeMemoTypography(appState.activeSlot, { preserveCaret: true });
          scanAndLinkifyEditor();
          persistActiveMemo();
        }, 0);
      });

      memoEditor.addEventListener("click", (event) => {
        const check = event.target.closest(".peekom-task-check");
        if (check && memoEditor.contains(check)) {
          event.preventDefault();
          const li = check.closest("li");
          if (li) {
            const checked = li.getAttribute("data-checked") === "true";
            const next = !checked;
            li.setAttribute("data-checked", String(next));
            check.setAttribute("aria-checked", String(next));
            persistActiveMemo();
            showSaveIndicator();
          }
          return;
        }
        const link = event.target.closest("a[data-external]");
        if (!link) return;
        event.preventDefault();
        const href = link.getAttribute("href");
        if (href) {
          ipcRenderer.invoke("shell:open-external", href).catch((err) => console.error(err));
        }
      });

      const toolbarButtons = Array.from(document.querySelectorAll(".tool-btn[data-cmd]"));
      toolbarButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          executeCmd(button.dataset.cmd);
          updateToolbarActiveState();
        });
      });

      document.querySelectorAll("[data-align]").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          executeCmd(btn.dataset.align);
          closeToolbarDropdowns();
          updateToolbarActiveState();
        });
      });

      function getSelectionNodeInEditor() {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return null;
        let node = sel.anchorNode;
        if (!node) return null;
        if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
        if (!node || !memoEditor.contains(node)) return null;
        return node;
      }

      function removeListFormatting() {
        const node = getSelectionNodeInEditor();
        if (!node) return;
        const list = node.closest("ul, ol");
        if (!list || !memoEditor.contains(list)) return;
        const items = Array.from(list.querySelectorAll(":scope > li"));
        const frag = document.createDocumentFragment();
        items.forEach((li) => {
          const p = document.createElement("p");
          while (li.firstChild) p.appendChild(li.firstChild);
          if (!p.textContent.trim() && !p.querySelector("img, br")) p.appendChild(document.createElement("br"));
          frag.appendChild(p);
        });
        list.parentNode?.replaceChild(frag, list);
      }

      function applyListStyle(style) {
        memoEditor.focus();
        if (style === "plain") {
          removeListFormatting();
          return;
        }

        const node = getSelectionNodeInEditor();
        const ul = node?.closest("ul:not(.peekom-task-list)");
        const ol = node?.closest("ol");

        if (style === "ordered") {
          if (ol) return;
          if (ul) {
            document.execCommand("insertOrderedList", false, null);
            return;
          }
          document.execCommand("insertOrderedList", false, null);
          return;
        }

        const wantSquare = style === "square";
        if (ul) {
          ul.classList.toggle("peekom-list-square", wantSquare);
          return;
        }
        if (ol) {
          document.execCommand("insertOrderedList", false, null);
        }
        document.execCommand("insertUnorderedList", false, null);
        const list = getSelectionNodeInEditor()?.closest("ul:not(.peekom-task-list)");
        if (list) {
          list.classList.toggle("peekom-list-square", wantSquare);
        }
      }

      document.querySelectorAll("[data-list]").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          applyListStyle(btn.dataset.list);
          closeToolbarDropdowns();
          updateToolbarActiveState();
        });
      });


      document.querySelectorAll(".color-swatch-btn").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          const color = btn.dataset.color === "theme"
            ? getComputedStyle(document.documentElement).getPropertyValue("--note-text").trim() || "#2F3750"
            : btn.dataset.color;
          executeCmd("foreColor", color);
          closeToolbarDropdowns();
          updateToolbarActiveState();
        });
      });

      function isSelectionInMemoEditor() {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return false;
        let node = sel.anchorNode;
        if (!node) return false;
        if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
        return Boolean(node && memoEditor.contains(node));
      }

      function updateToolbarActiveState() {
        if (!memoEditor || !isSelectionInMemoEditor()) {
          toolbarButtons.forEach((button) => button.classList.remove("active"));
          listMenuBtn?.classList.remove("active");
          document.querySelectorAll("[data-align]").forEach((b) => b.classList.remove("active"));
          document.querySelectorAll("[data-list]").forEach((b) => b.classList.remove("active"));
          return;
        }

        const cmdMap = {
          bold: "bold",
          italic: "italic",
          underline: "underline",
          strikeThrough: "strikeThrough"
        };

        toolbarButtons.forEach((button) => {
          const cmd = button.dataset.cmd;
          const stateCmd = cmdMap[cmd];
          if (!stateCmd) return;
          let active = false;
          try {
            active = document.queryCommandState(stateCmd);
          } catch {
            active = false;
          }
          button.classList.toggle("active", active);
        });

        const node = getSelectionNodeInEditor();
        const ul = node?.closest("ul");
        const ol = node?.closest("ol");
        let listStyle = null;
        if (ul && !ul.classList.contains("peekom-task-list")) {
          listStyle = ul.classList.contains("peekom-list-square") ? "square" : "disc";
        } else if (ol) {
          listStyle = "ordered";
        }
        listMenuBtn?.classList.toggle("active", Boolean(listStyle));
        document.querySelectorAll("[data-list]").forEach((b) => {
          b.classList.toggle("active", b.dataset.list === listStyle);
        });

        let alignValue = "justifyLeft";
        try {
          alignValue = document.queryCommandValue("justify") || "justifyLeft";
        } catch {
          alignValue = "justifyLeft";
        }
        document.querySelectorAll("[data-align]").forEach((b) => {
          b.classList.toggle("active", b.dataset.align === alignValue);
        });
      }

      document.addEventListener("selectionchange", () => {
        if (!isExpanded) return;
        updateToolbarActiveState();
      });

      memoEditor.addEventListener("keyup", updateToolbarActiveState);
      memoEditor.addEventListener("mouseup", updateToolbarActiveState);
      memoEditor.addEventListener("click", updateToolbarActiveState);
      memoEditor.addEventListener("focus", updateToolbarActiveState);

      function closeToolbarDropdowns() {
        document.querySelectorAll(".toolbar-dropdown.open").forEach((el) => el.classList.remove("open"));
        toolbarDropdownOpen = false;
        refreshAutoCollapsePolicy();
      }

      function bindToolbarDropdown(wrapId, dropdownId) {
        const wrap = document.getElementById(wrapId);
        const dropdown = document.getElementById(dropdownId);
        if (!wrap || !dropdown) return;
        const trigger = wrap.querySelector(".tool-btn");
        trigger?.addEventListener("click", (event) => {
          event.stopPropagation();
          const willOpen = !dropdown.classList.contains("open");
          closeToolbarDropdowns();
          if (willOpen) {
            dropdown.classList.add("open");
            toolbarDropdownOpen = true;
            refreshAutoCollapsePolicy();
          }
        });
      }

      bindToolbarDropdown("alignDropdownWrap", "alignDropdown");
      bindToolbarDropdown("colorDropdownWrap", "colorDropdown");
      bindToolbarDropdown("listDropdownWrap", "listDropdown");

      function applyFormatBarTooltips() {
        const lang = (typeof PeekomI18n !== "undefined") ? PeekomI18n.getCurrentLang() : "ko";
        const tip = (key) => {
          if (typeof PeekomI18n !== "undefined") return PeekomI18n.t(key, lang);
          return key;
        };
        document.querySelectorAll(".format-bar [data-tip-key], .toolbar-dropdown [data-tip-key]").forEach((btn) => {
          const key = btn.dataset.tipKey;
          if (!key) return;
          const text = tip(key);
          btn.dataset.tip = text;
          btn.setAttribute("aria-label", text);
          btn.removeAttribute("title");
        });
      }
      applyFormatBarTooltips();

      window.peekomSyncWindowInteraction = syncWindowInteraction;
      window.peekomRefreshPointerHitTest = refreshPointerHitTest;

      document.addEventListener("click", (event) => {
        closeToolbarDropdowns();
        if (!event.target.closest("#handleContextMenu")) {
          hideHandleContextMenu();
        }
      });

      function getMaxImagesPerMemo() {
        return isPremium ? PLUS_MAX_IMAGES_PER_MEMO : FREE_MAX_IMAGES_PER_MEMO;
      }

      function countActiveMemoImages() {
        return memoEditor?.querySelectorAll("img.peekom-memo-image").length ?? 0;
      }

      function syncSlotImagesFromMemo(slotIndex = appState.activeSlot) {
        const slot = appState.slots[slotIndex];
        if (!slot || !memoEditor) return;
        const liveImages = Array.from(memoEditor.querySelectorAll("img.peekom-memo-image"));
        const liveIds = new Set();
        liveImages.forEach((img) => {
          const id = img.getAttribute("data-peekom-id");
          if (id) liveIds.add(id);
        });
        if (!Array.isArray(slot.images)) slot.images = [];
        slot.images = slot.images.filter((entry) => liveIds.has(entry.id));
        liveImages.forEach((img) => {
          const id = img.getAttribute("data-peekom-id");
          if (!id || slot.images.some((entry) => entry.id === id)) return;
          const widthStyle = String(img.style.width || "");
          const widthPx = parseInt(widthStyle, 10);
          slot.images.push({
            id,
            sourcePath: null,
            dataUrl: img.getAttribute("src") || "",
            widthPx: Number.isFinite(widthPx) ? widthPx : undefined,
            scale: Number.isFinite(widthPx) ? widthPx : 100,
            insertedAt: new Date().toISOString()
          });
        });
      }

      function guardMemoImageLimit() {
        syncSlotImagesFromMemo();
        const max = getMaxImagesPerMemo();
        if (countActiveMemoImages() >= max) {
          if (!isPremium) {
            window.PeekomPremiumUI?.showPremiumModal();
            syncWindowInteraction({ ignoreMouse: false, pointerOver: true });
          } else {
            alert(ti("indexMaxImagesAlert", { max }));
          }
          return false;
        }
        return true;
      }

      const CROP_RATIO_MAP = {
        free: null,
        "1:1": 1,
        "3:4": 3 / 4,
        "4:3": 4 / 3,
        "16:9": 16 / 9,
        "9:16": 9 / 16
      };

      let cropDrag = null;

      function syncStagingPreviewWrapSize() {
        if (!imageStagingPreviewWrap) return;
        const maxW = Math.max(160, Math.min(300, (memoEditor?.clientWidth || 300) - 24));
        imageStagingPreviewWrap.style.width = `${maxW}px`;
        imageStagingPreviewWrap.style.height = "160px";
      }

      function getStagingZoomRange(layout) {
        if (!layout) return { minZoom: 1, maxZoom: 1 };
        const { wrapW, wrapH, baseDispW, baseDispH } = layout;
        const minZoom = baseDispH > 0 ? wrapH / baseDispH : 1;
        const maxZoom = baseDispW > 0 ? wrapW / baseDispW : 1;
        return {
          minZoom: Math.min(minZoom, maxZoom),
          maxZoom: Math.max(minZoom, maxZoom)
        };
      }

      function syncStagingSliderRange(preserveZoom = true) {
        if (!imageStagingSlider || !isPremium) return;
        const layout = getStagingImageLayout();
        if (!layout) return;
        const { minZoom, maxZoom } = getStagingZoomRange(layout);
        const minPct = Math.max(1, Math.round(minZoom * 100));
        const maxPct = Math.max(minPct, Math.round(maxZoom * 100));
        imageStagingSlider.min = String(minPct);
        imageStagingSlider.max = String(maxPct);
        const curZoom = preserveZoom ? (Number(imageStagingSlider.value) || 100) / 100 : 1;
        const clamped = clamp(curZoom, minZoom, maxZoom);
        imageStagingSlider.value = String(Math.round(clamped * 100));
      }

      function getImageBounds(layout) {
        if (!layout) return null;
        const { offsetX, offsetY, dispW, dispH } = layout;
        return {
          minX: offsetX,
          minY: offsetY,
          maxX: offsetX + dispW,
          maxY: offsetY + dispH
        };
      }

      function clampCropRectToImage(rect, layout) {
        const b = getImageBounds(layout);
        if (!b || !rect) return rect;
        let { x, y, w, h } = rect;
        w = Math.min(w, b.maxX - b.minX);
        h = Math.min(h, b.maxY - b.minY);
        x = clamp(x, b.minX, Math.max(b.minX, b.maxX - w));
        y = clamp(y, b.minY, Math.max(b.minY, b.maxY - h));
        return { x, y, w, h };
      }

      function getStagingImageLayout() {
        const wrap = imageStagingPreviewWrap;
        const img = imageStagingPreview;
        if (!wrap || !img || !img.naturalWidth) return null;
        const wrapW = wrap.clientWidth;
        const wrapH = wrap.clientHeight || 160;
        const natW = img.naturalWidth;
        const natH = img.naturalHeight;
        const zoom = (Number(imageStagingSlider?.value) || 100) / 100;
        const fit = Math.min(wrapW / natW, wrapH / natH);
        const baseDispW = natW * fit;
        const baseDispH = natH * fit;
        const dispW = baseDispW * zoom;
        const dispH = baseDispH * zoom;
        const offsetX = (wrapW - dispW) / 2;
        const offsetY = (wrapH - dispH) / 2;
        return { wrapW, wrapH, dispW, dispH, offsetX, offsetY, natW, natH, baseDispW, baseDispH };
      }

      function saveCropNorm() {
        const layout = getStagingImageLayout();
        if (!layout || !imageStaging?.cropRect) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const r = imageStaging.cropRect;
        if (dispW <= 0 || dispH <= 0) return;
        imageStaging.cropNorm = {
          x: clamp((r.x - offsetX) / dispW, 0, 1),
          y: clamp((r.y - offsetY) / dispH, 0, 1),
          w: clamp(r.w / dispW, 0.05, 1),
          h: clamp(r.h / dispH, 0.05, 1)
        };
      }

      function syncCropRectFromNorm() {
        if (!imageStaging?.cropNorm) return;
        const layout = getStagingImageLayout();
        if (!layout) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const n = imageStaging.cropNorm;
        let w = n.w * dispW;
        let h = n.h * dispH;
        let x = offsetX + n.x * dispW;
        let y = offsetY + n.y * dispH;
        imageStaging.cropRect = clampCropRectToImage({ x, y, w, h }, layout);
      }

      function initCropRect() {
        const layout = getStagingImageLayout();
        if (!layout || !imageStaging) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const ratio = CROP_RATIO_MAP[imageStaging.cropRatio || "free"];
        let w = dispW;
        let h = dispH;
        let x = offsetX;
        let y = offsetY;
        if (ratio) {
          if (w / h > ratio) w = h * ratio;
          else h = w / ratio;
          x = offsetX + (dispW - w) / 2;
          y = offsetY + (dispH - h) / 2;
        }
        imageStaging.cropRect = clampCropRectToImage({ x, y, w, h }, layout);
        saveCropNorm();
      }

      function applyCropRatioConstraint() {
        const ratio = CROP_RATIO_MAP[imageStaging?.cropRatio || "free"];
        if (!ratio || !imageStaging?.cropRect) return;
        const layout = getStagingImageLayout();
        if (!layout) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const minX = offsetX;
        const minY = offsetY;
        const maxX = offsetX + dispW;
        const maxY = offsetY + dispH;
        let w = imageStaging.cropRect.w;
        let h = w / ratio;
        if (h > dispH) {
          h = dispH;
          w = h * ratio;
        }
        if (w > dispW) {
          w = dispW;
          h = w / ratio;
        }
        const cx = imageStaging.cropRect.x + imageStaging.cropRect.w / 2;
        const cy = imageStaging.cropRect.y + imageStaging.cropRect.h / 2;
        let x = cx - w / 2;
        let y = cy - h / 2;
        x = clamp(x, minX, maxX - w);
        y = clamp(y, minY, maxY - h);
        imageStaging.cropRect = { x, y, w, h };
        saveCropNorm();
      }

      function renderCropFrame() {
        if (!imageStagingCropFrame || !imageStaging?.cropRect) return;
        const r = imageStaging.cropRect;
        imageStagingCropFrame.style.left = `${r.x}px`;
        imageStagingCropFrame.style.top = `${r.y}px`;
        imageStagingCropFrame.style.width = `${r.w}px`;
        imageStagingCropFrame.style.height = `${r.h}px`;
      }

      function updateCropUiVisibility() {
        const show = isPremium;
        imageStagingCropLayer?.classList.toggle("hidden", !show);
        imageStagingCropRatios?.classList.toggle("hidden", !show);
        if (show && imageStaging) {
          if (!imageStaging.cropRect) initCropRect();
          else syncCropRectFromNorm();
          applyCropRatioConstraint();
          renderCropFrame();
        }
      }

      function loadImageElement(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      async function exportStagedImage() {
        const src = imageStaging.dataUrl;
        const img = await loadImageElement(src);
        const layout = getStagingImageLayout();
        const crop = imageStaging.cropRect;
        const natW = img.naturalWidth;
        const natH = img.naturalHeight;

        if (isPremium && layout && crop) {
          const { offsetX, offsetY, dispW, dispH } = layout;
          const relX = (crop.x - offsetX) / dispW;
          const relY = (crop.y - offsetY) / dispH;
          const relW = crop.w / dispW;
          const relH = crop.h / dispH;
          const sx = clamp(relX * natW, 0, natW - 1);
          const sy = clamp(relY * natH, 0, natH - 1);
          const sw = clamp(relW * natW, 1, natW - sx);
          const sh = clamp(relH * natH, 1, natH - sy);
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(sw);
          canvas.height = Math.round(sh);
          canvas.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
          return {
            dataUrl: canvas.toDataURL("image/png"),
            widthPx: canvas.width,
            heightPx: canvas.height
          };
        }

        if (isPremium && layout) {
          const displayW = Math.max(1, Math.round(layout.dispW));
          const displayH = Math.max(1, Math.round(layout.dispH));
          const canvas = document.createElement("canvas");
          canvas.width = displayW;
          canvas.height = displayH;
          canvas.getContext("2d").drawImage(img, 0, 0, natW, natH, 0, 0, displayW, displayH);
          return {
            dataUrl: canvas.toDataURL("image/png"),
            widthPx: displayW,
            heightPx: displayH
          };
        }

        const memoMaxW = Math.max(120, memoEditor?.clientWidth || 300);
        if (natW <= memoMaxW) {
          return { dataUrl: src, widthPx: natW, heightPx: natH };
        }
        const ratio = memoMaxW / natW;
        const canvas = document.createElement("canvas");
        canvas.width = memoMaxW;
        canvas.height = Math.round(natH * ratio);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        return {
          dataUrl: canvas.toDataURL("image/png"),
          widthPx: canvas.width,
          heightPx: canvas.height
        };
      }

      function applyImageStagingSliderState() {
        if (!imageStagingSlider) return;
        if (!isPremium) {
          imageStagingSlider.value = "100";
          imageStagingSlider.disabled = true;
          if (imageStaging) imageStaging.scale = 100;
        } else {
          imageStagingSlider.disabled = false;
        }
        updateStagingPreviewWidth();
      }

      function showImageStaging(dataUrl, filePath = null, scale = 100) {
        const safeScale = isPremium ? scale : 100;
        imageStaging = {
          dataUrl,
          filePath,
          scale: safeScale,
          cropRatio: "free",
          cropRect: null,
          cropNorm: null
        };
        imageStagingCropRatios?.querySelectorAll("button[data-ratio]").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.ratio === "free");
        });
        if (imageStagingPreview) {
          imageStagingPreview.onload = () => {
            syncStagingPreviewWrapSize();
            syncStagingSliderRange(false);
            updateStagingPreviewWidth();
          };
          imageStagingPreview.src = dataUrl;
          if (imageStagingPreview.complete) {
            syncStagingPreviewWrapSize();
            syncStagingSliderRange(false);
            updateStagingPreviewWidth();
          }
        }
        if (imageStagingSlider) imageStagingSlider.value = String(safeScale);
        applyImageStagingSliderState();
        syncStagingPreviewWrapSize();
        imageStagingOverlay?.classList.remove("hidden");
        imageStagingOverlay?.setAttribute("aria-hidden", "false");
        refreshAutoCollapsePolicy();
      }

      function hideImageStaging() {
        imageStaging = null;
        cropDrag = null;
        if (imageStagingPreview) {
          imageStagingPreview.onload = null;
          imageStagingPreview.removeAttribute("src");
          imageStagingPreview.style.width = "";
          imageStagingPreview.style.height = "";
        }
        imageStagingCropLayer?.classList.add("hidden");
        imageStagingCropRatios?.classList.add("hidden");
        imageStagingOverlay?.classList.add("hidden");
        imageStagingOverlay?.setAttribute("aria-hidden", "true");
        refreshAutoCollapsePolicy();
      }

      function updateStagingPreviewWidth() {
        if (!imageStagingPreview || !imageStagingSlider || !imageStaging) return;
        syncStagingSliderRange();
        const scale = Number(imageStagingSlider.value) || 100;
        imageStaging.scale = scale;
        if (isPremium && imageStaging.cropRect) {
          saveCropNorm();
        }
        syncStagingPreviewWrapSize();
        const layout = getStagingImageLayout();
        if (layout) {
          imageStagingPreview.style.width = `${layout.dispW}px`;
          imageStagingPreview.style.height = `${layout.dispH}px`;
        }
        if (isPremium) {
          if (imageStaging.cropNorm) syncCropRectFromNorm();
          else if (!imageStaging.cropRect) initCropRect();
          applyCropRatioConstraint();
        }
        updateCropUiVisibility();
      }

      async function pickMemoImage() {
        if (!guardMemoImageLimit()) return;
        try {
          const result = await ipcRenderer.invoke("image:pick");
          if (!result?.ok) return;
          showImageStaging(result.dataUrl, result.filePath || null, 100);
        } catch (err) {
          console.error(err);
        }
      }

      function insertInlineMemoImage(dataUrl, widthPx, imageId) {
        const w = Math.max(1, Math.round(widthPx));
        const imgHtml = `<span class="peekom-image-wrap"><img class="peekom-memo-image" data-peekom-id="${imageId}" src="${dataUrl}" style="width:${w}px;max-width:100%;height:auto;" alt=""></span>`;
        memoEditor.focus();
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0 && memoEditor.contains(sel.anchorNode)) {
          const range = sel.getRangeAt(0);
          range.collapse(false);
          const temp = document.createElement("div");
          temp.innerHTML = imgHtml;
          const imgNode = temp.firstChild;
          if (imgNode) {
            range.insertNode(imgNode);
            range.setStartAfter(imgNode);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
          }
        } else {
          memoEditor.insertAdjacentHTML("beforeend", `<p>${imgHtml}</p>`);
        }
      }

      async function commitImageStaging() {
        if (!imageStaging) return;
        if (!guardMemoImageLimit()) return;
        const slot = appState.activeSlot;
        const { dataUrl, widthPx, heightPx } = await exportStagedImage();
        const id = crypto.randomUUID();
        if (!Array.isArray(appState.slots[slot].images)) {
          appState.slots[slot].images = [];
        }
        appState.slots[slot].images.push({
          id,
          sourcePath: imageStaging.filePath || null,
          dataUrl,
          widthPx,
          heightPx,
          scale: widthPx,
          insertedAt: new Date().toISOString()
        });
        insertInlineMemoImage(dataUrl, widthPx, id);
        hideImageStaging();
        persistActiveMemo();
        saveState(appState);
        showSaveIndicator();
      }

      clipImageBtn?.addEventListener("click", (event) => {
        event.stopPropagation();
        pickMemoImage();
      });

      imageStagingCancelBtn?.addEventListener("click", (event) => {
        event.stopPropagation();
        hideImageStaging();
      });

      imageStagingConfirmBtn?.addEventListener("click", (event) => {
        event.stopPropagation();
        commitImageStaging();
      });

      imageStagingSlider?.addEventListener("input", () => {
        if (!isPremium) return;
        updateStagingPreviewWidth();
      });

      imageStagingSliderWrap?.addEventListener("click", (event) => {
        if (isPremium || !imageStaging) return;
        if (!event.target.closest("#imageStagingSlider")) return;
        event.preventDefault();
        event.stopPropagation();
        window.PeekomPremiumUI?.showPremiumModal();
      });

      imageStagingCropRatios?.querySelectorAll("button[data-ratio]").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          imageStagingCropRatios.querySelectorAll("button[data-ratio]").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          if (!imageStaging) return;
          imageStaging.cropRatio = btn.dataset.ratio || "free";
          initCropRect();
          applyCropRatioConstraint();
          renderCropFrame();
        });
      });

      imageStagingCropFrame?.addEventListener("mousedown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (!imageStaging?.cropRect) return;
        cropDrag = {
          startX: event.clientX,
          startY: event.clientY,
          rect: { ...imageStaging.cropRect }
        };
      });

      document.addEventListener("mousemove", (event) => {
        if (!cropDrag || !imageStaging?.cropRect) return;
        const layout = getStagingImageLayout();
        if (!layout) return;
        const dx = event.clientX - cropDrag.startX;
        const dy = event.clientY - cropDrag.startY;
        let x = cropDrag.rect.x + dx;
        let y = cropDrag.rect.y + dy;
        imageStaging.cropRect = clampCropRectToImage({ ...cropDrag.rect, x, y }, layout);
        saveCropNorm();
        renderCropFrame();
      });

      document.addEventListener("mouseup", () => {
        if (cropDrag) saveCropNorm();
        cropDrag = null;
      });

      function addIndexAtBottom() {
        const max = getMaxEnabledSlots();
        if (appState.enabledCount >= max) {
          if (!isPremium && max === FREE_MAX_SLOTS) {
            window.PeekomPremiumUI?.showPremiumModal();
            return;
          }
          alert(ti("indexMaxSlotsAlert", { max }));
          return;
        }
        persistActiveMemo();
        const newSlot = appState.enabledCount;
        appState.slots[newSlot] = defaultSlot(newSlot);
        appState.enabledCount += 1;
        appState.order = normalizeOrder(appState.order, appState.enabledCount);
        appState.activeSlot = newSlot;
        saveState(appState);
        applyThemeForSlot(newSlot);
        loadMemoForActiveSlot();
        renderHandleStack();
        setExpanded(true);
        ipcRenderer.invoke("settings:notify-applied", {
          skipSettingsReload: false,
          stateJson: JSON.stringify(appState)
        }).catch(() => {});
      }

      function deleteCurrentIndexWithConfirm() {
        if (appState.enabledCount <= 1) {
          alert(ti("indexMinOneAlert"));
          return;
        }
        deleteIndexModal?.classList.remove("hidden");
      }

      function performDeleteCurrentIndex() {
        if (appState.enabledCount <= 1) return;
        deleteIndexModal?.classList.add("hidden");
        const del = appState.activeSlot;
        persistActiveMemo();
        for (let i = del; i < MAX_SLOTS - 1; i++) {
          appState.slots[i] = appState.slots[i + 1];
        }
        appState.slots[MAX_SLOTS - 1] = defaultSlot(MAX_SLOTS - 1);
        appState.enabledCount -= 1;
        appState.order = normalizeOrder(appState.order, appState.enabledCount);
        appState.activeSlot = clampSlotIndex(Math.max(0, del - 1), appState.enabledCount);
        saveState(appState);
        applyThemeForSlot(appState.activeSlot);
        loadMemoForActiveSlot();
        renderHandleStack();
        ipcRenderer.invoke("settings:notify-applied", {
          skipSettingsReload: false,
          stateJson: JSON.stringify(appState)
        }).catch(() => {});
      }

      deleteIndexCancelBtn?.addEventListener("click", (event) => {
        event.stopPropagation();
        deleteIndexModal?.classList.add("hidden");
      });

      deleteIndexConfirmBtn?.addEventListener("click", (event) => {
        event.stopPropagation();
        performDeleteCurrentIndex();
      });

      function executeCmd(command, value = null) {
        memoEditor.focus();
        document.execCommand(command, false, value);
      }

      function getCurrentLineElement() {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return null;
        let node = sel.anchorNode;
        if (!node || !memoEditor.contains(node)) return null;

        if (node === memoEditor) {
          const range = sel.getRangeAt(0);
          if (range.endContainer === memoEditor && range.endOffset > 0) {
            const child = memoEditor.childNodes[range.endOffset - 1];
            if (child?.nodeType === Node.ELEMENT_NODE) return child;
          }
          if (!memoEditor.childNodes.length) {
            return ensureBlockLine(memoEditor);
          }
          return null;
        }

        if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
        if (!node) return null;
        while (node && node !== memoEditor) {
          if (node.parentElement === memoEditor) return node;
          node = node.parentElement;
        }
        return null;
      }

      function ensureBlockLine(lineEl) {
        if (lineEl !== memoEditor) return lineEl;
        const div = document.createElement("div");
        while (memoEditor.firstChild) {
          div.appendChild(memoEditor.firstChild);
        }
        if (!div.childNodes.length) {
          div.appendChild(document.createElement("br"));
        }
        memoEditor.appendChild(div);
        return div;
      }

      function getLinePlainText(lineEl) {
        if (!lineEl) return "";
        return lineEl.textContent || "";
      }

      function htmlToFragment(html) {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = html;
        const frag = document.createDocumentFragment();
        while (wrapper.firstChild) frag.appendChild(wrapper.firstChild);
        return frag;
      }

      function replaceLineElement(lineEl, html, options = {}) {
        const block = ensureBlockLine(lineEl);
        if (!block || !block.parentNode) return null;
        const caret = options.preserveCaret ? getCaretCharOffset(memoEditor) : null;
        const frag = htmlToFragment(html);
        const inserted = Array.from(frag.childNodes);
        block.parentNode.replaceChild(frag, block);
        if (caret !== null) setCaretByCharOffset(memoEditor, caret);
        return inserted[inserted.length - 1] || null;
      }

      function placeCaretInEmptyLine(lineEl) {
        const line = lineEl && lineEl.nodeType === Node.ELEMENT_NODE ? lineEl : null;
        if (!line) return;
        if (!line.querySelector("br") && !line.textContent) {
          line.appendChild(document.createElement("br"));
        }
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(line);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }

      function insertEmptyLineAfter(node) {
        const parent = node?.parentNode || memoEditor;
        const line = document.createElement("div");
        line.appendChild(document.createElement("br"));
        if (node && node.parentNode === parent) {
          parent.insertBefore(line, node.nextSibling);
        } else {
          parent.appendChild(line);
        }
        placeCaretInEmptyLine(line);
        return line;
      }

      function buildBlockMarkdownHtml(text) {
        const trimmed = String(text || "").trimStart();
        if (!trimmed) return null;

        if (trimmed.startsWith("### ")) {
          return `<h3>${parseMarkdownInline(trimmed.slice(4))}</h3>`;
        }
        if (trimmed.startsWith("## ")) {
          return `<h2>${parseMarkdownInline(trimmed.slice(3))}</h2>`;
        }
        if (trimmed.startsWith("# ")) {
          return `<h1>${parseMarkdownInline(trimmed.slice(2))}</h1>`;
        }
        if (/^(-\s*)?\[[ xX]\]\s+/.test(trimmed)) {
          const taskMatch = trimmed.match(/^(-\s*)?\[([ xX])\]\s+(.*)$/);
          if (taskMatch) {
            const checked = taskMatch[2].toLowerCase() === "x";
            const content = parseMarkdownInline(taskMatch[3]);
            return `<ul class="peekom-task-list"><li data-checked="${checked}"><span class="peekom-task-check" contenteditable="false" role="checkbox" aria-checked="${checked}" tabindex="-1"></span>${content}</li></ul>`;
          }
        }
        if (trimmed.startsWith("- ")) {
          return `<ul><li>${parseMarkdownInline(trimmed.slice(2))}</li></ul>`;
        }
        if (/^\d+\.\s+/.test(trimmed)) {
          const item = trimmed.replace(/^\d+\.\s+/, "");
          return `<ol><li>${parseMarkdownInline(item)}</li></ol>`;
        }
        return null;
      }

      function processInlineMarkdownInLine(lineEl) {
        if (!lineEl || lineEl === memoEditor) return false;
        const text = getLinePlainText(lineEl);
        if (!/\*\*(.+?)\*\*/.test(text) && !/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/.test(text)) {
          return false;
        }

        const block = ensureBlockLine(lineEl);
        if (!block || block.closest("h1,h2,h3,ul,ol,li")) return false;
        let html = text;
        let changed = false;

        if (/\*\*(.+?)\*\*/.test(text)) {
          html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
          changed = true;
        }

        if (/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/.test(text)) {
          html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, "<em>$1</em>");
          changed = true;
        }

        if (changed && html !== text) {
          replaceLineElement(block, html, { preserveCaret: true });
          return true;
        }
        return false;
      }

      function handleMarkdownEnter(event) {
        const lineEl = getCurrentLineElement();
        if (!lineEl) return;
        const block = ensureBlockLine(lineEl);
        const text = getLinePlainText(block);
        const blockHtml = buildBlockMarkdownHtml(text);

        if (blockHtml) {
          event.preventDefault();
          const converted = replaceLineElement(block, blockHtml);
          insertEmptyLineAfter(converted);
          normalizeMemoTypography(appState.activeSlot, { preserveCaret: true });
          persistActiveMemo();
          updateToolbarActiveState();
          return;
        }

        if (processInlineMarkdownInLine(block)) {
          normalizeMemoTypography(appState.activeSlot, { preserveCaret: true });
          persistActiveMemo();
          updateToolbarActiveState();
        }
      }

      function processMarkdownInput() {
        const lineEl = getCurrentLineElement();
        if (!lineEl) return;
        processInlineMarkdownInLine(lineEl);
      }

      function lineMayHaveInlineMarkdown(lineEl) {
        if (!lineEl) return false;
        return /[*_]/.test(getLinePlainText(lineEl));
      }

      function scheduleUrlScan() {
        if (urlScanTimer) clearTimeout(urlScanTimer);
        urlScanTimer = setTimeout(() => {
          urlScanTimer = null;
          scanAndLinkifyEditor();
        }, 500);
      }

      function getCaretCharOffset(parent) {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return null;
        const range = sel.getRangeAt(0);
        if (!parent.contains(range.endContainer)) return null;

        let offset = 0;
        let found = false;

        function walk(node) {
          if (found) return;

          if (node.nodeType === Node.TEXT_NODE) {
            if (node === range.endContainer) {
              offset += range.endOffset;
              found = true;
              return;
            }
            offset += node.nodeValue.length;
            return;
          }

          if (node.nodeName === "BR") {
            if (node === range.endContainer) {
              found = true;
              return;
            }
            offset += 1;
            return;
          }

          if (node.nodeType === Node.ELEMENT_NODE) {
            if (
              node.classList?.contains("peekom-memo-image") ||
              node.classList?.contains("peekom-image-wrap")
            ) {
              offset += 1;
              return;
            }

            if (node === range.endContainer) {
              for (let i = 0; i < range.endOffset; i++) {
                walk(node.childNodes[i]);
                if (found) return;
              }
              found = true;
              return;
            }

            for (const child of node.childNodes) {
              walk(child);
              if (found) return;
            }
          }
        }

        if (range.endContainer === parent) {
          for (let i = 0; i < range.endOffset; i++) {
            walk(parent.childNodes[i]);
            if (found) return offset;
          }
          return offset;
        }

        for (const child of parent.childNodes) {
          walk(child);
          if (found) return offset;
        }

        return found ? offset : null;
      }

      function setCaretByCharOffset(parent, offset) {
        if (offset === null || offset === undefined) return;
        const range = document.createRange();
        const sel = window.getSelection();
        let remaining = offset;
        let nodeFound = false;

        function walk(node) {
          if (nodeFound) return;
          if (node.nodeType === Node.TEXT_NODE) {
            const len = node.nodeValue.length;
            if (remaining <= len) {
              range.setStart(node, remaining);
              range.setEnd(node, remaining);
              nodeFound = true;
              return;
            }
            remaining -= len;
          } else if (node.nodeName === "BR") {
            if (remaining <= 0) {
              range.setStartBefore(node);
              range.setEndBefore(node);
              nodeFound = true;
              return;
            }
            remaining -= 1;
          } else if (node.nodeType === Node.ELEMENT_NODE) {
            if (
              node.classList?.contains("peekom-memo-image") ||
              node.classList?.contains("peekom-image-wrap")
            ) {
              if (remaining <= 0) {
                range.setStartAfter(node);
                range.setEndAfter(node);
                nodeFound = true;
                return;
              }
              remaining -= 1;
              return;
            }
            for (const child of node.childNodes) {
              walk(child);
              if (nodeFound) return;
            }
          }
        }

        for (const child of parent.childNodes) {
          walk(child);
          if (nodeFound) break;
        }
        if (!nodeFound) {
          range.selectNodeContents(parent);
          range.collapse(false);
        }
        sel.removeAllRanges();
        sel.addRange(range);
      }

      function scanAndLinkifyEditor(skipCaret = false) {
        const caret = skipCaret ? null : getCaretCharOffset(memoEditor);
        let mutated = false;

        const walker = document.createTreeWalker(memoEditor, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            if (!node.nodeValue || node.nodeValue.length < 4) return NodeFilter.FILTER_REJECT;
            if (node.parentElement && node.parentElement.closest("a")) {
              return NodeFilter.FILTER_REJECT;
            }
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        const targets = [];
        let cur;
        while ((cur = walker.nextNode())) targets.push(cur);

        targets.forEach((textNode) => {
          const text = textNode.nodeValue;
          URL_REGEX.lastIndex = 0;
          if (!URL_REGEX.test(text)) return;
          URL_REGEX.lastIndex = 0;

          const frag = document.createDocumentFragment();
          let lastIndex = 0;
          let m;
          while ((m = URL_REGEX.exec(text)) !== null) {
            const matchStart = m.index;
            const matchEnd = matchStart + m[0].length;
            if (matchStart > lastIndex) {
              frag.appendChild(document.createTextNode(text.slice(lastIndex, matchStart)));
            }
            const a = document.createElement("a");
            const href = /^https?:\/\//i.test(m[0]) ? m[0] : `https://${m[0]}`;
            a.setAttribute("href", href);
            a.setAttribute("data-external", "1");
            a.textContent = m[0];
            frag.appendChild(a);
            lastIndex = matchEnd;
          }
          if (lastIndex < text.length) {
            frag.appendChild(document.createTextNode(text.slice(lastIndex)));
          }
          textNode.parentNode.replaceChild(frag, textNode);
          mutated = true;
        });

        if (mutated && caret !== null) {
          setCaretByCharOffset(memoEditor, caret);
        }
      }

      async function syncSettingsToMain() {
        const payload = {
          anchor: appState.global.anchor,
          lengthMode: appState.global.lengthMode,
          triggerMode: appState.global.triggerMode,
          shortcut: appState.global.shortcut,
          shortcutSlotPrev: appState.global.shortcutSlotPrev,
          shortcutSlotNext: appState.global.shortcutSlotNext,
          manualYOffset: appState.global.manualYOffset
        };
        const result = await ipcRenderer.invoke("settings:update", payload);
        if (result?.windowState?.settings) {
          appSettings = { ...appSettings, ...result.windowState.settings };
          appState.global = { ...appState.global, ...result.windowState.settings };
          hoverDelayMs = appState.global.hoverDelayMs;
          saveState(appState);
        }
        return result;
      }

      function applyLoadedAppState(fresh, options = {}) {
        const { preserveMemoHtml = null, preserveSlotIndex = null } = options;
        appState = fresh;
        appSettings = { ...defaultGlobal(), ...appState.global };
        delete appSettings.imageSize;
        hoverDelayMs = appState.global.hoverDelayMs;

        if (typeof PeekomI18n !== "undefined" && appState.global.language) {
          PeekomI18n.setLang(appState.global.language);
          document.documentElement.lang = PeekomI18n.getCurrentLang();
        }
        applyFormatBarTooltips();
        applyMainUiLabels();

        if (appState.activeSlot >= appState.enabledCount) {
          appState.activeSlot = clampSlotIndex(appState.activeSlot, appState.enabledCount);
        }

        resolveYSlotConflicts(appState.slots, appState.enabledCount);
        applyThemeForSlot(appState.activeSlot);
        if (preserveMemoHtml != null && preserveSlotIndex != null && appState.slots[preserveSlotIndex]) {
          const safeHtml = sanitizeMemoHtml(preserveMemoHtml);
          appState.slots[preserveSlotIndex].memoHtml = safeHtml;
          if (appState.activeSlot === preserveSlotIndex) {
            memoEditor.innerHTML = safeHtml;
            syncSlotImagesFromMemo(preserveSlotIndex);
            normalizeMemoTypography(preserveSlotIndex);
            scanAndLinkifyEditor(true);
          }
        } else {
          loadMemoForActiveSlot();
        }
        renderHandleStack();
        refreshAllHandleThemes();
        lastPanelLayoutKey = "";
        updatePanelPosition();
        if (isExpanded) {
          syncWindowInteraction({ ignoreMouse: false, pointerOver: true });
        }
        setPinned(isPinned);
        syncPeekAutoCollapseToMain();
      }

      ipcRenderer.on("settings:applied", async (_event, payload = {}) => {
        const wasExpanded = isExpanded;
        const editingSlot = appState.activeSlot;
        if (wasExpanded) {
          persistActiveMemo();
        }
        const editingHtml = wasExpanded
          ? appState.slots[editingSlot]?.memoHtml || memoEditor.innerHTML
          : null;

        setPinned(false);
        setExpanded(false);

        await syncPremiumState();

        let fresh = await reloadAppStateFromDisk();
        if (!fresh && payload && typeof payload.stateJson === "string") {
          fresh = tryParseV5State(payload.stateJson);
        }
        if (!fresh) return;

        applyLoadedAppState(fresh, {
          preserveMemoHtml: editingHtml,
          preserveSlotIndex: editingSlot
        });
        saveState(appState);

        try {
          await syncSettingsToMain();
        } catch (err) {
          console.error(err);
        }
      });

      ipcRenderer.on("shortcut:toggle-expand", () => {
        const ec = appState.enabledCount;
        let idx = typeof appState.global.lastOpenedSlotIndex === "number"
          ? appState.global.lastOpenedSlotIndex
          : appState.activeSlot;
        idx = clampSlotIndex(idx, ec);

        if (isExpanded && appState.activeSlot === idx) {
          setPinned(false);
          setExpanded(false);
          return;
        }

        if (appState.activeSlot !== idx) {
          persistActiveMemo();
          appState.activeSlot = idx;
          applyThemeForSlot(idx);
          loadMemoForActiveSlot();
          saveState(appState);
          updateActiveHandle(idx);
        }
        appState.global.lastOpenedSlotIndex = idx;
        saveState(appState);
        setExpanded(true);
      });

      ipcRenderer.on("shortcut:slot-prev", () => {
        switchSlotByOffset(-1);
      });

      ipcRenderer.on("shortcut:slot-next", () => {
        switchSlotByOffset(1);
      });

      ipcRenderer.on("tray:add-index", () => {
        addIndexAtBottom();
      });

      ipcRenderer.on("premium:changed", (_, payload) => {
        isPremium = Boolean(payload?.isPremium);
        enforceSlotLimits();
        renderHandleStack();
        applyThemeForSlot(appState.activeSlot);
        applyImageStagingSliderState();
      });

      window.onPremiumActivated = async () => {
        const p = await ipcRenderer.invoke("premium:get");
        isPremium = Boolean(p.isPremium);
        enforceSlotLimits();
        renderHandleStack();
        applyThemeForSlot(appState.activeSlot);
        applyImageStagingSliderState();
      };

      window.addEventListener("keydown", (event) => {
        if (
          isExpanded &&
          appSettings.triggerMode === "hover" &&
          (event.key === "ArrowUp" || event.key === "ArrowDown")
        ) {
          const t = event.target;
          if (t && (t.isContentEditable || t.tagName === "INPUT" || t.tagName === "TEXTAREA")) {
            return;
          }
          event.preventDefault();
          switchSlotByOffset(event.key === "ArrowUp" ? -1 : 1);
          return;
        }

        if (!event.ctrlKey && !event.metaKey) return;
        const key = event.key;

        if (key === "0") {
          event.preventDefault();
          const idx = 9;
          if (idx >= appState.enabledCount) return;
          switchToSlot(idx);
          return;
        }

        if (key < "1" || key > "9") return;
        const idx = Number(key) - 1;
        if (idx >= appState.enabledCount) return;
        event.preventDefault();
        switchToSlot(idx);
      });

      function switchSlotByOffset(offset) {
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        const pos = ord.indexOf(appState.activeSlot);
        const currentPos = pos >= 0 ? pos : 0;
        const nextPos =
          offset < 0
            ? (currentPos <= 0 ? ec - 1 : currentPos - 1)
            : (currentPos >= ec - 1 ? 0 : currentPos + 1);
        switchToSlot(ord[nextPos]);
      }

      function switchToSlot(idx) {
        if (imageStaging) {
          const ok = confirm(ti("imageSwitchIndexConfirm"));
          if (!ok) return;
          hideImageStaging();
        }
        if (appState.activeSlot !== idx) {
          persistActiveMemo();
          appState.activeSlot = idx;
          applyThemeForSlot(idx);
          loadMemoForActiveSlot();
          appState.global.lastOpenedSlotIndex = idx;
          saveState(appState);
          updateActiveHandle(idx);
        }
        setExpanded(true);
      }

      async function syncPremiumState() {
        try {
          const p = await ipcRenderer.invoke("premium:get");
          isPremium = Boolean(p.isPremium);
        } catch {
          isPremium = false;
        }
      }

      function initializeFirstRunTip() {
        const seen = localStorage.getItem(FIRST_RUN_KEY) === "1";
        firstRunTip.classList.toggle("hidden", seen);
      }

      async function initialize() {
        appState = loadState();
        await syncPremiumState();
        enforceSlotLimits();

        // 최소 1개 인덱스 보장
        if (!appState.enabledCount || appState.enabledCount < 1) {
          appState.enabledCount = 1;
          appState.slots[0] = { ...defaultSlot(0), ...appState.slots[0] };
          appState.order = [0];
          appState.activeSlot = 0;
        }

        // 언어 적용
        if (typeof PeekomI18n !== "undefined") {
          const savedLang = appState.global.language;
          if (savedLang) PeekomI18n.setLang(savedLang);
          document.documentElement.lang = PeekomI18n.getCurrentLang();
        }

        saveState(appState);
        appSettings = { ...defaultGlobal(), ...appState.global };
        hoverDelayMs = appState.global.hoverDelayMs;

        // 패널 폭 30vh로 동적 계산
        const dynPanelWidth = Math.round(window.innerHeight * 0.30);
        document.documentElement.style.setProperty("--panel-width", `${dynPanelWidth}px`);
        document.documentElement.style.setProperty("--collapsed-width", `${COLLAPSED_WIDTH}px`);

        applyThemeForSlot(appState.activeSlot);
        loadMemoForActiveSlot();
        updatePanelPosition();

        initializeFirstRunTip();
        setPinned(false);
        renderHandleStack();
        applyMainUiLabels();

        window.addEventListener("pointermove", onWindowPointerMove);
        window.addEventListener("pointerup", onWindowPointerUp);
        window.addEventListener("pointercancel", onWindowPointerUp);
        window.addEventListener("resize", () => {
          const w = Math.round(window.innerHeight * 0.30);
          document.documentElement.style.setProperty("--panel-width", `${w}px`);
          updatePanelPosition();
        });

        try {
          const st = await ipcRenderer.invoke("startup:get");
          if (st?.ok) {
            appState.global.openAtLogin = st.openAtLogin;
            saveState(appState);
          }
        } catch (e) {
          console.error(e);
        }

        // 저장된 모니터 설정 복원
        try {
          if (appState.global.monitorMode === "fixed" && appState.global.monitorTargetId !== null) {
            await ipcRenderer.invoke("window:set-target-display", appState.global.monitorTargetId);
          }
        } catch (e) {
          console.error(e);
        }

        try {
          await syncSettingsToMain();
          await syncPanelLayoutToMain();
          await syncPeekAutoCollapseToMain();
        } catch (error) {
          console.error(error);
        }
      }

      initialize();
    </script>
  </body>
</html>
