<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peekom</title>
    <script src="assets/i18n.js"></script>
    <script src="assets/i18n-locale-extra.js"></script>
    <script src="assets/memo-sanitize.js"></script>
    <script src="assets/premium-config.js"></script>
    <script src="assets/premium-ui.js"></script>
    <style>
      :root {
        --collapsed-width: 32px;
        --panel-width: 420px;
        --handle-height: 10vh;
        --active-y-slot: 0;
        --note-bg: #fff4b8;
        --note-text: #2f3750;
        --muted-text: #7f8797;
        --accent: #4a79ff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        color: var(--note-text);
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .floating-panel {
        position: relative;
        width: 100%;
        height: 100%;
        isolation: isolate;
      }

      .handle-column {
        position: absolute;
        top: 0;
        right: 0;
        width: var(--collapsed-width);
        height: 100%;
        z-index: 100;
        pointer-events: auto;
      }

      .edge-handle {
        position: absolute;
        right: 0;
        width: 100%;
        height: var(--handle-height);
        border: 0;
        background: color-mix(in srgb, var(--handle-bg, var(--note-bg)) 90%, var(--handle-text, var(--note-text)) 10%);
        color: var(--handle-text, var(--note-text));
        border-radius: 12px 0 0 12px;
        border-left: 2px solid rgba(79, 84, 95, 0.28);
        box-shadow: inset 2px 0 0 rgba(255, 255, 255, 0.35);
        cursor: ew-resize;
        padding: 4px 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        pointer-events: auto;
      }

      .edge-handle.is-active {
        background: color-mix(in srgb, var(--handle-bg, var(--note-bg)) 78%, var(--handle-text, var(--note-text)) 22%);
      }

      .edge-handle.is-dragging-reorder {
        opacity: 0.92;
        z-index: 120;
      }

      .handle-label-text {
        writing-mode: vertical-rl;
        text-orientation: upright;
        letter-spacing: 1px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.05;
        max-height: 100%;
        overflow: hidden;
        text-align: center;
        color: var(--handle-text, var(--note-text));
        pointer-events: none;
        user-select: none;
      }

      .floating-panel:not(.expanded) .note-shell,
      .floating-panel:not(.expanded) .first-run-tip {
        pointer-events: none;
      }

      .floating-panel.expanded .edge-handle.is-active {
        background: var(--note-bg);
        border-left: 0;
        box-shadow: none;
        color: var(--note-text);
      }

      .note-backing {
        position: absolute;
        right: 0;
        top: 0;
        width: 0;
        height: 0;
        background: var(--note-bg);
        border-radius: 12px 0 0 12px;
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
      }

      .floating-panel.expanded .note-backing {
        opacity: 1;
        visibility: visible;
      }

      .handle-context-menu {
        position: fixed;
        z-index: 200;
        min-width: 140px;
        padding: 4px 0;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #dadce0;
        box-shadow: 0 2px 10px rgba(60, 64, 67, 0.18);
        pointer-events: auto;
      }

      .handle-context-menu.hidden {
        display: none;
      }

      .handle-context-menu button {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        text-align: left;
        padding: 8px 12px;
        font-size: 12px;
        color: #2f3750;
        cursor: pointer;
      }

      .handle-context-menu button:hover:not(:disabled) {
        background: #f1f3f4;
      }

      .handle-context-menu button:disabled {
        color: #9aa0a6;
        cursor: default;
      }

      .handle-context-menu button.danger {
        color: #d04646;
      }

      .toolbar-dropdown-wrap {
        position: relative;
      }

      .toolbar-dropdown {
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 2px;
        padding: 4px 6px;
        background: #fff;
        border: 1px solid #dadce0;
        border-radius: 8px;
        box-shadow: 0 1px 6px rgba(60, 64, 67, 0.15);
        z-index: 50;
        white-space: nowrap;
        align-items: center;
      }

      .toolbar-dropdown.open {
        display: inline-flex;
      }

      .toolbar-caret {
        font-size: 8px;
        margin-left: 1px;
        opacity: 0.65;
      }

      .color-swatch-btn {
        width: 18px;
        height: 18px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 4px;
        cursor: pointer;
        padding: 0;
      }

      .toolbar-dropdown .tool-btn {
        width: 18px;
        height: 18px;
        min-width: 18px;
        padding: 0;
        font-size: 11px;
      }

      .list-style-btn svg {
        display: block;
      }

      .peekom-list-square {
        list-style-type: square;
      }

      .color-swatch-btn[data-color="theme"] {
        background: var(--note-text);
      }

      .image-staging-overlay {
        position: absolute;
        inset: 0;
        background: rgba(20, 26, 40, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 35;
        pointer-events: auto;
      }

      .image-staging-overlay.hidden {
        display: none;
      }

      .image-staging-card {
        width: min(300px, 92%);
        padding: 12px;
        border-radius: 12px;
        background: #fff;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }

      .image-staging-preview-wrap {
        position: relative;
        width: 100%;
        max-height: 200px;
        overflow: hidden;
        border-radius: 6px;
        background: #f4f6fa;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .image-staging-preview-wrap img {
        display: block;
        flex-shrink: 0;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .image-staging-crop-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .image-staging-crop-layer:not(.hidden) {
        pointer-events: auto;
      }

      .image-staging-crop-frame {
        position: absolute;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35), 0 0 0 9999px rgba(0, 0, 0, 0.35);
        cursor: move;
        box-sizing: border-box;
      }

      .image-staging-crop-ratios {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        justify-content: center;
        width: 100%;
      }

      .image-staging-crop-ratios button {
        height: 24px;
        padding: 0 8px;
        border: 1px solid #d7dde9;
        border-radius: 6px;
        background: #fff;
        font-size: 11px;
        cursor: pointer;
        color: #3c4043;
      }

      .image-staging-crop-ratios button.active {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, #fff);
        color: var(--accent);
      }

      .image-staging-card img#imageStagingPreview {
        max-width: none;
        max-height: none;
      }

      .image-staging-actions {
        display: flex;
        gap: 8px;
        width: 100%;
        justify-content: flex-end;
      }

      .image-staging-actions button {
        height: 30px;
        padding: 0 12px;
        border-radius: 8px;
        border: 1px solid #d7dde9;
        background: #fff;
        font-size: 12px;
        cursor: pointer;
      }

      .image-staging-actions button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .image-staging-scale-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        max-width: 240px;
      }

      .image-staging-scale-label {
        font-size: 11px;
        color: #64718b;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .image-staging-scale-wrap {
        flex: 1;
        min-width: 0;
      }

      .image-staging-scale {
        width: 100%;
        accent-color: var(--accent);
      }

      .memo-editor img.peekom-memo-image {
        display: inline-block;
        vertical-align: bottom;
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        margin: 2px 4px;
      }

      .memo-editor .peekom-image-wrap {
        display: inline;
        line-height: 0;
      }

      .memo-editor h1 {
        font-size: 1.45em;
        font-weight: 700;
        margin: 0.2em 0;
      }

      .memo-editor h2 {
        font-size: 1.25em;
        font-weight: 700;
        margin: 0.2em 0;
      }

      .memo-editor h3 {
        font-size: 1.1em;
        font-weight: 700;
        margin: 0.2em 0;
      }

      .first-run-tip {
        position: absolute;
        right: calc(var(--collapsed-width) + 10px);
        max-width: 220px;
        padding: 10px 11px;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.96);
        color: #404a60;
        font-size: 11px;
        line-height: 1.4;
        z-index: 18;
        pointer-events: auto;
      }

      .note-shell {
        position: absolute;
        top: calc(var(--handle-height) * var(--active-y-slot, 0));
        right: 0;
        width: 100%;
        height: var(--note-shell-height, 40vh);
        max-height: var(--note-shell-maxh, 40vh);
        padding: 10px 10px 6px;
        padding-right: calc(var(--collapsed-width) + 8px);
        border-radius: 12px 0 0 12px;
        background: var(--note-bg);
        transform: translateX(120%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: transform 280ms cubic-bezier(0.2, 1, 0.25, 1), opacity 150ms ease;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 1;
        overflow: hidden;
      }

      .floating-panel.expanded .note-shell {
        transform: translateX(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        z-index: 3;
      }

      .settings-icon-btn {
        display: none !important;
      }

      .note-editor-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        background: transparent;
        overflow: hidden;
      }

      .memo-editor {
        flex: 1;
        min-height: 0;
        padding: 10px 8px 6px;
        outline: none;
        overflow: auto;
        font-size: var(--memo-base-font-size, 18px);
        line-height: 1.52;
        color: var(--note-text);
        background: transparent;
        font-family: var(--note-font-family, "Segoe UI", sans-serif);
        word-break: break-word;
        pointer-events: auto;
      }

      .memo-editor div,
      .memo-editor p,
      .memo-editor li,
      .memo-editor span:not(.peekom-task-check) {
        font-size: inherit;
      }

      .memo-editor a[data-external] {
        color: var(--accent);
        text-decoration: underline;
        cursor: pointer;
      }

      .memo-editor a[data-external]:hover {
        filter: brightness(0.9);
      }

      .memo-editor ul,
      .memo-editor ol {
        margin-left: 18px;
      }

      .peekom-task-list {
        list-style: none;
        margin-left: 0;
        padding-left: 0;
      }

      .peekom-task-list li {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        margin-left: 0;
      }

      .peekom-task-check {
        flex-shrink: 0;
        width: 15px;
        height: 15px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        margin-top: 3px;
        font-size: 11px;
        line-height: 1;
        box-sizing: border-box;
      }

      .peekom-task-list li[data-checked="true"] .peekom-task-check::after {
        content: "✓";
        font-weight: 700;
        font-size: 10px;
      }

      .peekom-task-list li[data-checked="true"] {
        opacity: 0.72;
        text-decoration: line-through;
        text-decoration-color: color-mix(in srgb, currentColor 55%, transparent);
      }

      .memo-image-block {
        flex-shrink: 0;
        padding: 4px 8px 8px;
        border-top: 1px dashed rgba(70, 84, 115, 0.2);
        display: flex;
        flex-direction: column;
        gap: 4px;
        align-items: center;
      }

      .memo-image-block.hidden {
        display: none;
      }

      .memo-image-frame {
        position: relative;
        max-width: 100%;
        line-height: 0;
      }

      .memo-image-frame img {
        display: block;
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        user-select: none;
      }

      .memo-image-remove {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
      }

      .memo-image-scale {
        width: 100%;
        max-width: 180px;
        accent-color: var(--accent);
      }

      .memo-modal {
        position: absolute;
        inset: 0;
        background: rgba(20, 26, 40, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 40;
        pointer-events: auto;
      }

      .memo-modal.hidden {
        display: none;
      }

      .memo-modal-card {
        width: min(280px, 92%);
        padding: 14px 14px 12px;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      }

      .memo-modal-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 6px;
        color: #2f3750;
      }

      .memo-modal-desc {
        font-size: 12px;
        line-height: 1.45;
        color: #64718b;
        margin-bottom: 12px;
      }

      .memo-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .memo-modal-actions button {
        height: 30px;
        padding: 0 12px;
        border-radius: 8px;
        border: 1px solid #d7dde9;
        background: #fff;
        font-size: 12px;
        cursor: pointer;
      }

      .memo-modal-actions button.danger {
        border-color: #d04646;
        background: #d04646;
        color: #fff;
      }

      .note-footer {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: flex-start;
        gap: 0 6px;
        height: 30px;
        min-height: 30px;
        flex-shrink: 0;
        padding-top: 2px;
        color: var(--muted-text);
        font-size: 11px;
        overflow: visible;
        position: relative;
        z-index: 1;
      }

      .mode-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 22px;
        min-width: 42px;
        padding: 0 6px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        flex-shrink: 0;
        border: 0;
        cursor: pointer;
        position: relative;
      }
      .mode-chip:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .mode-chip[title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(30,36,54,0.92);
        color: #fff;
        font-size: 10px;
        font-weight: 400;
        white-space: nowrap;
        padding: 3px 7px;
        border-radius: 5px;
        pointer-events: none;
        z-index: 999;
      }

      .mode-chip.peek {
        background: #f8d878;
        color: #5c4a08;
      }

      .mode-chip.ice {
        background: #cfe5ff;
        color: #21518f;
      }

      .format-bar {
        display: inline-flex;
        flex-wrap: nowrap;
        gap: 0 2px;
        align-items: center;
        flex: 1;
        min-width: 0;
        justify-content: flex-start;
        overflow: visible;
      }

      .tool-btn {
        height: 26px;
        min-width: 26px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #3c4043;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        padding: 0 3px;
        transition: background 120ms ease;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .format-bar .tool-btn[data-tip]:hover::after,
      .toolbar-dropdown .tool-btn[data-tip]:hover::after,
      .toolbar-dropdown .color-swatch-btn[data-tip]:hover::after {
        content: attr(data-tip);
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(30, 36, 54, 0.92);
        color: #fff;
        font-size: 10px;
        font-weight: 400;
        white-space: nowrap;
        padding: 3px 7px;
        border-radius: 5px;
        pointer-events: none;
        z-index: 1000;
      }

      .toolbar-dropdown .color-swatch-btn[data-tip] {
        position: relative;
      }

      .tool-btn:hover {
        background: #f1f3f4;
      }

      .tool-btn.active {
        background: #e8eaed;
        color: #202124;
      }

      .tool-btn-icon svg {
        display: block;
      }

      .tool-group {
        display: inline-flex;
        align-items: center;
        gap: 1px;
        flex-shrink: 0;
      }

      .save-indicator {
        position: absolute;
        right: calc(var(--collapsed-width) + 12px);
        bottom: 8px;
        font-size: 10px;
        color: var(--muted-text);
        background: rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        padding: 2px 8px;
        opacity: 0;
        transition: opacity 280ms ease;
        pointer-events: none;
        z-index: 20;
      }

      .save-indicator.visible {
        opacity: 1;
      }

      .hidden {
        display: none !important;
      }

      @media (prefers-reduced-motion: reduce) {
        .note-shell {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <section id="panel" class="floating-panel" aria-label="Floating index panel">
        <div id="noteBacking" class="note-backing" aria-hidden="true"></div>
        <div id="handleColumn" class="handle-column" aria-hidden="false"></div>

        <div id="firstRunTip" class="first-run-tip hidden">
          손잡이를 클릭하면 인덱스가 나옵니다.<br />
          드래그하면 위치·순서를 바꿀 수 있어요.
        </div>

        <article id="noteShell" class="note-shell">
          <div class="note-editor-wrap">
            <div id="memoEditor" class="memo-editor" contenteditable="true"></div>
          </div>

          <div class="note-footer">
            <button id="modeChip" class="mode-chip peek" type="button">빼꼼</button>

            <div id="formatBar" class="format-bar">
              <div class="tool-group toolbar-dropdown-wrap" id="colorDropdownWrap">
                <button id="colorMenuBtn" class="tool-btn" type="button" data-tip-key="fmtTextColor"><u>A</u><span class="toolbar-caret">▾</span></button>
                <div class="toolbar-dropdown" id="colorDropdown">
                  <button class="color-swatch-btn" type="button" data-color="theme" data-tip-key="fmtColorDefault"></button>
                  <button class="color-swatch-btn" type="button" data-color="#D04646" data-tip-key="fmtColorRed" style="background:#D04646"></button>
                  <button class="color-swatch-btn" type="button" data-color="#2F67D8" data-tip-key="fmtColorBlue" style="background:#2F67D8"></button>
                  <button class="color-swatch-btn" type="button" data-color="#2A7C44" data-tip-key="fmtColorGreen" style="background:#2A7C44"></button>
                </div>
              </div>
              <div class="tool-group">
                <button class="tool-btn" type="button" data-cmd="bold" data-tip-key="fmtBold"><b>B</b></button>
                <button class="tool-btn" type="button" data-cmd="italic" data-tip-key="fmtItalic"><i>I</i></button>
                <button class="tool-btn" type="button" data-cmd="underline" data-tip-key="fmtUnderline"><u>U</u></button>
                <button class="tool-btn" type="button" data-cmd="strikeThrough" data-tip-key="fmtStrike"><s>S</s></button>
              </div>
              <div class="tool-group toolbar-dropdown-wrap" id="alignDropdownWrap">
                <button id="alignMenuBtn" class="tool-btn" type="button" data-tip-key="fmtAlignMenu">☰<span class="toolbar-caret">▾</span></button>
                <div class="toolbar-dropdown" id="alignDropdown">
                  <button class="tool-btn" type="button" data-align="justifyLeft" data-tip-key="fmtAlignLeft">☰</button>
                  <button class="tool-btn" type="button" data-align="justifyCenter" data-tip-key="fmtAlignCenter">☷</button>
                  <button class="tool-btn" type="button" data-align="justifyRight" data-tip-key="fmtAlignRight">☲</button>
                  <button class="tool-btn" type="button" data-align="justifyFull" data-tip-key="fmtAlignJustify">≡</button>
                </div>
              </div>
              <div class="tool-group toolbar-dropdown-wrap" id="listDropdownWrap">
                <button id="listMenuBtn" class="tool-btn tool-btn-icon" type="button" data-tip-key="fmtListMenu">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="5" cy="6" r="1.5" fill="currentColor"/>
                    <rect x="9" y="5.25" width="12" height="1.5" rx="0.75" fill="currentColor"/>

    <script>
      const ipcRenderer = {
        invoke: (channel, ...args) => window.peekom.invoke(channel, ...args),
        send: (channel, ...args) => window.peekom.send(channel, ...args),
        sendSync: (channel, ...args) => window.peekom.sendSync(channel, ...args),
        on(channel, listener) {
          return window.peekom.on(channel, (...args) => listener(null, ...args));
        }
      };

      let marked = window.peekom?.marked ?? null;

      function parseMarkdownInline(text) {
        if (marked && typeof marked.parseInline === "function") {
          return marked.parseInline(text);
        }
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function ti(key, vars) {
        if (typeof PeekomI18n === "undefined") return key;
        let text = PeekomI18n.t(key, PeekomI18n.getCurrentLang());
        if (vars) {
          Object.keys(vars).forEach((k) => {
            text = text.replace(new RegExp("\\{" + k + "\\}", "g"), vars[k]);
          });
        }
        return text;
      }

      function sanitizeMemoHtml(html) {
        if (typeof PeekomMemoSanitize !== "undefined" && PeekomMemoSanitize.sanitizeMemoHtml) {
          return PeekomMemoSanitize.sanitizeMemoHtml(html);
        }
        return html || "";
      }

      function notifySettingsChanged(fields) {
        ipcRenderer
          .invoke("settings:notify-changed", {
            skipMainReload: true,
            skipSettingsReload: false,
            partial: true,
            fields: Array.isArray(fields) ? fields : ["slots"],
            language: appState.global?.language
          })
          .catch(() => {});
      }

      function applyMainUiLabels() {
        const firstRunTip = document.getElementById("firstRunTip");
        if (firstRunTip) firstRunTip.innerHTML = ti("firstRunTipHtml");
        if (saveIndicator) saveIndicator.textContent = ti("saveIndicatorSaved");
        const deleteTitle = document.getElementById("deleteIndexModalTitle");
        if (deleteTitle) deleteTitle.textContent = ti("deleteIndexModalTitle");
        const deleteDesc = document.querySelector("#deleteIndexModal .memo-modal-desc");
        if (deleteDesc) deleteDesc.textContent = ti("deleteIndexModalDesc");
        if (deleteIndexCancelBtn) deleteIndexCancelBtn.textContent = ti("deleteIndexCancel");
        if (deleteIndexConfirmBtn) deleteIndexConfirmBtn.textContent = ti("deleteIndexConfirm");
        if (imageStagingCancelBtn) imageStagingCancelBtn.textContent = ti("imageStagingCancel");
        if (imageStagingConfirmBtn) imageStagingConfirmBtn.textContent = ti("imageStagingInsert");
        if (imageStagingPreview) imageStagingPreview.alt = ti("imagePreviewAlt");
        const cropFreeBtn = imageStagingCropRatios?.querySelector('[data-ratio="free"]');
        if (cropFreeBtn) cropFreeBtn.textContent = ti("imageCropFree");
        setPinned(isPinned);
        applyFormatBarTooltips();
      }

      const STATE_KEY = "ppaekkom-plus-state-v5";
      const STATE_KEY_BACKUP = "ppaekkom-plus-state-v5-backup";
      const STATE_KEY_V4 = "ppaekkom-plus-state-v4";
      const LEGACY_V3_KEY = "ppaekkom-app-state-v3";
      const FIRST_RUN_KEY = "ppaekkom-first-run-seen";
      const LEGACY_SETTINGS_KEY = "ppaekkom-app-settings-v2";
      const LEGACY_MEMO_KEY = "ppaekkom-memo-html-v2";

      ipcRenderer.on("shared-state:read-request", (_event, replyChannel) => {
        try {
          ipcRenderer.send(replyChannel, {
            raw: localStorage.getItem(STATE_KEY),
            backup: localStorage.getItem(STATE_KEY_BACKUP)
          });
        } catch (err) {
          ipcRenderer.send(replyChannel, { raw: null, backup: null, error: String(err?.message || err) });
        }
      });

      ipcRenderer.on("shared-state:write-request", (_event, payload = {}) => {
        const replyChannel = payload.replyChannel;
        try {
          const json = payload.json;
          if (typeof json !== "string" || json.length === 0) {
            ipcRenderer.send(replyChannel, { ok: false, reason: "INVALID_PAYLOAD" });
            return;
          }
          const prev = localStorage.getItem(STATE_KEY);
          if (prev) localStorage.setItem(STATE_KEY_BACKUP, prev);
          localStorage.setItem(STATE_KEY, json);
          ipcRenderer.send(replyChannel, { ok: true });
        } catch (err) {
          ipcRenderer.send(replyChannel, { ok: false, reason: String(err?.message || err) });
        }
      });

      const DEFAULT_HOVER_DELAY = 300;
      const LABEL_MAX = 6;
      const MAX_SLOTS = 10;
      const FREE_MAX_SLOTS = 3;
      const FREE_MAX_IMAGES_PER_MEMO = 1;
      const PLUS_MAX_IMAGES_PER_MEMO = 5;
      let isPremium = false;

      function getMaxEnabledSlots() {
        return isPremium ? MAX_SLOTS : FREE_MAX_SLOTS;
      }

      function enforceSlotLimits() {
        const max = getMaxEnabledSlots();
        if (appState.enabledCount > max) {
          appState.enabledCount = max;
          appState.order = normalizeOrder(appState.order, max);
          appState.activeSlot = clampSlotIndex(appState.activeSlot, max);
        }
      }
      const MAX_Y_SLOTS = 10;
      const PANEL_CONTENT_WIDTH = 420;
      const COLLAPSED_WIDTH = 32;
      const DRAG_THRESHOLD = 12;
      const SWAP_HOLD_MS = 400;
      const FONT_SIZE_MIN = 8;
      const FONT_SIZE_MAX = 36;
      const DEFAULT_FONT_SIZE = 18;
      const THEME_NAMES = ["yellow", "pink", "blue", "green", "custom"];
      const THEME_MAP = {
        yellow: { bg: "#FFF4B8", text: "#2F3750", accent: "#4A79FF" },
        pink: { bg: "#FFD9E8", text: "#3B3350", accent: "#B1457A" },
        blue: { bg: "#DDEBFF", text: "#2B3D5D", accent: "#2F67D8" },
        green: { bg: "#DCF5DE", text: "#2A4B38", accent: "#2A7C44" },
        custom: null
      };

      const URL_REGEX = /\b((?:https?:\/\/|www\.)[^\s<>"]+)/gi;

      function defaultGlobal() {
        return {
          anchor: "middle",
          lengthMode: "long",
          triggerMode: "hover",
          shortcut: "CommandOrControl+Shift+M",
          shortcutSlotPrev: "CommandOrControl+Shift+Up",
          shortcutSlotNext: "CommandOrControl+Shift+Down",
          hoverDelayMs: DEFAULT_HOVER_DELAY,
          manualYOffset: 0,
          openAtLogin: false,
          language: null,
          monitorMode: "auto",
          monitorTargetId: null,
          pinToggleMode: "dblclick",
          setupCompleted: false,
          showTrayIcon: true,
          memoAspectRatio: "3:4",
          imageLayout: "below",
          lastOpenedSlotIndex: 0,
          memoDefaultOpacity: 100
        };
      }

      function defaultSlot(index = 0) {
        return {
          label: "",
          theme: "yellow",
          memoHtml: "",
          ySlot: clamp(index, 0, MAX_Y_SLOTS - 1),
          ySlotUpdatedAt: 0,
          fontSize: DEFAULT_FONT_SIZE,
          customBg: "#FFF4B8",
          customText: "#2F3750",
          imageData: null,
          imageScale: 100,
          images: [],
          fontFamily: null
        };
      }

      function normalizeSlotImageEntry(raw) {
        if (!raw || typeof raw !== "object") return null;
        const dataUrl =
          typeof raw.dataUrl === "string" && raw.dataUrl.startsWith("data:image/") ? raw.dataUrl : null;
        if (!dataUrl) return null;
        return {
          id: typeof raw.id === "string" && raw.id ? raw.id : crypto.randomUUID(),
          sourcePath: typeof raw.sourcePath === "string" ? raw.sourcePath : null,
          dataUrl,
          scale:
            typeof raw.scale === "number" && Number.isFinite(raw.scale)
              ? clamp(Math.round(raw.scale), 50, 150)
              : 100,
          insertedAt: typeof raw.insertedAt === "string" ? raw.insertedAt : new Date().toISOString()
        };
      }

      function migrateLegacySlotImage(slot) {
        if (!slot || typeof slot !== "object") return slot;
        if (!Array.isArray(slot.images)) slot.images = [];
        if (slot.imageData && String(slot.imageData).startsWith("data:image/")) {
          const id = crypto.randomUUID();
          const scale = slot.imageScale ?? 100;
          const imgTag = `<p><img class="peekom-memo-image" data-peekom-id="${id}" src="${slot.imageData}" style="width:${scale}%;max-width:100%;" alt=""></p>`;
          if (!String(slot.memoHtml || "").includes("peekom-memo-image")) {
            slot.memoHtml = (slot.memoHtml || "") + imgTag;
          }
          slot.images.push({
            id,
            sourcePath: null,
            dataUrl: slot.imageData,
            scale,
            insertedAt: new Date().toISOString()
          });
          slot.imageData = null;
          slot.imageScale = 100;
        }
        if (slot.theme === "custom" && !isPremium) {
          slot.theme = "yellow";
        }
        return slot;
      }

      function normalizeSlot(raw, index) {
        const base = defaultSlot(index);
        const slot = {
          label: typeof raw?.label === "string" ? raw.label.slice(0, LABEL_MAX) : "",
          theme: THEME_NAMES.includes(raw?.theme) ? raw.theme : "yellow",
          memoHtml: typeof raw?.memoHtml === "string" ? raw.memoHtml : "",
          ySlot: clamp(
            typeof raw?.ySlot === "number" && Number.isFinite(raw.ySlot)
              ? Math.round(raw.ySlot)
              : index,
            0,
            MAX_Y_SLOTS - 1
          ),
          ySlotUpdatedAt:
            typeof raw?.ySlotUpdatedAt === "number" && Number.isFinite(raw.ySlotUpdatedAt)
              ? raw.ySlotUpdatedAt
              : 0,
          fontSize: clamp(
            typeof raw?.fontSize === "number" && Number.isFinite(raw.fontSize)
              ? Math.round(raw.fontSize)
              : DEFAULT_FONT_SIZE,
            FONT_SIZE_MIN,
            FONT_SIZE_MAX
          ),
          customBg:
            typeof raw?.customBg === "string" && /^#[0-9A-Fa-f]{6}$/.test(raw.customBg)
              ? raw.customBg
              : base.customBg,
          customText:
            typeof raw?.customText === "string" && /^#[0-9A-Fa-f]{6}$/.test(raw.customText)
              ? raw.customText
              : base.customText,
          imageData: null,
          imageScale: 100,
          images: Array.isArray(raw?.images)
            ? raw.images.map(normalizeSlotImageEntry).filter(Boolean)
            : [],
          fontFamily:
            typeof raw?.fontFamily === "string" && raw.fontFamily.trim().length > 0
              ? raw.fontFamily.trim()
              : null
        };
        if (
          typeof raw?.imageData === "string" &&
          raw.imageData.startsWith("data:image/") &&
          !slot.images.length
        ) {
          slot.imageData = raw.imageData;
          slot.imageScale =
            typeof raw?.imageScale === "number" && Number.isFinite(raw.imageScale)
              ? clamp(Math.round(raw.imageScale), 50, 150)
              : 100;
        }
        return migrateLegacySlotImage(slot);
      }

      function createFreshState() {
        return {
          version: 5,
          global: defaultGlobal(),
          enabledCount: 1,
          slots: Array.from({ length: MAX_SLOTS }, (_, i) => defaultSlot(i)),
          order: [0],
          activeSlot: 0
        };
      }

      function normalizeMemoAspectRatio(ratio) {
        return ratio === "1:1" ? "1:1" : "3:4";
      }

      function migrateFromV4(v4) {
        const global = { ...defaultGlobal(), ...v4.global };
        delete global.panelEdge;
        global.memoAspectRatio = normalizeMemoAspectRatio(global.memoAspectRatio);
        return {
          version: 5,
          global,
          enabledCount: clamp(Math.round(v4.enabledCount) || 1, 1, MAX_SLOTS),
          slots: v4.slots.map((sl, i) => normalizeSlot(sl, i)),
          order: normalizeOrder(v4.order, clamp(Math.round(v4.enabledCount) || 1, 1, MAX_SLOTS)),
          activeSlot: clampSlotIndex(v4.activeSlot, clamp(Math.round(v4.enabledCount) || 1, 1, MAX_SLOTS))
        };
      }

      function migrateFromV3(v3) {
        const enabledCount = clamp(Math.round(v3.enabledCount) || 1, 1, MAX_SLOTS);
        const slots = Array.from({ length: MAX_SLOTS }, (_, i) => defaultSlot(i));
        for (let i = 0; i < Math.min(3, MAX_SLOTS); i++) {
          if (v3.slots?.[i]) {
            slots[i] = normalizeSlot(v3.slots[i], i);
          }
        }
        return {
          version: 5,
          global: { ...defaultGlobal(), ...v3.global },
          enabledCount,
          slots,
          order: normalizeOrder(v3.order, enabledCount),
          activeSlot: clampSlotIndex(v3.activeSlot, enabledCount)
        };
      }

      function migrateLegacy() {
        let g = defaultGlobal();
        try {
          const raw = localStorage.getItem(LEGACY_SETTINGS_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            g = { ...g, ...parsed };
          }
        } catch {
          /* ignore */
        }
        const memoHtml = localStorage.getItem(LEGACY_MEMO_KEY) || "";
        const theme = g.theme || "yellow";
        delete g.theme;
        return {
          version: 5,
          global: g,
          enabledCount: 1,
          slots: Array.from({ length: MAX_SLOTS }, (_, i) =>
            i === 0 ? { ...defaultSlot(0), theme, memoHtml } : defaultSlot(i)
          ),
          order: [0],
          activeSlot: 0
        };
      }

      function ensureMinimumOneSlot(state) {
        if (!state.enabledCount || state.enabledCount < 1) {
          state.enabledCount = 1;
          if (!state.slots[0] || typeof state.slots[0].memoHtml !== "string") {
            state.slots[0] = defaultSlot(0);
          }
          state.order = [0];
          state.activeSlot = 0;
        }
        return state;
      }

      function tryParseV5State(raw) {
        if (!raw) return null;
        try {
          const s = JSON.parse(raw);
          if (!s || s.version !== 5 || !Array.isArray(s.slots) || s.slots.length !== MAX_SLOTS) return null;
          s.global = { ...defaultGlobal(), ...s.global };
          delete s.global.imageSize;
          delete s.global.panelEdge;
          s.global.memoAspectRatio = normalizeMemoAspectRatio(s.global.memoAspectRatio);
          if (!s.global.setupCompleted && s.enabledCount > 1) {
            s.enabledCount = 1;
            s.order = [0];
            s.activeSlot = 0;
          }
          s.slots = s.slots.map((sl, i) => normalizeSlot(sl, i));
          s.enabledCount = clamp(Math.round(s.enabledCount) || 1, 1, MAX_SLOTS);
          s.order = normalizeOrder(s.order, s.enabledCount);
          s.activeSlot = clampSlotIndex(s.activeSlot, s.enabledCount);
          return ensureMinimumOneSlot(s);
        } catch {
          return null;
        }
      }

      async function reloadAppStateFromDisk() {
        try {
          const res = await ipcRenderer.invoke("shared-state:get");
          if (res?.ok) {
            const parsed =
              tryParseV5State(res.raw) || tryParseV5State(res.backup);
            if (parsed) return parsed;
          }
        } catch (err) {
          console.error(err);
        }
        return loadState();
      }

      function loadState() {
        try {
          const parsed = tryParseV5State(localStorage.getItem(STATE_KEY));
          if (parsed) return parsed;
        } catch {
          /* try backup */
        }

        try {
          const parsedBackup = tryParseV5State(localStorage.getItem(STATE_KEY_BACKUP));
          if (parsedBackup) return parsedBackup;
        } catch {
          /* fallthrough */
        }

        try {
          const rawV4 = localStorage.getItem(STATE_KEY_V4);
          if (rawV4) {
            const v4 = JSON.parse(rawV4);
            if (v4 && v4.version === 4 && Array.isArray(v4.slots) && v4.slots.length === MAX_SLOTS) {
              return ensureMinimumOneSlot(migrateFromV4(v4));
            }
          }

          const rawV3 = localStorage.getItem(LEGACY_V3_KEY);
          if (rawV3) {
            const v3 = JSON.parse(rawV3);
            if (v3 && v3.version === 3 && Array.isArray(v3.slots)) {
              return ensureMinimumOneSlot(migrateFromV3(v3));
            }
          }
        } catch {
          /* fallthrough */
        }
        return migrateLegacy();
      }

      function saveState(state) {
        try {
          const prev = localStorage.getItem(STATE_KEY);
          if (prev) localStorage.setItem(STATE_KEY_BACKUP, prev);
        } catch {
          /* ignore */
        }
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
      }

      function clamp(n, a, b) {
        return Math.max(a, Math.min(b, n));
      }

      function clampSlotIndex(slot, enabledCount) {
        return clamp(slot, 0, enabledCount - 1);
      }

      function normalizeOrder(order, enabledCount) {
        const base = [];
        for (let i = 0; i < enabledCount; i++) base.push(i);
        if (!Array.isArray(order) || order.length !== enabledCount) return base;
        const set = new Set(order);
        if (set.size !== enabledCount) return base;
        for (let i = 0; i < enabledCount; i++) {
          if (!set.has(i)) return base;
        }
        return order;
      }

      /** @type {ReturnType<typeof createFreshState>} */
      let appState = createFreshState();
      let appSettings = { ...defaultGlobal() };

      const panel = document.getElementById("panel");
      const handleColumn = document.getElementById("handleColumn");
      const noteShell = document.getElementById("noteShell");
      const noteBacking = document.getElementById("noteBacking");
      const memoEditor = document.getElementById("memoEditor");
      const modeChip = document.getElementById("modeChip");
      const firstRunTip = document.getElementById("firstRunTip");
      const listMenuBtn = document.getElementById("listMenuBtn");
      const clipImageBtn = document.getElementById("clipImageBtn");
      const saveIndicator = document.getElementById("saveIndicator");
      const handleContextMenu = document.getElementById("handleContextMenu");
      const imageStagingOverlay = document.getElementById("imageStagingOverlay");
      const imageStagingPreview = document.getElementById("imageStagingPreview");
      const imageStagingPreviewWrap = document.getElementById("imageStagingPreviewWrap");
      const imageStagingCropLayer = document.getElementById("imageStagingCropLayer");
      const imageStagingCropFrame = document.getElementById("imageStagingCropFrame");
      const imageStagingCropRatios = document.getElementById("imageStagingCropRatios");
      const imageStagingSlider = document.getElementById("imageStagingSlider");
      const imageStagingSliderWrap = document.getElementById("imageStagingSliderWrap");
      const imageStagingCancelBtn = document.getElementById("imageStagingCancelBtn");
      const imageStagingConfirmBtn = document.getElementById("imageStagingConfirmBtn");
      const deleteIndexModal = document.getElementById("deleteIndexModal");
      const deleteIndexCancelBtn = document.getElementById("deleteIndexCancelBtn");
      const deleteIndexConfirmBtn = document.getElementById("deleteIndexConfirmBtn");

      let isExpanded = false;
      let isPinned = false;
      let hoverTimer = null;
      let settingsRevealTimer = null;
      let hoverDelayMs = DEFAULT_HOVER_DELAY;
      let saveIndicatorTimer = null;
      let urlScanTimer = null;
      let markdownInputRaf = null;
      let peekCollapseDelayTimer = null;

      let draggingHandle = false;
      let dragMoved = false;
      let lastDragY = 0;

      let dragMode = null;
      let dragPointerId = null;
      let dragStartX = 0;
      let dragStartY = 0;
      let reorderSlot = null;
      let swapTimer = null;
      let swapTargetSlot = null;
      let lastReorderPointer = { clientX: 0, clientY: 0 };
      /** @type {HTMLElement | null} */
      let pointerCaptureEl = null;

      /** @type {{ dataUrl: string, filePath: string | null, scale: number } | null} */
      let imageStaging = null;
      let memoEditorFocused = false;
      let toolbarDropdownOpen = false;
      let handleContextMenuOpen = false;

      function clearPeekCollapseDelayTimer() {
        if (peekCollapseDelayTimer) {
          clearTimeout(peekCollapseDelayTimer);
          peekCollapseDelayTimer = null;
        }
      }

      function clearHoverTimer() {
        if (hoverTimer) {
          clearTimeout(hoverTimer);
          hoverTimer = null;
        }
      }

      function clearRevealTimer() {
        if (settingsRevealTimer) {
          clearTimeout(settingsRevealTimer);
          settingsRevealTimer = null;
        }
      }

      function clearSwapTimer() {
        if (swapTimer) {
          clearTimeout(swapTimer);
          swapTimer = null;
        }
        swapTargetSlot = null;
      }

      function showSaveIndicator() {
        if (!saveIndicator) return;
        saveIndicator.classList.add("visible");
        if (saveIndicatorTimer) clearTimeout(saveIndicatorTimer);
        saveIndicatorTimer = setTimeout(() => {
          saveIndicator.classList.remove("visible");
        }, 1200);
      }

      function persistActiveMemo() {
        const slot = appState.activeSlot;
        syncSlotImagesFromMemo(slot);
        appState.slots[slot].memoHtml = sanitizeMemoHtml(memoEditor.innerHTML);
        try {
          const raw = localStorage.getItem(STATE_KEY);
          if (raw) {
            const disk = JSON.parse(raw);
            if (disk && disk.version === 5 && Array.isArray(disk.slots) && disk.slots.length === MAX_SLOTS) {
              disk.slots[slot].memoHtml = appState.slots[slot].memoHtml;
              disk.slots[slot].imageScale = appState.slots[slot].imageScale;
              const src = appState.slots[slot];
              const dst = disk.slots[slot];
              dst.theme = src.theme;
              dst.customBg = src.customBg;
              dst.customText = src.customText;
              dst.fontSize = src.fontSize;
              dst.fontFamily = src.fontFamily;
              dst.label = src.label;
              dst.ySlot = src.ySlot;
              dst.ySlotUpdatedAt = src.ySlotUpdatedAt;
              appState.global = { ...defaultGlobal(), ...disk.global };
              saveState(disk);
              showSaveIndicator();
              notifySettingsChanged(["memoHtml", "images"]);
              return;
            }
          }
        } catch {
          /* fallthrough */
        }
        saveState(appState);
        showSaveIndicator();
        notifySettingsChanged(["memoHtml", "images"]);
      }

      function resolveYSlotConflicts(slots, enabledCount) {
        const entries = [];
        for (let i = 0; i < enabledCount; i++) {
          entries.push({
            slot: i,
            ySlot: clamp(slots[i].ySlot ?? i, 0, MAX_Y_SLOTS - 1),
            at: slots[i].ySlotUpdatedAt ?? 0
          });
        }
        entries.sort((a, b) => b.at - a.at);
        const occupied = new Set();
        const displaced = [];
        for (const e of entries) {
          if (!occupied.has(e.ySlot)) {
            occupied.add(e.ySlot);
            slots[e.slot].ySlot = e.ySlot;
          } else {
            displaced.push(e.slot);
          }
        }
        for (const slot of displaced) {
          let free = 0;
          while (occupied.has(free) && free < MAX_Y_SLOTS) free++;
          if (free < MAX_Y_SLOTS) {
            occupied.add(free);
            slots[slot].ySlot = free;
          }
        }
      }

      function getMemoDimensions() {
        const handleUnit = window.innerHeight / MAX_Y_SLOTS;
        const ratio = normalizeMemoAspectRatio(appState.global.memoAspectRatio);
        let widthPx = 3 * handleUnit;
        let heightPx = ratio === "1:1" ? 3 * handleUnit : 4 * handleUnit;
        const maxW = window.innerWidth - COLLAPSED_WIDTH - 8;
        widthPx = Math.min(widthPx, maxW);
        return { widthPx, heightPx, handleUnit };
      }

      function loadMemoForActiveSlot() {
        const slotIndex = appState.activeSlot;
        memoEditor.innerHTML = sanitizeMemoHtml(appState.slots[slotIndex].memoHtml || "");
        syncSlotImagesFromMemo(slotIndex);
        normalizeMemoTypography(slotIndex);
        scanAndLinkifyEditor(true);
      }

      function applyFontSizeForSlot(slotIndex) {
        const size = appState.slots[slotIndex]?.fontSize ?? DEFAULT_FONT_SIZE;
        document.documentElement.style.setProperty("--memo-base-font-size", `${size}px`);
        memoEditor.style.fontSize = `${size}px`;
      }

      function isMemoBlockEmpty(el) {
        if (!el) return true;
        const text = (el.textContent || "").trim();
        return !text && !el.querySelector("img.peekom-memo-image");
      }

      function unwrapMemoFontTags(root) {
        root.querySelectorAll("font").forEach((font) => {
          const parent = font.parentNode;
          if (!parent) return;
          while (font.firstChild) parent.insertBefore(font.firstChild, font);
          parent.removeChild(font);
        });
      }

      function stripMemoInlineFontSizes(root) {
        root.querySelectorAll("*").forEach((el) => {
          if (el === root) return;
          if (el.style?.fontSize) el.style.removeProperty("font-size");
          if (el.tagName === "FONT" && el.hasAttribute("size")) el.removeAttribute("size");
        });
      }

      function demoteEmptyMarkdownBlocks(root) {
        root.querySelectorAll("h1, h2, h3, ul, ol").forEach((block) => {
          if (!isMemoBlockEmpty(block)) return;
          const div = document.createElement("div");
          div.appendChild(document.createElement("br"));
          block.parentNode?.replaceChild(div, block);
        });
      }

      function normalizeMemoTypography(slotIndex, options = {}) {
        const { preserveCaret = false } = options;
        const caret = preserveCaret ? getCaretCharOffset(memoEditor) : null;
        applyFontSizeForSlot(slotIndex);
        unwrapMemoFontTags(memoEditor);
        stripMemoInlineFontSizes(memoEditor);
        demoteEmptyMarkdownBlocks(memoEditor);
        if (preserveCaret && caret !== null) {
          setCaretByCharOffset(memoEditor, caret);
        }
      }

      function adjustFontSize(delta) {
        const slot = appState.activeSlot;
        const next = clamp(
          (appState.slots[slot].fontSize ?? DEFAULT_FONT_SIZE) + delta,
          FONT_SIZE_MIN,
          FONT_SIZE_MAX
        );
        appState.slots[slot].fontSize = next;
        applyFontSizeForSlot(slot);
        normalizeMemoTypography(slot, { preserveCaret: true });
        saveState(appState);
        notifySettingsChanged(["fontSize"]);
      }

      function withAlpha(hex, alpha) {
        const h = String(hex || "#FFF4B8").replace("#", "");
        if (h.length !== 6) return hex;
        const r = parseInt(h.slice(0, 2), 16);
        const g = parseInt(h.slice(2, 4), 16);
        const b = parseInt(h.slice(4, 6), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function parseHexRgb(hex) {
        const h = String(hex || "#FFF4B8").replace("#", "");
        if (h.length !== 6) return [255, 244, 184];
        return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
      }

      function blendHexColors(primary, secondary, primaryWeight) {
        const [r1, g1, b1] = parseHexRgb(primary);
        const [r2, g2, b2] = parseHexRgb(secondary);
        const w = primaryWeight;
        const r = Math.round(r1 * w + r2 * (1 - w));
        const g = Math.round(g1 * w + g2 * (1 - w));
        const b = Math.round(b1 * w + b2 * (1 - w));
        return `rgb(${r}, ${g}, ${b})`;
      }

      function applyThemeForSlot(slotIndex) {
        const slot = appState.slots[slotIndex];
        let themeName = slot.theme;
        let bg;
        let text;
        let accent;

        if (themeName === "custom" && isPremium) {
          bg = slot.customBg || "#FFF4B8";
          text = slot.customText || "#2F3750";
          accent = "#4A79FF";
        } else if (themeName === "custom") {
          themeName = "yellow";
          const theme = THEME_MAP.yellow;
          bg = theme.bg;
          text = theme.text;
          accent = theme.accent;
        } else {
          const safeTheme = THEME_MAP[themeName] ? themeName : "yellow";
          const theme = THEME_MAP[safeTheme];
          bg = theme.bg;
          text = theme.text;
          accent = theme.accent;
        }

        const opacityPct = isPremium
          ? clamp(Number(appState.global.memoDefaultOpacity) || 100, 30, 100)
          : 100;
        document.documentElement.style.setProperty("--note-bg", withAlpha(bg, opacityPct / 100));
        document.documentElement.style.setProperty("--note-text", text);
        document.documentElement.style.setProperty("--accent", accent);
        const ff = isPremium && slot.fontFamily ? slot.fontFamily : "";
        document.documentElement.style.setProperty(
          "--note-font-family",
          ff
            ? `"${ff.replace(/"/g, "")}", "Segoe UI", sans-serif`
            : '"Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif'
        );
        refreshAllHandleThemes();
      }

      let lastPanelLayoutKey = "";

      function updatePanelPosition() {
        const ySlot = appState.slots[appState.activeSlot]?.ySlot ?? 0;
        const { widthPx, heightPx, handleUnit } = getMemoDimensions();
        const totalH = window.innerHeight;
        const handleTopPx = ySlot * handleUnit;
        const availableBelow = totalH - handleTopPx;
        let topPx;
        if (availableBelow >= heightPx) {
          topPx = handleTopPx;
        } else {
          topPx = Math.max(0, handleTopPx + handleUnit - heightPx);
        }
        const finalHeight = Math.min(heightPx, totalH - topPx);
        const layoutKey = `${ySlot}|${widthPx}|${finalHeight}|${topPx}`;
        if (layoutKey === lastPanelLayoutKey) return;
        lastPanelLayoutKey = layoutKey;

        document.documentElement.style.setProperty("--active-y-slot", String(ySlot));
        noteShell.style.top = `${topPx}px`;
        noteShell.style.right = "0";
        noteShell.style.left = "auto";
        noteShell.style.width = `${widthPx + COLLAPSED_WIDTH}px`;
        noteShell.style.height = `${finalHeight}px`;
        noteShell.style.maxHeight = `${finalHeight}px`;
        noteShell.style.paddingRight = `calc(${COLLAPSED_WIDTH}px + 8px)`;
        if (noteBacking) {
          noteBacking.style.top = `${topPx}px`;
          noteBacking.style.right = "0";
          noteBacking.style.width = `${widthPx + COLLAPSED_WIDTH}px`;
          noteBacking.style.height = `${finalHeight}px`;
        }
        document.documentElement.style.setProperty("--note-shell-height", `${finalHeight}px`);
        document.documentElement.style.setProperty("--note-shell-maxh", `${finalHeight}px`);

        firstRunTip.style.top = `${topPx + 14}px`;
        firstRunTip.style.bottom = "auto";
        firstRunTip.style.left = "";
      }

      function getSlotHeightPx() {
        return window.innerHeight / MAX_Y_SLOTS;
      }

      function pixelYToSlot(pixelY) {
        const slotH = getSlotHeightPx();
        if (slotH <= 0) return 0;
        return clamp(Math.round(pixelY / slotH), 0, MAX_Y_SLOTS - 1);
      }

      /** 손잡이·메모·설정버튼 등 실제 인터랙션이 있는 영역 */
      const HIT_TARGET_SELECTOR =
        ".edge-handle, .floating-panel.expanded .note-shell, .first-run-tip:not(.hidden), #handleContextMenu, #handleContextMenu *, #peekomPremiumModal, #peekomPremiumModal *";
      /** OS 폴링이 연속으로 "바깥" 판정할 때만 접기 (창 리사이즈 false-positive 방지) */
      const COLLAPSE_CONFIRM_POLLS = 2;

      let hitTestRafId = null;
      /** 연속으로 인덱스 바깥에 있는 폴링 횟수 카운터 */
      let consecutiveOutsidePollCount = 0;

      function isPremiumModalOpen() {
        const el = document.getElementById("peekomPremiumModal");
        return Boolean(el && !el.classList.contains("hidden"));
      }

      function isInteractiveHitTarget(el) {
        return Boolean(el && el.closest(HIT_TARGET_SELECTOR));
      }

      function shouldAutoCollapseOnHoverOutside() {
        return (
          isExpanded &&
          !isPinned &&
          appState.global.triggerMode === "hover" &&
          !draggingHandle &&
          !imageStaging &&
          !handleContextMenuOpen &&
          !toolbarDropdownOpen
        );
      }

      function refreshAutoCollapsePolicy() {
        syncPeekAutoCollapseToMain();
      }

      async function syncWindowInteraction(partial = {}) {
        try {
          await ipcRenderer.invoke("window:sync-interaction", partial);
        } catch (error) {
          console.error(error);
        }
      }

      async function syncPeekAutoCollapseToMain() {
        try {
          await ipcRenderer.invoke("window:set-peek-auto-collapse", shouldAutoCollapseOnHoverOutside());
        } catch (error) {
          console.error(error);
        }
      }

      function collapseIfOutsideIndexFromPoll(payload = {}) {
        if (!shouldAutoCollapseOnHoverOutside()) {
          consecutiveOutsidePollCount = 0;
          clearPeekCollapseDelayTimer();
          return;
        }

        let isOutside = false;

        if (payload.outsideWindow) {
          isOutside = true;
        } else {
          const x = payload.clientX;
          const y = payload.clientY;
          if (typeof x === "number" && typeof y === "number" && x >= 0 && y >= 0) {
            const el = document.elementFromPoint(x, y);
            isOutside = !isInteractiveHitTarget(el);
          }
        }

        if (isOutside) {
          consecutiveOutsidePollCount++;
          if (consecutiveOutsidePollCount >= COLLAPSE_CONFIRM_POLLS && !peekCollapseDelayTimer) {
            consecutiveOutsidePollCount = 0;
            peekCollapseDelayTimer = setTimeout(() => {
              peekCollapseDelayTimer = null;
              if (shouldAutoCollapseOnHoverOutside()) {
                setExpanded(false);
              }
            }, hoverDelayMs);
          }
        } else {
          consecutiveOutsidePollCount = 0;
          clearPeekCollapseDelayTimer();
        }
      }

      async function syncPanelLayoutToMain() {
        try {
          await ipcRenderer.invoke("window:set-panel-expanded", isExpanded);
        } catch (error) {
          console.error(error);
        }
        refreshPointerHitTest({ clientX: -1, clientY: -1 }, true);
      }

      function refreshPointerHitTest(event, force = false) {
        if (!force && hitTestRafId !== null) return;
        if (hitTestRafId !== null) {
          cancelAnimationFrame(hitTestRafId);
        }

        hitTestRafId = requestAnimationFrame(() => {
          hitTestRafId = null;

          if (isPremiumModalOpen()) {
            syncWindowInteraction({ ignoreMouse: false, pointerOver: true });
            return;
          }

          if (!isExpanded) {
            const x = typeof event.clientX === "number" ? event.clientX : -1;
            const y = typeof event.clientY === "number" ? event.clientY : -1;
            const hasValidCoords = x >= 0 && y >= 0;
            const el = hasValidCoords ? document.elementFromPoint(x, y) : null;
            const overHandle = Boolean(el && el.closest(".edge-handle"));
            syncWindowInteraction({
              ignoreMouse: !overHandle,
              pointerOver: overHandle
            });
            return;
          }

          const x = typeof event.clientX === "number" ? event.clientX : -1;
          const y = typeof event.clientY === "number" ? event.clientY : -1;
          const hasValidCoords = x >= 0 && y >= 0;

          if (!hasValidCoords) {
            syncWindowInteraction({
              ignoreMouse: false,
              pointerOver: true
            });
            return;
          }

          const el = document.elementFromPoint(x, y);
          const interactive = isInteractiveHitTarget(el);

          // 클릭 통과 제어만 담당. 접힘은 OS 폴링(collapseIfOutsideIndexFromPoll)만 담당.
          syncWindowInteraction({
            ignoreMouse: !interactive,
            pointerOver: interactive
          });
        });
      }

      function setExpanded(nextExpanded) {
        if (!nextExpanded && isExpanded) {
          persistActiveMemo();
        }
        isExpanded = nextExpanded;
        consecutiveOutsidePollCount = 0;
        panel.classList.toggle("expanded", nextExpanded);

        if (!nextExpanded) {
          clearRevealTimer();
          clearPeekCollapseDelayTimer();
          hideHandleContextMenu();
        } else {
          clearPeekCollapseDelayTimer();
          if (noteBacking) {
            noteBacking.setAttribute("aria-hidden", "false");
          }
        }

        if (!nextExpanded && noteBacking) {
          noteBacking.setAttribute("aria-hidden", "true");
        }

        syncPanelLayoutToMain();
        syncPeekAutoCollapseToMain();
        refreshAllHandleThemes();
        if (nextExpanded) {
          syncWindowInteraction({ ignoreMouse: false, pointerOver: true });
          requestAnimationFrame(() => {
            updatePanelPosition();
            memoEditor?.focus();
          });
        } else {
          requestAnimationFrame(() => updatePanelPosition());
        }
      }

      function setPinned(nextPinned) {
        isPinned = nextPinned;
        modeChip.textContent = nextPinned ? ti("modeIce") : ti("modePeek");
        modeChip.removeAttribute("title");
        modeChip.classList.toggle("ice", nextPinned);
        modeChip.classList.toggle("peek", !nextPinned);
        syncPeekAutoCollapseToMain();
      }

      function handleLabelDisplay(slotIndex) {
        if (typeof PeekomI18n !== "undefined" && PeekomI18n.resolveSlotLabel) {
          return PeekomI18n.resolveSlotLabel(appState.slots[slotIndex].label, slotIndex, LABEL_MAX);
        }
        const raw = appState.slots[slotIndex].label.trim();
        if (raw.length > 0) return raw.slice(0, LABEL_MAX);
        return String(slotIndex + 1);
      }

      function getThemeColorsForSlot(slotIndex) {
        const slot = appState.slots[slotIndex];
        if (slot.theme === "custom" && isPremium) {
          return { bg: slot.customBg || "#FFF4B8", text: slot.customText || "#2F3750" };
        }
        const theme = THEME_MAP[slot.theme === "custom" ? "yellow" : slot.theme] || THEME_MAP.yellow;
        return { bg: theme.bg, text: theme.text };
      }

      function getMemoOpacityAlpha() {
        return isPremium
          ? clamp(Number(appState.global.memoDefaultOpacity) || 100, 30, 100) / 100
          : 1;
      }

      function rgbaFromRgb(rgbStr, alpha) {
        const m = String(rgbStr || "").match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
        if (!m) return rgbStr;
        return `rgba(${m[1]},${m[2]},${m[3]},${alpha})`;
      }

      function applyHandleThemeStyles(btn, slotIndex) {
        const themeColors = getThemeColorsForSlot(slotIndex);
        const alpha = getMemoOpacityAlpha();
        const isActiveExpanded = isExpanded && slotIndex === appState.activeSlot;
        btn.style.setProperty("--handle-bg", withAlpha(themeColors.bg, alpha));
        btn.style.setProperty("--handle-text", themeColors.text);
        if (isActiveExpanded) {
          btn.style.background = "";
          btn.style.color = "";
        } else {
          const mixWeight = slotIndex === appState.activeSlot ? 0.78 : 0.9;
          const blended = blendHexColors(themeColors.bg, themeColors.text, mixWeight);
          btn.style.background = alpha < 1 ? rgbaFromRgb(blended, alpha) : blended;
          btn.style.color = themeColors.text;
        }
      }

      function refreshAllHandleThemes() {
        handleColumn.querySelectorAll(".edge-handle").forEach((btn) => {
          const slotIndex = Number(btn.dataset.slotIndex);
          if (Number.isFinite(slotIndex)) applyHandleThemeStyles(btn, slotIndex);
        });
      }

      function hideHandleContextMenu() {
        handleContextMenuOpen = false;
        handleContextMenu?.classList.add("hidden");
        handleContextMenu.innerHTML = "";
        refreshPointerHitTest();
        refreshAutoCollapsePolicy();
      }

      function showHandleContextMenu(clientX, clientY, items) {
        if (!handleContextMenu || !items.length) return;
        handleContextMenu.innerHTML = "";
        items.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = item.label;
          btn.disabled = Boolean(item.disabled);
          if (item.danger) btn.classList.add("danger");
          btn.addEventListener("click", (event) => {
            event.stopPropagation();
            hideHandleContextMenu();
            item.action?.();
          });
          handleContextMenu.appendChild(btn);
        });
        handleContextMenu.classList.remove("hidden");
        handleContextMenuOpen = true;
        handleContextMenu.style.left = `${clientX}px`;
        handleContextMenu.style.top = `${clientY}px`;
        requestAnimationFrame(() => {
          const rect = handleContextMenu.getBoundingClientRect();
          let left = clientX;
          let top = clientY;
          if (left + rect.width > window.innerWidth - 8) {
            left = Math.max(8, window.innerWidth - rect.width - 8);
          }
          if (top + rect.height > window.innerHeight - 8) {
            top = Math.max(8, window.innerHeight - rect.height - 8);
          }
          handleContextMenu.style.left = `${left}px`;
          handleContextMenu.style.top = `${top}px`;
          refreshPointerHitTest();
        });
      }

      function onHandleContextMenu(event) {
        event.preventDefault();
        event.stopPropagation();
        if (draggingHandle) return;
        const btn = event.currentTarget;
        const slot = Number(btn.dataset.slotIndex);
        const items = [];

        const max = getMaxEnabledSlots();
        if (appState.enabledCount < max) {
          items.push({
            label: ti("handleAddIndex"),
            action: () => addIndexAtBottom()
          });
        } else if (!isPremium) {
          items.push({
            label: ti("handleUpgradePlus"),
            action: () => window.PeekomPremiumUI?.showPremiumModal()
          });
        }

        items.push({
          label: ti("handleDeleteIndex"),
          danger: true,
          disabled: appState.enabledCount <= 1,
          action: () => {
            if (appState.enabledCount <= 1) return;
            if (appState.activeSlot !== slot) {
              persistActiveMemo();
              appState.activeSlot = slot;
              applyThemeForSlot(slot);
              loadMemoForActiveSlot();
              updateActiveHandle(slot);
            }
            deleteCurrentIndexWithConfirm();
          }
        });

        showHandleContextMenu(event.clientX, event.clientY, items);
      }

      function onHandleColumnContextMenu(event) {
        if (event.target.closest(".edge-handle")) return;
        event.preventDefault();
        event.stopPropagation();
        if (draggingHandle) return;
        const max = getMaxEnabledSlots();
        if (appState.enabledCount >= max) {
          if (!isPremium) {
            showHandleContextMenu(event.clientX, event.clientY, [
              {
                label: ti("handleUpgradePlus"),
                action: () => window.PeekomPremiumUI?.showPremiumModal()
              }
            ]);
          }
          return;
        }
        showHandleContextMenu(event.clientX, event.clientY, [
          {
            label: ti("handleAddIndex"),
            action: () => addIndexAtBottom()
          }
        ]);
      }

      function renderHandleStack() {
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        handleColumn.innerHTML = "";

        ord.forEach((slotIndex) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "edge-handle";
          btn.dataset.slotIndex = String(slotIndex);
          const ySlot = appState.slots[slotIndex].ySlot ?? slotIndex;
          btn.style.top = `calc(var(--handle-height) * ${ySlot})`;
          if (slotIndex === appState.activeSlot) btn.classList.add("is-active");

          applyHandleThemeStyles(btn, slotIndex);

          const labelEl = document.createElement("span");
          labelEl.className = "handle-label-text";
          labelEl.setAttribute("aria-hidden", "true");
          labelEl.textContent = handleLabelDisplay(slotIndex);

          btn.appendChild(labelEl);
          btn.setAttribute(
            "aria-label",
            ti("handleAriaLabel", { n: slotIndex + 1, label: handleLabelDisplay(slotIndex) })
          );

          btn.addEventListener("mouseenter", onHandleMouseEnter);
          btn.addEventListener("mouseleave", onHandleMouseLeave);
          btn.addEventListener("pointerdown", onHandlePointerDown);
          btn.addEventListener("click", onHandleClick);
          btn.addEventListener("contextmenu", onHandleContextMenu);

          handleColumn.appendChild(btn);
        });

        if (!handleColumn.dataset.contextMenuBound) {
          handleColumn.addEventListener("contextmenu", onHandleColumnContextMenu);
          handleColumn.dataset.contextMenuBound = "1";
        }

        updatePanelPosition();
      }

      function repositionHandle(slotIndex) {
        const btn = handleColumn.querySelector(`[data-slot-index="${slotIndex}"]`);
        if (!btn) return;
        const ySlot = appState.slots[slotIndex].ySlot ?? 0;
        btn.style.top = `calc(var(--handle-height) * ${ySlot})`;
      }

      // is-active 클래스만 교체 — DOM 전체 재생성 없이 깜빡임 방지
      function updateActiveHandle(newActiveSlot) {
        handleColumn.querySelectorAll(".edge-handle").forEach((btn) => {
          const si = Number(btn.dataset.slotIndex);
          btn.classList.toggle("is-active", si === newActiveSlot);
        });
        refreshAllHandleThemes();
        updatePanelPosition();
      }

      function reorderHandleDom() {
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        ord.forEach((slotIndex) => {
          const btn = handleColumn.querySelector(`[data-slot-index="${slotIndex}"]`);
          if (btn) handleColumn.appendChild(btn);
        });
      }

      function onHandleMouseEnter() {
        // 손잡이는 클릭으로만 열립니다. 호버 열기 없음.
      }

      function onHandleMouseLeave() {
        // no-op
      }

      function onHandlePointerDown(event) {
        if (event.button !== 0) return;
        draggingHandle = true;
        syncPeekAutoCollapseToMain();
        dragMoved = false;
        lastDragY = event.clientY;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragMode = null;
        const btn = event.currentTarget;
        pointerCaptureEl = btn;
        reorderSlot = Number(btn.dataset.slotIndex);
        dragPointerId = event.pointerId;
        try {
          btn.setPointerCapture(event.pointerId);
        } catch {
          /* ignore */
        }
      }

      function onHandleClick(event) {
        const btn = event.currentTarget;
        if (dragMode === "reorder" || dragMoved) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }

        localStorage.setItem(FIRST_RUN_KEY, "1");
        firstRunTip.classList.add("hidden");

        const slot = Number(btn.dataset.slotIndex);
        if (appState.activeSlot !== slot) {
          if (imageStaging) {
            const ok = confirm(ti("imageSwitchIndexConfirm"));
            if (!ok) {
              event.preventDefault();
              event.stopPropagation();
              return;
            }
            hideImageStaging();
          }
          persistActiveMemo();
          appState.activeSlot = slot;
          appState.global.lastOpenedSlotIndex = slot;
          applyThemeForSlot(slot);
          loadMemoForActiveSlot();
          saveState(appState);
          updateActiveHandle(slot);
        }

        if (!isExpanded) {
          setExpanded(true);
          return;
        }

        setPinned(false);
        setExpanded(false);
      }

      function onWindowPointerMove(event) {
        refreshPointerHitTest(event);

        if (!draggingHandle || dragPointerId !== event.pointerId) return;

        const dx = event.clientX - dragStartX;
        const dy = event.clientY - dragStartY;
        const dist = Math.hypot(dx, dy);

        if (!dragMode && dist >= DRAG_THRESHOLD) {
          if (Math.abs(dy) >= Math.abs(dx)) {
            dragMode = "moveSlot";
          } else {
            dragMode = "reorder";
            clearHoverTimer();
            const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
            if (btn) btn.classList.add("is-dragging-reorder");
          }
        }

        if (dragMode === "moveSlot") {
          dragMoved = true;
          const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
          if (btn) {
            const rect = handleColumn.getBoundingClientRect();
            const relativeY = event.clientY - rect.top;
            const newSlot = pixelYToSlot(relativeY - getSlotHeightPx() / 2);
            const currentSlot = appState.slots[reorderSlot].ySlot;

            if (newSlot !== currentSlot) {
              if (!isPremium && appState.enabledCount > 1) {
                const delta = newSlot - currentSlot;
                clearSwapTimer();
                applyGroupYSlotDelta(delta);
                if (reorderSlot === appState.activeSlot) updatePanelPosition();
              } else {
                const occupant = findSlotAtYSlot(newSlot, reorderSlot);
                if (occupant !== null) {
                  if (swapTargetSlot !== occupant) {
                    clearSwapTimer();
                    swapTargetSlot = occupant;
                    const targetSlot = occupant;
                    swapTimer = setTimeout(() => {
                      swapYSlots(reorderSlot, targetSlot);
                    }, SWAP_HOLD_MS);
                  }
                } else {
                  clearSwapTimer();
                  appState.slots[reorderSlot].ySlot = newSlot;
                  appState.slots[reorderSlot].ySlotUpdatedAt = Date.now();
                  repositionHandle(reorderSlot);
                  if (reorderSlot === appState.activeSlot) updatePanelPosition();
                }
              }
            } else {
              clearSwapTimer();
            }
          }
          event.preventDefault();
          return;
        }

        if (dragMode === "reorder") {
          dragMoved = true;
          lastReorderPointer = { clientX: event.clientX, clientY: event.clientY };
          const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
          if (btn) {
            btn.style.transform = `translate(${dx}px, ${dy}px)`;
          }

          const handles = Array.from(handleColumn.querySelectorAll(".edge-handle"));
          let overSlot = null;
          for (const h of handles) {
            const si = Number(h.dataset.slotIndex);
            if (si === reorderSlot) continue;
            const r = h.getBoundingClientRect();
            if (
              event.clientX >= r.left &&
              event.clientX <= r.right &&
              event.clientY >= r.top &&
              event.clientY <= r.bottom
            ) {
              overSlot = si;
              break;
            }
          }

          if (overSlot !== null && overSlot !== swapTargetSlot) {
            clearSwapTimer();
            swapTargetSlot = overSlot;
            const targetB = overSlot;
            swapTimer = setTimeout(() => {
              swapOrderSlots(reorderSlot, targetB);
            }, SWAP_HOLD_MS);
          } else if (overSlot === null) {
            clearSwapTimer();
          }

          event.preventDefault();
        }
      }

      function findSlotAtYSlot(ySlot, excludeSlot) {
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        for (const si of ord) {
          if (si === excludeSlot) continue;
          if (appState.slots[si].ySlot === ySlot) return si;
        }
        return null;
      }

      function applyGroupYSlotDelta(delta) {
        if (!delta) return;
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        const now = Date.now();
        for (const si of ord) {
          appState.slots[si].ySlot = clamp(appState.slots[si].ySlot + delta, 0, MAX_Y_SLOTS - 1);
          appState.slots[si].ySlotUpdatedAt = now;
          repositionHandle(si);
        }
        saveState(appState);
      }

      function swapYSlots(a, b) {
        const ya = appState.slots[a].ySlot;
        const yb = appState.slots[b].ySlot;
        const now = Date.now();
        appState.slots[a].ySlot = yb;
        appState.slots[b].ySlot = ya;
        appState.slots[a].ySlotUpdatedAt = now;
        appState.slots[b].ySlotUpdatedAt = now;
        saveState(appState);
        repositionHandle(a);
        repositionHandle(b);
        if (a === appState.activeSlot || b === appState.activeSlot) {
          updatePanelPosition();
        }
        clearSwapTimer();
      }

      function swapOrderSlots(a, b) {
        const ord = appState.order.slice(0, appState.enabledCount);
        const ia = ord.indexOf(a);
        const ib = ord.indexOf(b);
        if (ia === -1 || ib === -1) return;
        const t = ord[ia];
        ord[ia] = ord[ib];
        ord[ib] = t;
        appState.order = ord;
        saveState(appState);
        reorderHandleDom();
        clearSwapTimer();

        const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
        if (btn) {
          btn.style.transform = "";
          btn.classList.remove("is-dragging-reorder");
        }
        dragStartX = lastReorderPointer.clientX;
        dragStartY = lastReorderPointer.clientY;
      }

      function onWindowPointerUp(event) {
        if (!draggingHandle || dragPointerId !== event.pointerId) return;

        const wasMoveSlot = dragMode === "moveSlot";
        const movedSlot = reorderSlot;
        draggingHandle = false;
        dragPointerId = null;

        if (dragMode === "reorder") {
          const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
          if (btn) {
            btn.style.transform = "";
            btn.classList.remove("is-dragging-reorder");
          }
          clearSwapTimer();
        }

        dragMode = null;
        reorderSlot = null;

        try {
          if (pointerCaptureEl && pointerCaptureEl.releasePointerCapture) {
            pointerCaptureEl.releasePointerCapture(event.pointerId);
          }
        } catch {
          /* ignore */
        }
        pointerCaptureEl = null;
        syncPeekAutoCollapseToMain();

        if (wasMoveSlot) {
          resolveYSlotConflicts(appState.slots, appState.enabledCount);
          for (let i = 0; i < appState.enabledCount; i++) repositionHandle(i);
          if (movedSlot === appState.activeSlot) {
            updatePanelPosition();
          }
          saveState(appState);
          notifySettingsChanged(["ySlot"]);
        }
      }

      ipcRenderer.on("peek:auto-collapse-poll", (_, payload) => {
        collapseIfOutsideIndexFromPoll(payload);
      });

      panel.addEventListener("mouseenter", () => {
        consecutiveOutsidePollCount = 0;
        syncWindowInteraction({ pointerOver: true });
      });

      // mouseleave는 alwaysOnTop 정책용 pointerOver 해제만 담당.
      // ignoreMouse 제어는 refreshPointerHitTest(pointermove)가 전담한다.
      // 창 이동/리사이즈 시 Windows가 synthetic mouseleave를 보내므로
      // 여기서 ignoreMouse를 건드리면 손잡이 오른쪽 클릭이 통과되는 버그 발생.
      panel.addEventListener("mouseleave", () => {
        syncWindowInteraction({ pointerOver: false });
      });

      // modeChip 버튼 클릭: 항상 빼꼼/얼음 전환
      modeChip.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!isExpanded) return;
        setPinned(!isPinned);
      });

      noteShell.addEventListener("click", (event) => {
        // 칩 클릭은 위에서 처리, 서식바/입력/링크는 무시
        if (event.target.closest("button, select, input, .format-bar, .image-staging-overlay, a")) return;
        if (!isExpanded) return;
        const mode = appState.global.pinToggleMode || "dblclick";
        if (mode === "click") {
          setPinned(!isPinned);
        }
        // "chip" 또는 "dblclick" 일 때는 메모 클릭으로 전환하지 않음
      });

      noteShell.addEventListener("dblclick", (event) => {
        if (event.target.closest("button, select, input, .format-bar, .image-staging-overlay, a")) return;
        if (!isExpanded) return;
