      async function compressSlotImagesIfOversized(slotIndex = getMemoEditorTargetSlot()) {
        if (!memoEditor || !appState?.slots?.[slotIndex] || !PeekomMemoImage) return false;
        // 에디터에 로드된 인덱스가 아니면(이미 다른 인덱스로 전환됨) 건드리지 않는다.
        // 에디터 내용을 잘못된 인덱스에 덮어써 메모가 복사되는 것을 막는다.
        if (slotIndex !== getMemoEditorTargetSlot()) return false;
        const imgs = Array.from(memoEditor.querySelectorAll("img.peekom-memo-image"));
        let changed = false;
        for (const img of imgs) {
          const src = img.getAttribute("src") || "";
          if (!PeekomMemoImage.shouldCompressDataUrl(src)) continue;
          const widthPx = parseInt(img.style.width, 10) || img.naturalWidth || 0;
          const heightPx = parseInt(img.style.height, 10) || img.naturalHeight || 0;
          const compressed = await PeekomMemoImage.compressDataUrlForMemo(src, {
            displayWidth: widthPx,
            displayHeight: heightPx
          });
          // 압축 대기(await) 도중 인덱스가 바뀌었으면 즉시 중단한다.
          if (slotIndex !== getMemoEditorTargetSlot()) return changed;
          if (compressed && compressed !== src) {
            img.setAttribute("src", compressed);
            changed = true;
          }
        }
        if (changed && slotIndex === getMemoEditorTargetSlot()) {
          syncSlotImagesFromMemo(slotIndex);
          appState.slots[slotIndex].memoHtml = memoEditor.innerHTML;
        }
        return changed;
      }

      async function persistActiveMemo() {
        if (!memoEditor || !appState?.slots) return;
        flushMemoEditorToActiveSlot();
        await compressSlotImagesIfOversized(getMemoEditorTargetSlot());

        if (!saveState(appState)) {
          alert(ti("saveStateQuotaAlert"));
          return;
        }
        showSaveIndicator();
        notifySettingsChanged(["memoHtml", "images"]);
      }

      window.__peekomFlushActiveMemo = async () => {
        if (!memoEditor || !appState?.slots) return false;
        await persistActiveMemo();
        return true;
      };

      window.__peekomFlushAllMemos = async () => {
        if (!appState?.slots) return false;
        if (memoEditor) {
          await persistActiveMemo();
        } else if (!saveState(appState)) {
          alert(ti("saveStateQuotaAlert"));
          return false;
        }
        return true;
      };

      function assignNextFreeYSlot(slots, enabledCount, slotIndex) {
        const occupied = new Set();
        for (let i = 0; i < enabledCount; i++) {
          if (i === slotIndex) continue;
          occupied.add(clamp(slots[i].ySlot ?? i, 0, MAX_Y_SLOTS - 1));
        }
        let free = 0;
        while (occupied.has(free) && free < MAX_Y_SLOTS) free++;
        slots[slotIndex].ySlot = free < MAX_Y_SLOTS ? free : clamp(slotIndex, 0, MAX_Y_SLOTS - 1);
        slots[slotIndex].ySlotUpdatedAt = Date.now();
      }

      function prepareSlotRoster() {
        const ec = appState.enabledCount;
        appState.order = normalizeOrder(appState.order, ec);
        resolveYSlotConflicts(appState.slots, ec);
      }

      function resolveYSlotConflicts(slots, enabledCount) {
        if (!isPremium) {
          packFreeYSlots();
          return;
        }
        const entries = [];
        for (let i = 0; i < enabledCount; i++) {
          entries.push({
            slot: i,
            ySlot: clamp(slots[i].ySlot ?? i, 0, MAX_Y_SLOTS - 1),
            at: slots[i].ySlotUpdatedAt ?? 0
          });
        }
        entries.sort((a, b) => b.at - a.at);
        const occupied = new Set();
        const displaced = [];
        for (const e of entries) {
          if (!occupied.has(e.ySlot)) {
            occupied.add(e.ySlot);
            slots[e.slot].ySlot = e.ySlot;
          } else {
            displaced.push(e.slot);
          }
        }
        for (const slot of displaced) {
          let free = 0;
          while (occupied.has(free) && free < MAX_Y_SLOTS) free++;
          const assigned = free < MAX_Y_SLOTS ? free : clamp(slot, 0, MAX_Y_SLOTS - 1);
          occupied.add(assigned);
          slots[slot].ySlot = assigned;
          if (!slots[slot].ySlotUpdatedAt) {
            slots[slot].ySlotUpdatedAt = Date.now();
          }
        }
      }

      function getMemoDimensions() {
        const handleUnit = window.innerHeight / MAX_Y_SLOTS;
        const ratio = normalizeMemoAspectRatio(appState.global.memoAspectRatio);
        let widthPx = 3 * handleUnit;
        let heightPx = ratio === "1:1" ? 3 * handleUnit : 4 * handleUnit;
        const maxW = window.innerWidth - COLLAPSED_WIDTH - 8;
        widthPx = Math.min(widthPx, maxW);
        return { widthPx, heightPx, handleUnit };
      }

      function loadMemoForActiveSlot(options = {}) {
        const { force = false } = options;
        const slotIndex = appState.activeSlot;
        const nextHtml = appState.slots[slotIndex].memoHtml || "";
        const liveHtml = memoEditor?.innerHTML || "";
        if (
          !force &&
          !isExpanded &&
          memoEditor &&
          !isMemoHtmlEffectivelyEmpty(liveHtml) &&
          isMemoHtmlEffectivelyEmpty(nextHtml)
        ) {
          return;
        }
        memoEditor.innerHTML = nextHtml;
        loadedMemoSlotIndex = slotIndex;
        syncSlotImagesFromMemo(slotIndex);
        normalizeMemoTypography(slotIndex);
        scanAndLinkifyEditor(true);
        void compressSlotImagesIfOversized(slotIndex).then((changed) => {
          if (changed) saveState(appState);
        });
      }

      function applyFontSizeForSlot(slotIndex) {
        const size = isPremium
          ? (appState.slots[slotIndex]?.fontSize ?? DEFAULT_FONT_SIZE)
          : DEFAULT_FONT_SIZE;
        document.documentElement.style.setProperty("--memo-base-font-size", `${size}px`);
        memoEditor.style.fontSize = `${size}px`;
      }

      function isMemoBlockEmpty(el) {
        if (!el) return true;
        const text = (el.textContent || "").trim();
        return !text && !el.querySelector("img.peekom-memo-image");
      }

      function unwrapMemoFontTags(root) {
        root.querySelectorAll("font").forEach((font) => {
          const parent = font.parentNode;
          if (!parent) return;
          const color = font.getAttribute("color") || font.style?.color;
          if (color) {
            const span = document.createElement("span");
            span.style.color = color;
            while (font.firstChild) span.appendChild(font.firstChild);
            parent.insertBefore(span, font);
            parent.removeChild(font);
            return;
          }
          while (font.firstChild) parent.insertBefore(font.firstChild, font);
          parent.removeChild(font);
        });
      }

      function stripMemoInlineFontSizes(root) {
        root.querySelectorAll("*").forEach((el) => {
          if (el === root) return;
          if (el.style?.fontSize) el.style.removeProperty("font-size");
          if (el.tagName === "FONT" && el.hasAttribute("size")) el.removeAttribute("size");
        });
      }

      // 메모에 인라인으로 박힌 글꼴(font-family)을 제거해 기본/슬롯 글꼴로 통일.
      // 무료 사용자는 글꼴/크기 변경이 막혀 있으므로, 외부에서 복사해 온 텍스트도
      // 기본 세팅으로 맞춰 붙여넣어지도록 한다.
      function stripMemoInlineFontFamilies(root) {
        root.querySelectorAll("*").forEach((el) => {
          if (el === root) return;
          if (el.style?.fontFamily) el.style.removeProperty("font-family");
          if (el.tagName === "FONT" && el.hasAttribute("face")) el.removeAttribute("face");
        });
      }

      function demoteEmptyMarkdownBlocks(root) {
        root.querySelectorAll("h1, h2, h3, ul, ol").forEach((block) => {
          if (!isMemoBlockEmpty(block)) return;
          const div = document.createElement("div");
          div.appendChild(document.createElement("br"));
          block.parentNode?.replaceChild(div, block);
        });
      }

      function normalizeMemoTypography(slotIndex, options = {}) {
        const { preserveCaret = false } = options;
        const caret = preserveCaret ? getCaretCharOffset(memoEditor) : null;
        applyFontSizeForSlot(slotIndex);
        unwrapMemoFontTags(memoEditor);
        stripMemoInlineFontSizes(memoEditor);
        stripMemoInlineFontFamilies(memoEditor);
        demoteEmptyMarkdownBlocks(memoEditor);
        if (preserveCaret && caret !== null) {
          setCaretByCharOffset(memoEditor, caret);
        }
      }

      function adjustFontSize(delta) {
        if (!isPremium) {
          window.PeekomPremiumUI?.showPremiumModal();
          return;
        }
        const slot = appState.activeSlot;
        const next = clamp(
          (appState.slots[slot].fontSize ?? DEFAULT_FONT_SIZE) + delta,
          FONT_SIZE_MIN,
          FONT_SIZE_MAX
        );
        appState.slots[slot].fontSize = next;
        applyFontSizeForSlot(slot);
        normalizeMemoTypography(slot, { preserveCaret: true });
        saveState(appState);
        notifySettingsChanged(["fontSize"]);
      }

      function withAlpha(hex, alpha) {
        const h = String(hex || "#FFF4B8").replace("#", "");
        if (h.length !== 6) return hex;
        const r = parseInt(h.slice(0, 2), 16);
        const g = parseInt(h.slice(2, 4), 16);
        const b = parseInt(h.slice(4, 6), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function parseHexRgb(hex) {
        const h = String(hex || "#FFF4B8").replace("#", "");
        if (h.length !== 6) return [255, 244, 184];
        return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
      }

      function blendHexColors(primary, secondary, primaryWeight) {
        const [r1, g1, b1] = parseHexRgb(primary);
        const [r2, g2, b2] = parseHexRgb(secondary);
        const w = primaryWeight;
        const r = Math.round(r1 * w + r2 * (1 - w));
        const g = Math.round(g1 * w + g2 * (1 - w));
        const b = Math.round(b1 * w + b2 * (1 - w));
        return `rgb(${r}, ${g}, ${b})`;
      }

      function getRelativeLuminance(hex) {
        const [r, g, b] = parseHexRgb(hex).map((value) => {
          const c = value / 255;
          return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
      }

      function applyThemeForSlot(slotIndex) {
        const slot = appState.slots[slotIndex];
        let themeName = slot.theme;
        let bg;
        let text;
        let accent;

        if (themeName === "custom" && isPremium) {
          bg = slot.customBg || "#FFF4B8";
          text = slot.customText || "#2F3750";
          accent = "#4A79FF";
        } else if (themeName === "custom") {
          themeName = "yellow";
          const theme = THEME_MAP.yellow;
          bg = theme.bg;
          text = theme.text;
          accent = theme.accent;
        } else {
          const safeTheme = THEME_MAP[themeName] ? themeName : "yellow";
          const theme = THEME_MAP[safeTheme];
          bg = theme.bg;
          text = theme.text;
          accent = theme.accent;
        }

        const opacityPct = isPremium
          ? clamp(Number(appState.global.memoDefaultOpacity) || 100, 30, 100)
          : 100;
        const isDarkTheme = getRelativeLuminance(bg) < 0.33;
        const toolbarFg = isDarkTheme ? "rgba(255, 255, 255, 0.96)" : "#3c4043";
        const toolbarActiveFg = isDarkTheme ? "#ffffff" : "#202124";
        const toolbarHoverBg = isDarkTheme ? "rgba(255, 255, 255, 0.16)" : "rgba(60, 64, 67, 0.08)";
        const toolbarActiveBg = isDarkTheme ? "rgba(255, 255, 255, 0.24)" : "rgba(60, 64, 67, 0.16)";
        const toolbarSurface = isDarkTheme ? withAlpha(bg, 0.94) : "rgba(255, 255, 255, 0.96)";
        const toolbarBorder = isDarkTheme ? "rgba(255, 255, 255, 0.18)" : "rgba(60, 64, 67, 0.18)";
        const toolbarShadow = isDarkTheme ? "rgba(0, 0, 0, 0.32)" : "rgba(60, 64, 67, 0.15)";
        document.documentElement.style.setProperty("--note-bg", withAlpha(bg, opacityPct / 100));
        document.documentElement.style.setProperty("--note-text", text);
        document.documentElement.style.setProperty("--accent", accent);
        document.documentElement.style.setProperty("--toolbar-fg", toolbarFg);
        document.documentElement.style.setProperty("--toolbar-active-fg", toolbarActiveFg);
        document.documentElement.style.setProperty("--toolbar-hover-bg", toolbarHoverBg);
        document.documentElement.style.setProperty("--toolbar-active-bg", toolbarActiveBg);
        document.documentElement.style.setProperty("--toolbar-surface", toolbarSurface);
        document.documentElement.style.setProperty("--toolbar-border", toolbarBorder);
        document.documentElement.style.setProperty("--toolbar-shadow", toolbarShadow);
        const ff =
          typeof slot.fontFamily === "string" ? slot.fontFamily.trim() : "";
        document.documentElement.style.setProperty(
          "--note-font-family",
          ff
            ? `"${ff.replace(/"/g, "")}", "Segoe UI", sans-serif`
            : '"Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif'
        );
        refreshAllHandleThemes();
      }

      let lastPanelLayoutKey = "";

      function getEffectivePanelEdge() {
        const edge = appState.global?.panelEdge === "left" ? "left" : "right";
        if (!isPremium && edge === "left") return "right";
        return edge;
      }

      function applyPanelEdgeUI() {
        const edge = getEffectivePanelEdge();
        panel.classList.toggle("panel-edge-left", edge === "left");
        lastPanelLayoutKey = "";
        updatePanelPosition();
      }

      function updatePanelPosition() {
        const ySlot = appState.slots[appState.activeSlot]?.ySlot ?? 0;
        const { widthPx, heightPx, handleUnit } = getMemoDimensions();
        const totalH = window.innerHeight;
        const handleTopPx = ySlot * handleUnit;
        const availableBelow = totalH - handleTopPx;
        let topPx;
        if (availableBelow >= heightPx) {
          topPx = handleTopPx;
        } else {
          topPx = Math.max(0, handleTopPx + handleUnit - heightPx);
        }
        const finalHeight = Math.min(heightPx, totalH - topPx);
        const edge = getEffectivePanelEdge();
        const layoutKey = `${edge}|${ySlot}|${widthPx}|${finalHeight}|${topPx}`;
        if (layoutKey === lastPanelLayoutKey) return;
        lastPanelLayoutKey = layoutKey;

        document.documentElement.style.setProperty("--active-y-slot", String(ySlot));
        noteShell.style.top = `${topPx}px`;
        noteShell.style.width = `${widthPx + COLLAPSED_WIDTH}px`;
        noteShell.style.height = `${finalHeight}px`;
        noteShell.style.maxHeight = `${finalHeight}px`;
        if (edge === "left") {
          noteShell.style.left = "0";
          noteShell.style.right = "auto";
          noteShell.style.paddingLeft = `calc(${COLLAPSED_WIDTH}px + 8px)`;
          noteShell.style.paddingRight = "10px";
        } else {
          noteShell.style.left = "auto";
          noteShell.style.right = "0";
          noteShell.style.paddingRight = `calc(${COLLAPSED_WIDTH}px + 8px)`;
          noteShell.style.paddingLeft = "10px";
        }
        if (noteBacking) {
          noteBacking.style.top = `${topPx}px`;
          noteBacking.style.width = `${widthPx + COLLAPSED_WIDTH}px`;
          noteBacking.style.height = `${finalHeight}px`;
          if (edge === "left") {
            noteBacking.style.left = "0";
            noteBacking.style.right = "auto";
          } else {
            noteBacking.style.left = "auto";
            noteBacking.style.right = "0";
          }
        }
        document.documentElement.style.setProperty("--note-shell-height", `${finalHeight}px`);
        document.documentElement.style.setProperty("--note-shell-maxh", `${finalHeight}px`);

        firstRunTip.style.top = `${topPx + 14}px`;
        firstRunTip.style.bottom = "auto";
        firstRunTip.style.left = "";
      }

      function getSlotHeightPx() {
        return window.innerHeight / MAX_Y_SLOTS;
      }

      function pixelYToSlot(pixelY) {
        const slotH = getSlotHeightPx();
        if (slotH <= 0) return 0;
        return clamp(Math.round(pixelY / slotH), 0, MAX_Y_SLOTS - 1);
      }

      /** 손잡이·메모·설정버튼 등 실제 인터랙션이 있는 영역 */
      const HIT_TARGET_SELECTOR =
        ".edge-handle, .floating-panel.expanded .note-editor-wrap, .floating-panel.expanded .memo-editor, .floating-panel.expanded .note-footer, .floating-panel.expanded .mode-chip, .floating-panel.expanded .tool-btn, .floating-panel.expanded .toolbar-dropdown, .floating-panel.expanded .toolbar-dropdown *, .floating-panel.expanded .color-swatch-btn, .floating-panel.expanded .color-swatch-btn *, .floating-panel.expanded .toolbar-dropdown-wrap, .floating-panel.expanded .toolbar-dropdown-wrap *, .image-staging-overlay:not(.hidden), .image-staging-overlay:not(.hidden) *, #deleteIndexModal:not(.hidden), #deleteIndexModal:not(.hidden) *, .first-run-tip:not(.hidden), #handleContextMenu, #handleContextMenu *, #peekomPremiumModal, #peekomPremiumModal *";
      /** OS 폴링이 연속으로 "바깥" 판정할 때만 접기 (창 리사이즈 false-positive 방지) */
      const COLLAPSE_CONFIRM_POLLS = 2;
      /** 창 확장 직후 잘못된 "바깥" 판정 방지용 유예 시간 (ms) */
      const EXPAND_GRACE_MS = 350;

      let hitTestRafId = null;
      /** 연속으로 인덱스 바깥에 있는 폴링 횟수 카운터 */
      let consecutiveOutsidePollCount = 0;
      let panelExpandedAt = 0;

      function isPremiumModalOpen() {
        const el = document.getElementById("peekomPremiumModal");
        return Boolean(el && !el.classList.contains("hidden"));
      }

      function isInteractiveHitTarget(el) {
        return Boolean(el && el.closest(HIT_TARGET_SELECTOR));
      }

      function shouldAutoCollapseOnHoverOutside() {
        return (
          isExpanded &&
          !isPinned &&
          appState.global.triggerMode === "hover" &&
          !draggingHandle &&
          !imageStaging &&
          !handleContextMenuOpen &&
          !toolbarDropdownOpen &&
          !settingsWindowOpen
        );
      }

      function refreshAutoCollapsePolicy() {
        syncPeekAutoCollapseToMain();
      }

      async function syncWindowInteraction(partial = {}) {
        try {
          await ipcRenderer.invoke("window:sync-interaction", partial);
        } catch (error) {
          console.error(error);
        }
      }

      async function syncPeekAutoCollapseToMain() {
        try {
          await ipcRenderer.invoke("window:set-peek-auto-collapse", shouldAutoCollapseOnHoverOutside());
        } catch (error) {
          console.error(error);
        }
      }

      function collapseIfOutsideIndexFromPoll(payload = {}) {
        if (!shouldAutoCollapseOnHoverOutside()) {
          consecutiveOutsidePollCount = 0;
          clearPeekCollapseDelayTimer();
          return;
        }

        if (Date.now() - panelExpandedAt < EXPAND_GRACE_MS) {
          return;
        }

        let isOutside = false;

        if (payload.outsideWindow) {
          isOutside = true;
        } else {
          const x = payload.clientX;
          const y = payload.clientY;
          if (typeof x === "number" && typeof y === "number" && x >= 0 && y >= 0) {
            const el = document.elementFromPoint(x, y);
            isOutside = !isInteractiveHitTarget(el);
          }
        }

        if (isOutside) {
          consecutiveOutsidePollCount++;
          if (consecutiveOutsidePollCount >= COLLAPSE_CONFIRM_POLLS && !peekCollapseDelayTimer) {
            consecutiveOutsidePollCount = 0;
            peekCollapseDelayTimer = setTimeout(() => {
              peekCollapseDelayTimer = null;
              if (shouldAutoCollapseOnHoverOutside()) {
                setExpanded(false);
              }
            }, hoverDelayMs);
          }
        } else {
          consecutiveOutsidePollCount = 0;
          clearPeekCollapseDelayTimer();
        }
      }

      async function syncPanelLayoutToMain() {
        try {
          await ipcRenderer.invoke("window:set-panel-expanded", isExpanded);
        } catch (error) {
          console.error(error);
        }
        refreshPointerHitTest({ clientX: -1, clientY: -1 }, true);
      }

      function refreshPointerHitTest(event, force = false) {
        if (!force && hitTestRafId !== null) return;
        if (hitTestRafId !== null) {
          cancelAnimationFrame(hitTestRafId);
        }

        hitTestRafId = requestAnimationFrame(() => {
          hitTestRafId = null;

          if (isPremiumModalOpen()) {
            syncWindowInteraction({ ignoreMouse: false, pointerOver: true });
            return;
          }

          if (!isExpanded) {
            const x = typeof event.clientX === "number" ? event.clientX : -1;
            const y = typeof event.clientY === "number" ? event.clientY : -1;
            const hasValidCoords = x >= 0 && y >= 0;
            const el = hasValidCoords ? document.elementFromPoint(x, y) : null;
            const interactive = isInteractiveHitTarget(el);
            syncWindowInteraction({
              ignoreMouse: !interactive,
              pointerOver: interactive
            });
            return;
          }

          const x = typeof event.clientX === "number" ? event.clientX : -1;
          const y = typeof event.clientY === "number" ? event.clientY : -1;
          const hasValidCoords = x >= 0 && y >= 0;

          if (!hasValidCoords) {
            syncWindowInteraction({
              ignoreMouse: true,
              pointerOver: false
            });
            return;
          }

          const el = document.elementFromPoint(x, y);
          const interactive = isInteractiveHitTarget(el);

          // 클릭 통과 제어만 담당. 접힘은 OS 폴링(collapseIfOutsideIndexFromPoll)만 담당.
          syncWindowInteraction({
            ignoreMouse: !interactive,
            pointerOver: interactive
          });
        });
      }

      function setExpanded(nextExpanded) {
        if (!nextExpanded && isExpanded) {
          persistActiveMemo();
        }
        isExpanded = nextExpanded;
        consecutiveOutsidePollCount = 0;
        if (nextExpanded) {
          panelExpandedAt = Date.now();
        }
        panel.classList.toggle("expanded", nextExpanded);

        if (!nextExpanded) {
          clearRevealTimer();
          clearPeekCollapseDelayTimer();
          hideHandleContextMenu();
        } else {
          clearPeekCollapseDelayTimer();
          if (noteBacking) {
            noteBacking.setAttribute("aria-hidden", "false");
          }
        }

        if (!nextExpanded && noteBacking) {
          noteBacking.setAttribute("aria-hidden", "true");
        }

        syncPanelLayoutToMain();
        syncPeekAutoCollapseToMain();
        refreshAllHandleThemes();
        if (nextExpanded) {
          refreshPointerHitTest({ clientX: -1, clientY: -1 }, true);
          requestAnimationFrame(() => {
            updatePanelPosition();
            memoEditor?.focus();
          });
        } else {
          requestAnimationFrame(() => updatePanelPosition());
        }
      }

      function setPinned(nextPinned) {
        isPinned = nextPinned;
        modeChip.textContent = nextPinned ? ti("modeIce") : ti("modePeek");
        modeChip.removeAttribute("title");
        modeChip.classList.toggle("ice", nextPinned);
        modeChip.classList.toggle("peek", !nextPinned);
        syncPeekAutoCollapseToMain();
      }

      function handleLabelDisplay(slotIndex) {
        if (typeof PeekomI18n !== "undefined" && PeekomI18n.resolveSlotLabel) {
          return PeekomI18n.resolveSlotLabel(appState.slots[slotIndex].label, slotIndex, LABEL_MAX);
        }
        const raw = appState.slots[slotIndex].label.trim();
        if (raw.length > 0) return raw.slice(0, LABEL_MAX);
        return String(slotIndex + 1);
      }

      function getThemeColorsForSlot(slotIndex) {
        const slot = appState.slots[slotIndex];
        if (slot.theme === "custom" && isPremium) {
          return { bg: slot.customBg || "#FFF4B8", text: slot.customText || "#2F3750" };
        }
        const theme = THEME_MAP[slot.theme === "custom" ? "yellow" : slot.theme] || THEME_MAP.yellow;
        return { bg: theme.bg, text: theme.text };
      }

      function getMemoOpacityAlpha() {
        return isPremium
          ? clamp(Number(appState.global.memoDefaultOpacity) || 100, 30, 100) / 100
          : 1;
      }

      function rgbaFromRgb(rgbStr, alpha) {
        const m = String(rgbStr || "").match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
        if (!m) return rgbStr;
        return `rgba(${m[1]},${m[2]},${m[3]},${alpha})`;
      }

      function applyHandleThemeStyles(btn, slotIndex) {
        const themeColors = getThemeColorsForSlot(slotIndex);
        const alpha = getMemoOpacityAlpha();
        const isActiveExpanded = isExpanded && slotIndex === appState.activeSlot;
        btn.style.setProperty("--handle-bg", withAlpha(themeColors.bg, alpha));
        btn.style.setProperty("--handle-text", themeColors.text);
        if (isActiveExpanded) {
          btn.style.background = "";
          btn.style.color = "";
        } else {
          const mixWeight = slotIndex === appState.activeSlot ? 0.78 : 0.9;
          const blended = blendHexColors(themeColors.bg, themeColors.text, mixWeight);
          btn.style.background = alpha < 1 ? rgbaFromRgb(blended, alpha) : blended;
          btn.style.color = themeColors.text;
        }
      }

      function refreshAllHandleThemes() {
        handleColumn.querySelectorAll(".edge-handle").forEach((btn) => {
          const slotIndex = Number(btn.dataset.slotIndex);
          if (Number.isFinite(slotIndex)) applyHandleThemeStyles(btn, slotIndex);
        });
      }

      function hideHandleContextMenu() {
        handleContextMenuOpen = false;
        handleContextMenu?.classList.add("hidden");
        handleContextMenu.innerHTML = "";
        refreshPointerHitTest();
        refreshAutoCollapsePolicy();
      }

      function showHandleContextMenu(clientX, clientY, items) {
        if (!handleContextMenu || !items.length) return;
        handleContextMenu.innerHTML = "";
        items.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = item.label;
          btn.disabled = Boolean(item.disabled);
          if (item.danger) btn.classList.add("danger");
          btn.addEventListener("click", (event) => {
            event.stopPropagation();
            hideHandleContextMenu();
            item.action?.();
          });
          handleContextMenu.appendChild(btn);
        });
        handleContextMenu.classList.remove("hidden");
        handleContextMenuOpen = true;
        handleContextMenu.style.left = `${clientX}px`;
        handleContextMenu.style.top = `${clientY}px`;
        requestAnimationFrame(() => {
          const rect = handleContextMenu.getBoundingClientRect();
          let left = clientX;
          let top = clientY;
          if (left + rect.width > window.innerWidth - 8) {
            left = Math.max(8, window.innerWidth - rect.width - 8);
          }
          if (top + rect.height > window.innerHeight - 8) {
            top = Math.max(8, window.innerHeight - rect.height - 8);
          }
          handleContextMenu.style.left = `${left}px`;
          handleContextMenu.style.top = `${top}px`;
          refreshPointerHitTest();
        });
      }

      function onHandleColumnContextMenu(event) {
        if (event.target.closest(".edge-handle")) return;
        event.preventDefault();
        event.stopPropagation();
        if (draggingHandle) return;
        const max = getMaxEnabledSlots();
        if (appState.enabledCount >= max) {
          if (!isPremium) {
            showHandleContextMenu(event.clientX, event.clientY, [
              {
                label: ti("handleUpgradePlus"),
                action: () => window.PeekomPremiumUI?.showPremiumModal()
              }
            ]);
          }
          return;
        }
        showHandleContextMenu(event.clientX, event.clientY, [
          {
            label: ti("handleAddIndex"),
            action: () => addIndexAtBottom()
          }
        ]);
      }

      function renderHandleStack() {
        prepareSlotRoster();
        const ec = appState.enabledCount;
        const ord = appState.order;
        handleColumn.innerHTML = "";

        ord.forEach((slotIndex) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "edge-handle";
          btn.dataset.slotIndex = String(slotIndex);
          const ySlot = appState.slots[slotIndex].ySlot ?? slotIndex;
          btn.style.top = `calc(var(--handle-height) * ${ySlot})`;
          if (slotIndex === appState.activeSlot) btn.classList.add("is-active");

          applyHandleThemeStyles(btn, slotIndex);

          const labelEl = document.createElement("span");
          labelEl.className = "handle-label-text";
          labelEl.setAttribute("aria-hidden", "true");
          labelEl.textContent = handleLabelDisplay(slotIndex);

          btn.appendChild(labelEl);
          btn.setAttribute(
            "aria-label",
            ti("handleAriaLabel", { n: slotIndex + 1, label: handleLabelDisplay(slotIndex) })
          );

          btn.addEventListener("mouseenter", onHandleMouseEnter);
          btn.addEventListener("mouseleave", onHandleMouseLeave);
          btn.addEventListener("pointerenter", (e) => refreshPointerHitTest(e, true));
          btn.addEventListener("pointerdown", onHandlePointerDown);
          btn.addEventListener("click", onHandleClick);

          handleColumn.appendChild(btn);
        });

        if (!handleColumn.dataset.contextMenuBound) {
          handleColumn.addEventListener("contextmenu", onHandleColumnContextMenu);
          handleColumn.dataset.contextMenuBound = "1";
        }

        updatePanelPosition();
      }

      function repositionHandle(slotIndex) {
        const btn = handleColumn.querySelector(`[data-slot-index="${slotIndex}"]`);
        if (!btn) return;
        const ySlot = appState.slots[slotIndex].ySlot ?? 0;
        btn.style.top = `calc(var(--handle-height) * ${ySlot})`;
      }

      // is-active 클래스만 교체 — DOM 전체 재생성 없이 깜빡임 방지
      function updateActiveHandle(newActiveSlot) {
        handleColumn.querySelectorAll(".edge-handle").forEach((btn) => {
          const si = Number(btn.dataset.slotIndex);
          btn.classList.toggle("is-active", si === newActiveSlot);
        });
        refreshAllHandleThemes();
        updatePanelPosition();
      }

      function reorderHandleDom() {
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        ord.forEach((slotIndex) => {
          const btn = handleColumn.querySelector(`[data-slot-index="${slotIndex}"]`);
          if (btn) handleColumn.appendChild(btn);
        });
      }

      function onHandleMouseEnter() {
        // 손잡이는 클릭으로만 열립니다. 호버 열기 없음.
      }

      function onHandleMouseLeave() {
        // no-op
      }

      function onHandlePointerDown(event) {
        if (event.button !== 0) return;
        const btn = event.currentTarget;
        const slot = Number(btn.dataset.slotIndex);
        draggingHandle = true;
        syncPeekAutoCollapseToMain();
        dragMoved = false;
        lastDragY = event.clientY;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragMode = null;
        pointerCaptureEl = btn;
        reorderSlot = slot;
        dragPointerId = event.pointerId;
        syncWindowInteraction({ ignoreMouse: false, pointerOver: true });
        try {
          btn.setPointerCapture(event.pointerId);
        } catch {
          /* ignore */
        }
      }

      function onHandleClick(event) {
        const btn = event.currentTarget;
        if (dragMode === "reorder" || dragMoved) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }

        localStorage.setItem(FIRST_RUN_KEY, "1");
        firstRunTip.classList.add("hidden");

        const slot = Number(btn.dataset.slotIndex);
        if (appState.activeSlot !== slot) {
          if (imageStaging) {
            const ok = confirm(ti("imageSwitchIndexConfirm"));
            if (!ok) {
              event.preventDefault();
              event.stopPropagation();
              return;
            }
            hideImageStaging();
          }
          persistActiveMemo();
          appState.activeSlot = slot;
          appState.global.lastOpenedSlotIndex = slot;
          applyThemeForSlot(slot);
          loadMemoForActiveSlot({ force: true });
          saveState(appState);
          renderHandleStack();
        }

        if (!isExpanded) {
          setExpanded(true);
          return;
        }

        setPinned(false);
        setExpanded(false);
      }

      function onWindowPointerMove(event) {
        refreshPointerHitTest(event);

        if (!draggingHandle || dragPointerId !== event.pointerId) return;

        const dx = event.clientX - dragStartX;
        const dy = event.clientY - dragStartY;
        const dist = Math.hypot(dx, dy);

        if (!dragMode && dist >= DRAG_THRESHOLD) {
          if (Math.abs(dy) >= Math.abs(dx)) {
            dragMode = "moveSlot";
          } else {
            dragMode = "reorder";
            clearHoverTimer();
            const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
            if (btn) btn.classList.add("is-dragging-reorder");
          }
        }

        if (dragMode === "moveSlot") {
          dragMoved = true;
          const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
          if (btn) {
            const rect = handleColumn.getBoundingClientRect();
            const relativeY = event.clientY - rect.top;
            const newSlot = pixelYToSlot(relativeY - getSlotHeightPx() / 2);
            const currentSlot = appState.slots[reorderSlot].ySlot;

            if (newSlot !== currentSlot) {
              if (!isPremium && appState.enabledCount > 1) {
                const ord = appState.order.slice(0, appState.enabledCount);
                const minY = Math.min(...ord.map((si) => appState.slots[si].ySlot ?? 0));
                const draggedY = appState.slots[reorderSlot].ySlot ?? 0;
                const offsetInGroup = draggedY - minY;
                clearSwapTimer();
                applyFreeGroupYSlotBase(newSlot - offsetInGroup);
                if (reorderSlot === appState.activeSlot) updatePanelPosition();
              } else {
                const occupant = findSlotAtYSlot(newSlot, reorderSlot);
                if (occupant !== null) {
                  if (swapTargetSlot !== occupant) {
                    clearSwapTimer();
                    swapTargetSlot = occupant;
                    const targetSlot = occupant;
                    swapTimer = setTimeout(() => {
                      swapYSlots(reorderSlot, targetSlot);
                    }, SWAP_HOLD_MS);
                  }
                } else {
                  clearSwapTimer();
                  appState.slots[reorderSlot].ySlot = newSlot;
                  appState.slots[reorderSlot].ySlotUpdatedAt = Date.now();
                  repositionHandle(reorderSlot);
                  if (reorderSlot === appState.activeSlot) updatePanelPosition();
                }
              }
            } else {
              clearSwapTimer();
            }
          }
          event.preventDefault();
          return;
        }

        if (dragMode === "reorder") {
          dragMoved = true;
          lastReorderPointer = { clientX: event.clientX, clientY: event.clientY };
          const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
          if (btn) {
            btn.style.transform = `translate(${dx}px, ${dy}px)`;
          }

          const handles = Array.from(handleColumn.querySelectorAll(".edge-handle"));
          let overSlot = null;
          for (const h of handles) {
            const si = Number(h.dataset.slotIndex);
            if (si === reorderSlot) continue;
            const r = h.getBoundingClientRect();
            if (
              event.clientX >= r.left &&
              event.clientX <= r.right &&
              event.clientY >= r.top &&
              event.clientY <= r.bottom
            ) {
              overSlot = si;
              break;
            }
          }

          if (overSlot !== null && overSlot !== swapTargetSlot) {
            clearSwapTimer();
            swapTargetSlot = overSlot;
            const targetB = overSlot;
            swapTimer = setTimeout(() => {
              swapOrderSlots(reorderSlot, targetB);
            }, SWAP_HOLD_MS);
          } else if (overSlot === null) {
            clearSwapTimer();
          }

          event.preventDefault();
        }
      }

      function findSlotAtYSlot(ySlot, excludeSlot) {
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        for (const si of ord) {
          if (si === excludeSlot) continue;
          if (appState.slots[si].ySlot === ySlot) return si;
        }
        return null;
      }

      function applyFreeGroupYSlotBase(baseY) {
        const ec = appState.enabledCount;
        if (ec <= 0) return;
        const ord = appState.order.slice(0, ec);
        const clampedBase = clamp(baseY, 0, MAX_Y_SLOTS - ec);
        const currentBase = Math.min(...ord.map((si) => appState.slots[si].ySlot ?? 0));
        let needsUpdate = clampedBase !== currentBase;
        if (!needsUpdate) {
          needsUpdate = ord.some((si, i) => appState.slots[si].ySlot !== clampedBase + i);
        }
        if (!needsUpdate) return;

        const now = Date.now();
        ord.forEach((si, i) => {
          appState.slots[si].ySlot = clampedBase + i;
          appState.slots[si].ySlotUpdatedAt = now;
          repositionHandle(si);
        });
        saveState(appState);
      }

      function applyGroupYSlotDelta(delta) {
        if (!delta) return;
        const ec = appState.enabledCount;
        const ord = appState.order.slice(0, ec);
        const minY = Math.min(...ord.map((si) => appState.slots[si].ySlot ?? 0));
        applyFreeGroupYSlotBase(minY + delta);
      }

      function swapYSlots(a, b) {
        const ya = appState.slots[a].ySlot;
        const yb = appState.slots[b].ySlot;
        const now = Date.now();
        appState.slots[a].ySlot = yb;
        appState.slots[b].ySlot = ya;
        appState.slots[a].ySlotUpdatedAt = now;
        appState.slots[b].ySlotUpdatedAt = now;
        saveState(appState);
        repositionHandle(a);
        repositionHandle(b);
        if (a === appState.activeSlot || b === appState.activeSlot) {
          updatePanelPosition();
        }
        clearSwapTimer();
      }

      function swapOrderSlots(a, b) {
        const ord = appState.order.slice(0, appState.enabledCount);
        const ia = ord.indexOf(a);
        const ib = ord.indexOf(b);
        if (ia === -1 || ib === -1) return;
        const t = ord[ia];
        ord[ia] = ord[ib];
        ord[ib] = t;
        appState.order = ord;
        saveState(appState);
        reorderHandleDom();
        clearSwapTimer();

        const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
        if (btn) {
          btn.style.transform = "";
          btn.classList.remove("is-dragging-reorder");
        }
        dragStartX = lastReorderPointer.clientX;
        dragStartY = lastReorderPointer.clientY;
      }

      function onWindowPointerUp(event) {
        if (!draggingHandle || dragPointerId !== event.pointerId) return;

        const wasMoveSlot = dragMode === "moveSlot";
        const movedSlot = reorderSlot;
        draggingHandle = false;
        dragPointerId = null;

        if (dragMode === "reorder") {
          const btn = handleColumn.querySelector(`[data-slot-index="${reorderSlot}"]`);
          if (btn) {
            btn.style.transform = "";
            btn.classList.remove("is-dragging-reorder");
          }
          clearSwapTimer();
        }

        dragMode = null;
        reorderSlot = null;

        try {
          if (pointerCaptureEl && pointerCaptureEl.releasePointerCapture) {
            pointerCaptureEl.releasePointerCapture(event.pointerId);
          }
        } catch {
          /* ignore */
        }
        pointerCaptureEl = null;
        syncPeekAutoCollapseToMain();
        refreshPointerHitTest(event, true);

        if (wasMoveSlot) {
          resolveYSlotConflicts(appState.slots, appState.enabledCount);
          for (let i = 0; i < appState.enabledCount; i++) repositionHandle(i);
          if (movedSlot === appState.activeSlot) {
            updatePanelPosition();
          }
          saveState(appState);
          notifySettingsChanged(["ySlot"]);
        }
      }

      ipcRenderer.on("settings:window-state", (_, payload) => {
        settingsWindowOpen = Boolean(payload?.open);
        syncPeekAutoCollapseToMain();
        refreshPointerHitTest({ clientX: -1, clientY: -1 }, true);
      });

      ipcRenderer.on("peek:auto-collapse-poll", (_, payload) => {
        if (payload?.outsideWindow) {
          refreshPointerHitTest({ clientX: -1, clientY: -1 }, true);
        } else if (
          typeof payload?.clientX === "number" &&
          typeof payload?.clientY === "number" &&
          payload.clientX >= 0 &&
          payload.clientY >= 0
        ) {
          refreshPointerHitTest(
            { clientX: payload.clientX, clientY: payload.clientY },
            true
          );
        }
        collapseIfOutsideIndexFromPoll(payload);
      });

      panel.addEventListener("mouseenter", () => {
        consecutiveOutsidePollCount = 0;
      });

      // mouseleave는 alwaysOnTop 정책용 pointerOver 해제만 담당.
      // ignoreMouse 제어는 refreshPointerHitTest(pointermove)가 전담한다.
      // 창 이동/리사이즈 시 Windows가 synthetic mouseleave를 보내므로
      // 여기서 ignoreMouse를 건드리면 손잡이 오른쪽 클릭이 통과되는 버그 발생.
      panel.addEventListener("mouseleave", () => {
        refreshPointerHitTest({ clientX: -1, clientY: -1 }, true);
      });

      // modeChip 버튼 클릭: 항상 빼꼼/얼음 전환
      modeChip.addEventListener("click", (event) => {

      noteShell.addEventListener("click", (event) => {

        if (!isExpanded) return;
        const mode = appState.global.pinToggleMode || "dblclick";
        if (mode === "click") {
          setPinned(!isPinned);
        }
        // "chip" 또는 "dblclick" 일 때는 메모 클릭으로 전환하지 않음
      });

      noteShell.addEventListener("dblclick", (event) => {

        if (!isExpanded) return;

      // 설정 아이콘 호버 노출 기능 제거: 펼침 상태에서 고정 표시

      memoEditor.addEventListener("compositionstart", () => {

      memoEditor.addEventListener("compositionend", () => {

      memoEditor.addEventListener("focus", () => {

      memoEditor.addEventListener("blur", () => {

      memoEditor.addEventListener("input", () => {

      memoEditor.addEventListener("keydown", (event) => {
        if (event.key === "Backspace" || event.key === "Delete") {

              range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
                ? range.commonAncestorContainer.closest?.(".peekom-memo-image")

      memoEditor.addEventListener(
        "wheel",

          if (!isPremium) {

          adjustFontSize(event.deltaY < 0 ? 1 : -1);

        { passive: false }
      );

      memoEditor.addEventListener("paste", () => {
        setTimeout(() => {
          normalizeMemoTypography(appState.activeSlot, { preserveCaret: true });
          scanAndLinkifyEditor();
          persistActiveMemo();

      memoEditor.addEventListener("click", (event) => {
        const link = event.target.closest("a[data-external]");

      const toolbarButtons = Array.from(document.querySelectorAll(".tool-btn[data-cmd]"));
      toolbarButtons.forEach((button) => {

      document.querySelectorAll("[data-align]").forEach((btn) => {

          event.stopPropagation();

      });

      function getMemoDirectLineBlock(node) {
        if (!node || !memoEditor.contains(node)) return null;
        let el = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;
        while (el && el !== memoEditor) {
          if (el.parentElement === memoEditor) return el;
          el = el.parentElement;
        }
        return null;
      }

      function getSelectedAlignmentBlocks() {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return [];

        const range = sel.getRangeAt(0);
        const startDirect = getMemoDirectLineBlock(range.startContainer);
        const endDirect = getMemoDirectLineBlock(range.endContainer);

        if (startDirect && endDirect && startDirect.parentElement === memoEditor && endDirect.parentElement === memoEditor) {
          if (startDirect.tagName === "UL" || startDirect.tagName === "OL") {
            if (startDirect !== endDirect) return [];
            if (!range.collapsed) {
              return Array.from(startDirect.querySelectorAll(":scope > li")).filter((li) => range.intersectsNode(li));
            }
            const anchor = sel.anchorNode;
            const li = (anchor?.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor)?.closest?.("li");
            return li && startDirect.contains(li) ? [li] : [];
          }

          if (startDirect === endDirect) return [startDirect];

          const blocks = [];
          let el = startDirect;
          while (el) {
            if (el.tagName === "UL" || el.tagName === "OL") {
              Array.from(el.querySelectorAll(":scope > li"))
                .filter((li) => range.intersectsNode(li))
                .forEach((li) => blocks.push(li));
            } else {
              blocks.push(el);
            }
            if (el === endDirect) break;
            el = el.nextElementSibling;
          }
          return blocks;
        }

        const refNode = range.collapsed ? sel.anchorNode : range.commonAncestorContainer;
        let ref = refNode?.nodeType === Node.TEXT_NODE ? refNode.parentElement : refNode;
        const block = ref?.closest?.("p, h1, h2, h3, li, div");
        if (!block || block === memoEditor || !memoEditor.contains(block)) return [];
        if (block.tagName === "DIV" && block.parentElement !== memoEditor) {
          const outer = getMemoDirectLineBlock(block);
          return outer ? [outer] : [block];
        }
        return [block];
      }

      function applyAlignmentToBlock(block, textAlign) {
        if (block.tagName === "LI") {
          const list = block.closest("ul, ol");
          if (list) list.style.textAlign = textAlign;
        } else {
          block.style.textAlign = textAlign;
        }
      }

      function applyAlignment(alignCmd) {
        memoEditor.focus();
        const alignMap = {
          justifyLeft: "left",
          justifyCenter: "center",
          justifyRight: "right",
          justifyFull: "justify"
        };
        const textAlign = alignMap[alignCmd];
        if (!textAlign) return;

        const blocks = getSelectedAlignmentBlocks();
        if (blocks.length > 0) {
          blocks.forEach((block) => applyAlignmentToBlock(block, textAlign));
          return;
        }

        const node = getSelectionNodeInEditor();
        if (!node) {
          document.execCommand(alignCmd, false, null);
          return;
        }

        const block = node.closest("p, h1, h2, h3, li, div");
        if (!block || block === memoEditor) {
          document.execCommand(alignCmd, false, null);
          return;
        }

        applyAlignmentToBlock(block, textAlign);
      }

      function getSelectionNodeInEditor() {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return null;
        let node = sel.anchorNode;
        if (!node) return null;
        if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
        if (!node || !memoEditor.contains(node)) return null;
        return node;
      }

      function removeListFormatting() {
        const node = getSelectionNodeInEditor();
        if (!node) return;
        const list = node.closest("ul, ol");
        if (!list || !memoEditor.contains(list)) return;
        const items = Array.from(list.querySelectorAll(":scope > li"));
        const frag = document.createDocumentFragment();
        items.forEach((li) => {
          const p = document.createElement("p");
          while (li.firstChild) p.appendChild(li.firstChild);
          if (!p.textContent.trim() && !p.querySelector("img, br")) p.appendChild(document.createElement("br"));
          frag.appendChild(p);
        });
        list.parentNode?.replaceChild(frag, list);
      }

      function applyListStyle(style) {
        memoEditor.focus();
        if (style === "plain") {
          removeListFormatting();
          return;
        }

        const node = getSelectionNodeInEditor();
        const ul = node?.closest("ul:not(.peekom-task-list)");
        const ol = node?.closest("ol");

        if (style === "ordered") {
          if (ol) return;
          if (ul) {
            document.execCommand("insertOrderedList", false, null);
            return;
          }
          document.execCommand("insertOrderedList", false, null);
          return;
        }

        const wantSquare = style === "square";
        if (ul) {
          ul.classList.toggle("peekom-list-square", wantSquare);
          return;
        }
        if (ol) {
          removeListFormatting();
          document.execCommand("insertUnorderedList", false, null);
          const list = getSelectionNodeInEditor()?.closest("ul:not(.peekom-task-list)");
          if (list) list.classList.toggle("peekom-list-square", wantSquare);
          return;
        }
        document.execCommand("insertUnorderedList", false, null);
        const list = getSelectionNodeInEditor()?.closest("ul:not(.peekom-task-list)");
        if (list) {
          list.classList.toggle("peekom-list-square", wantSquare);
        }
      }

      document.querySelectorAll("[data-list]").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          applyListStyle(btn.dataset.list);
          closeToolbarDropdowns();
          updateToolbarActiveState();
        });
      });


      document.querySelectorAll(".color-swatch-btn").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          const color = btn.dataset.color === "theme"
            ? getComputedStyle(document.documentElement).getPropertyValue("--note-text").trim() || "#2F3750"
            : btn.dataset.color;
          executeCmd("foreColor", color);
          closeToolbarDropdowns();
          updateToolbarActiveState();
        });
      });

      function isSelectionInMemoEditor() {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return false;
        let node = sel.anchorNode;
        if (!node) return false;
        if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
        return Boolean(node && memoEditor.contains(node));
      }

      function updateToolbarActiveState() {
        if (!memoEditor || !isSelectionInMemoEditor()) {
          toolbarButtons.forEach((button) => button.classList.remove("active"));
          listMenuBtn?.classList.remove("active");
          document.querySelectorAll("[data-align]").forEach((b) => b.classList.remove("active"));
          document.querySelectorAll("[data-list]").forEach((b) => b.classList.remove("active"));
          return;
        }

        const cmdMap = {
          bold: "bold",
          italic: "italic",
          underline: "underline",
          strikeThrough: "strikeThrough"
        };

        toolbarButtons.forEach((button) => {
          const cmd = button.dataset.cmd;
          const stateCmd = cmdMap[cmd];
          if (!stateCmd) return;
          let active = false;
          try {
            active = document.queryCommandState(stateCmd);
          } catch {
            active = false;
          }
          button.classList.toggle("active", active);
        });

        const node = getSelectionNodeInEditor();
        const ul = node?.closest("ul");
        const ol = node?.closest("ol");
        let listStyle = null;
        if (ul && !ul.classList.contains("peekom-task-list")) {
          listStyle = ul.classList.contains("peekom-list-square") ? "square" : "disc";
        } else if (ol) {
          listStyle = "ordered";
        }
        listMenuBtn?.classList.toggle("active", Boolean(listStyle));
        document.querySelectorAll("[data-list]").forEach((b) => {
          b.classList.toggle("active", b.dataset.list === listStyle);
        });

        let alignValue = "justifyLeft";
        const alignNode = getSelectionNodeInEditor();
        const alignBlock = alignNode?.closest("p, h1, h2, h3, li, div");
        if (alignBlock && alignBlock !== memoEditor) {
          const listEl = alignBlock.tagName === "LI" ? alignBlock.closest("ul, ol") : null;
          const styleTarget = listEl || alignBlock;
          const ta = (styleTarget.style.textAlign || window.getComputedStyle(styleTarget).textAlign || "left").toLowerCase();
          if (ta === "center") alignValue = "justifyCenter";
          else if (ta === "right") alignValue = "justifyRight";
          else if (ta === "justify") alignValue = "justifyFull";
          else alignValue = "justifyLeft";
        } else {
          try {
            alignValue = document.queryCommandValue("justify") || "justifyLeft";
          } catch {
            alignValue = "justifyLeft";
          }
        }
        document.querySelectorAll("[data-align]").forEach((b) => {
          b.classList.toggle("active", b.dataset.align === alignValue);
        });
      }

      document.addEventListener("selectionchange", () => {
        if (!isExpanded) return;
        updateToolbarActiveState();
      });

      memoEditor.addEventListener("keyup", updateToolbarActiveState);
      memoEditor.addEventListener("mouseup", updateToolbarActiveState);
      memoEditor.addEventListener("click", updateToolbarActiveState);
      memoEditor.addEventListener("focus", updateToolbarActiveState);

      function closeToolbarDropdowns() {
        document.querySelectorAll(".toolbar-dropdown.open").forEach((el) => el.classList.remove("open"));
        toolbarDropdownOpen = false;
        refreshAutoCollapsePolicy();
      }

      function bindToolbarDropdown(wrapId, dropdownId) {
        const wrap = document.getElementById(wrapId);
        const dropdown = document.getElementById(dropdownId);
        if (!wrap || !dropdown) return;
        const trigger = wrap.querySelector(".tool-btn");
        trigger?.addEventListener("click", (event) => {
          event.stopPropagation();
          const willOpen = !dropdown.classList.contains("open");
          closeToolbarDropdowns();
          if (willOpen) {
            dropdown.classList.add("open");
            toolbarDropdownOpen = true;
            refreshAutoCollapsePolicy();
          }
        });
      }

      bindToolbarDropdown("alignDropdownWrap", "alignDropdown");
      bindToolbarDropdown("colorDropdownWrap", "colorDropdown");
      bindToolbarDropdown("listDropdownWrap", "listDropdown");

      function applyFormatBarTooltips() {
        const lang = (typeof PeekomI18n !== "undefined") ? PeekomI18n.getCurrentLang() : "ko";
        const tip = (key) => {
          if (typeof PeekomI18n !== "undefined") return PeekomI18n.t(key, lang);
          return key;
        };
        document.querySelectorAll(".format-bar [data-tip-key], .toolbar-dropdown [data-tip-key]").forEach((btn) => {
          const key = btn.dataset.tipKey;
          if (!key) return;
          const text = tip(key);
          btn.dataset.tip = text;
          btn.setAttribute("aria-label", text);
          btn.removeAttribute("title");
        });
      }
      applyFormatBarTooltips();

      window.peekomSyncWindowInteraction = syncWindowInteraction;
      window.peekomRefreshPointerHitTest = refreshPointerHitTest;

      document.addEventListener("click", (event) => {
        closeToolbarDropdowns();
        if (!event.target.closest("#handleContextMenu")) {
          hideHandleContextMenu();
        }
      });

      function getMaxImagesPerMemo() {
        return isPremium ? PLUS_MAX_IMAGES_PER_MEMO : FREE_MAX_IMAGES_PER_MEMO;
      }

      function countActiveMemoImages() {
        return memoEditor?.querySelectorAll("img.peekom-memo-image").length ?? 0;
      }

      function syncSlotImagesFromMemo(slotIndex = appState.activeSlot) {
        const slot = appState.slots[slotIndex];
        if (!slot || !memoEditor) return;
        const liveImages = Array.from(memoEditor.querySelectorAll("img.peekom-memo-image"));
        const liveIds = new Set();
        liveImages.forEach((img) => {
          const id = img.getAttribute("data-peekom-id");
          if (id) liveIds.add(id);
        });
        if (!Array.isArray(slot.images)) slot.images = [];
        slot.images = slot.images.filter((entry) => liveIds.has(entry.id));
        liveImages.forEach((img) => {
          const id = img.getAttribute("data-peekom-id");
          if (!id) return;
          const widthStyle = String(img.style.width || "");
          const heightStyle = String(img.style.height || "");
          const widthPx = parseInt(widthStyle, 10);
          const heightPx = parseInt(heightStyle, 10);
          const existingIdx = slot.images.findIndex((entry) => entry.id === id);
          if (existingIdx >= 0) {
            const entry = slot.images[existingIdx];
            slot.images[existingIdx] = {
              ...entry,
              dataUrl: img.getAttribute("src") || entry.dataUrl,
              widthPx: Number.isFinite(widthPx) ? widthPx : entry.widthPx,
              heightPx: Number.isFinite(heightPx) ? heightPx : entry.heightPx
            };
            return;
          }
          slot.images.push({
            id,
            sourcePath: null,
            dataUrl: img.getAttribute("src") || "",
            widthPx: Number.isFinite(widthPx) ? widthPx : undefined,
            heightPx: Number.isFinite(heightPx) ? heightPx : undefined,
            scale: 100,
            insertedAt: new Date().toISOString()
          });
        });
      }

      function guardMemoImageLimit() {
        syncSlotImagesFromMemo();
        const max = getMaxImagesPerMemo();
        if (countActiveMemoImages() >= max) {
          alert(ti("indexMaxImagesAlert", { max }));
          return false;
        }
        return true;
      }

      const CROP_RATIO_MAP = {
        free: null,
        "1:1": 1,
        "3:4": 3 / 4,
        "4:3": 4 / 3,
        "16:9": 16 / 9,
        "9:16": 9 / 16
      };

      let cropDrag = null;

      function syncStagingPreviewWrapSize() {
        if (!imageStagingPreviewWrap) return;
        const maxW = Math.max(160, Math.min(300, (memoEditor?.clientWidth || 300) - 24));
        imageStagingPreviewWrap.style.width = `${maxW}px`;
        imageStagingPreviewWrap.style.height = "160px";
      }

      function getStagingZoomRange(layout) {
        if (!layout) return { minZoom: 1, maxZoom: 1 };
        const { wrapW, wrapH, baseDispW, baseDispH } = layout;
        const minZoom = baseDispH > 0 ? wrapH / baseDispH : 1;
        const maxZoom = baseDispW > 0 ? wrapW / baseDispW : 1;
        return {
          minZoom: Math.min(minZoom, maxZoom),
          maxZoom: Math.max(minZoom, maxZoom)
        };
      }

      function syncStagingSliderRange(preserveZoom = true) {
        if (!imageStagingSlider || !isPremium) return;
        const layout = getStagingImageLayout();
        if (!layout) return;
        const { minZoom, maxZoom } = getStagingZoomRange(layout);
        const minPct = Math.max(1, Math.round(minZoom * 100));
        const maxPct = Math.max(minPct, Math.round(maxZoom * 100));
        imageStagingSlider.min = String(minPct);
        imageStagingSlider.max = String(maxPct);
        const curZoom = preserveZoom ? (Number(imageStagingSlider.value) || 100) / 100 : 1;
        const clamped = clamp(curZoom, minZoom, maxZoom);
        imageStagingSlider.value = String(Math.round(clamped * 100));
      }

      function getImageBounds(layout) {
        if (!layout) return null;
        const { offsetX, offsetY, dispW, dispH } = layout;
        return {
          minX: offsetX,
          minY: offsetY,
          maxX: offsetX + dispW,
          maxY: offsetY + dispH
        };
      }

      function clampCropRectToImage(rect, layout) {
        const b = getImageBounds(layout);
        if (!b || !rect) return rect;
        let { x, y, w, h } = rect;
        w = Math.min(w, b.maxX - b.minX);
        h = Math.min(h, b.maxY - b.minY);
        x = clamp(x, b.minX, Math.max(b.minX, b.maxX - w));
        y = clamp(y, b.minY, Math.max(b.minY, b.maxY - h));
        return { x, y, w, h };
      }

      function getStagingImageLayout() {
        const wrap = imageStagingPreviewWrap;
        const img = imageStagingPreview;
        if (!wrap || !img || !img.naturalWidth) return null;
        const wrapW = wrap.clientWidth;
        const wrapH = wrap.clientHeight || 160;
        const natW = img.naturalWidth;
        const natH = img.naturalHeight;
        const zoom = (Number(imageStagingSlider?.value) || 100) / 100;
        const fit = Math.min(wrapW / natW, wrapH / natH);
        const baseDispW = natW * fit;
        const baseDispH = natH * fit;
        const dispW = baseDispW * zoom;
        const dispH = baseDispH * zoom;
        const offsetX = (wrapW - dispW) / 2;
        const offsetY = (wrapH - dispH) / 2;
        return { wrapW, wrapH, dispW, dispH, offsetX, offsetY, natW, natH, baseDispW, baseDispH };
      }

      function saveCropNorm() {
        const layout = getStagingImageLayout();
        if (!layout || !imageStaging?.cropRect) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const r = imageStaging.cropRect;
        if (dispW <= 0 || dispH <= 0) return;
        imageStaging.cropNorm = {
          x: clamp((r.x - offsetX) / dispW, 0, 1),
          y: clamp((r.y - offsetY) / dispH, 0, 1),
          w: clamp(r.w / dispW, 0.05, 1),
          h: clamp(r.h / dispH, 0.05, 1)
        };
      }

      function syncCropRectFromNorm() {
        if (!imageStaging?.cropNorm) return;
        const layout = getStagingImageLayout();
        if (!layout) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const n = imageStaging.cropNorm;
        let w = n.w * dispW;
        let h = n.h * dispH;
        let x = offsetX + n.x * dispW;
        let y = offsetY + n.y * dispH;
        imageStaging.cropRect = clampCropRectToImage({ x, y, w, h }, layout);
      }

      function initCropRect() {
        const layout = getStagingImageLayout();
        if (!layout || !imageStaging) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const ratio = CROP_RATIO_MAP[imageStaging.cropRatio || "free"];
        let w = dispW;
        let h = dispH;
        let x = offsetX;
        let y = offsetY;
        if (ratio) {
          if (w / h > ratio) w = h * ratio;
          else h = w / ratio;
          x = offsetX + (dispW - w) / 2;
          y = offsetY + (dispH - h) / 2;
        }
        imageStaging.cropRect = clampCropRectToImage({ x, y, w, h }, layout);
        saveCropNorm();
      }

      function applyCropRatioConstraint() {
        const ratio = CROP_RATIO_MAP[imageStaging?.cropRatio || "free"];
        if (!ratio || !imageStaging?.cropRect) return;
        const layout = getStagingImageLayout();
        if (!layout) return;
        const { offsetX, offsetY, dispW, dispH } = layout;
        const minX = offsetX;
        const minY = offsetY;
        const maxX = offsetX + dispW;
        const maxY = offsetY + dispH;
        let w = imageStaging.cropRect.w;
        let h = w / ratio;
        if (h > dispH) {
          h = dispH;
          w = h * ratio;
        }
        if (w > dispW) {
          w = dispW;
          h = w / ratio;
        }
        const cx = imageStaging.cropRect.x + imageStaging.cropRect.w / 2;
        const cy = imageStaging.cropRect.y + imageStaging.cropRect.h / 2;
        let x = cx - w / 2;
        let y = cy - h / 2;
        x = clamp(x, minX, maxX - w);
        y = clamp(y, minY, maxY - h);
        imageStaging.cropRect = { x, y, w, h };
        saveCropNorm();
      }

      function renderCropFrame() {
        if (!imageStagingCropFrame || !imageStaging?.cropRect) return;
        const r = imageStaging.cropRect;
        imageStagingCropFrame.style.left = `${r.x}px`;
        imageStagingCropFrame.style.top = `${r.y}px`;
        imageStagingCropFrame.style.width = `${r.w}px`;
        imageStagingCropFrame.style.height = `${r.h}px`;
      }

      function updateCropUiVisibility() {
        const show = isPremium;
        imageStagingCropLayer?.classList.toggle("hidden", !show);
        imageStagingCropRatios?.classList.toggle("hidden", !show);
        if (show && imageStaging) {
          if (!imageStaging.cropRect) initCropRect();
          else syncCropRectFromNorm();
          applyCropRatioConstraint();
          renderCropFrame();
        }
      }

      function loadImageElement(src) {
        return PeekomMemoImage.loadImageElement(src);
      }

      async function canvasToMemoDataUrl(canvas, displayWidth, displayHeight) {
        return PeekomMemoImage.compressCanvasForMemoStorage(canvas, {
          displayWidth,
          displayHeight
        });
      }

      async function exportStagedImage() {
        const src = imageStaging.dataUrl;
        const img = await loadImageElement(src);
        const layout = getStagingImageLayout();
        const crop = imageStaging.cropRect;
        const natW = img.naturalWidth;
        const natH = img.naturalHeight;

        if (isPremium && layout && crop) {
          const { offsetX, offsetY, dispW, dispH } = layout;
          const relX = (crop.x - offsetX) / dispW;
          const relY = (crop.y - offsetY) / dispH;
          const relW = crop.w / dispW;
          const relH = crop.h / dispH;
          const sx = clamp(relX * natW, 0, natW - 1);
          const sy = clamp(relY * natH, 0, natH - 1);
          const sw = clamp(relW * natW, 1, natW - sx);
          const sh = clamp(relH * natH, 1, natH - sy);
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(sw);
          canvas.height = Math.round(sh);
          canvas.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
          const displayW = Math.max(1, Math.round(crop.w));
          const displayH = Math.max(1, Math.round(crop.h));
          return {
            dataUrl: await canvasToMemoDataUrl(canvas, displayW, displayH),
            widthPx: displayW,
            heightPx: displayH,
            nativeWidthPx: canvas.width,
            nativeHeightPx: canvas.height
          };
        }

        if (isPremium && layout) {
          const displayW = Math.max(1, Math.round(layout.dispW));
          const displayH = Math.max(1, Math.round(layout.dispH));
          const canvas = document.createElement("canvas");
          canvas.width = displayW;
          canvas.height = displayH;
          canvas.getContext("2d").drawImage(img, 0, 0, natW, natH, 0, 0, displayW, displayH);
          return {
            dataUrl: await canvasToMemoDataUrl(canvas, displayW, displayH),
            widthPx: displayW,
            heightPx: displayH
          };
        }

        const memoMaxW = Math.max(120, memoEditor?.clientWidth || 300);
        let targetW = natW;
        let targetH = natH;
        if (natW > memoMaxW) {
          const ratio = memoMaxW / natW;
          targetW = memoMaxW;
          targetH = Math.round(natH * ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = targetW;
        canvas.height = targetH;
        canvas.getContext("2d").drawImage(img, 0, 0, targetW, targetH);
        return {
          dataUrl: await canvasToMemoDataUrl(canvas, targetW, targetH),
          widthPx: targetW,
          heightPx: targetH
        };
      }

      function applyImageStagingSliderState() {
        if (!imageStagingSlider) return;
        if (!isPremium) {
          imageStagingSlider.value = "100";
          imageStagingSlider.disabled = true;
          if (imageStaging) imageStaging.scale = 100;
        } else {
          imageStagingSlider.disabled = false;
        }
        updateStagingPreviewWidth();
      }

      function showImageStaging(dataUrl, filePath = null, scale = 100) {
        const safeScale = isPremium ? scale : 100;
        imageStaging = {
          dataUrl,
          filePath,
          scale: safeScale,
          cropRatio: "free",
          cropRect: null,
          cropNorm: null
        };
        imageStagingCropRatios?.querySelectorAll("button[data-ratio]").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.ratio === "free");
        });
        if (imageStagingPreview) {
          imageStagingPreview.onload = () => {
            syncStagingPreviewWrapSize();
            syncStagingSliderRange(false);
            updateStagingPreviewWidth();
          };
          imageStagingPreview.src = dataUrl;
          if (imageStagingPreview.complete) {
            syncStagingPreviewWrapSize();
            syncStagingSliderRange(false);
            updateStagingPreviewWidth();
          }
        }
        if (imageStagingSlider) imageStagingSlider.value = String(safeScale);
        applyImageStagingSliderState();

      function hideImageStaging() {
        imageStaging = null;
        cropDrag = null;
        if (imageStagingPreview) {
          imageStagingPreview.onload = null;
          imageStagingPreview.removeAttribute("src");
          imageStagingPreview.style.width = "";

        }
        imageStagingCropLayer?.classList.add("hidden");
        imageStagingCropRatios?.classList.add("hidden");
        imageStagingOverlay?.classList.add("hidden");
        imageStagingOverlay?.setAttribute("aria-hidden", "true");
        refreshAutoCollapsePolicy();
      }

      function updateStagingPreviewWidth() {
        if (!imageStagingPreview || !imageStagingSlider || !imageStaging) return;
        syncStagingSliderRange();
        const scale = Number(imageStagingSlider.value) || 100;
        imageStaging.scale = scale;
        if (isPremium && imageStaging.cropRect) {
          saveCropNorm();
        }
        syncStagingPreviewWrapSize();
        const layout = getStagingImageLayout();
        if (layout) {
          imageStagingPreview.style.width = `${layout.dispW}px`;
          imageStagingPreview.style.height = `${layout.dispH}px`;
        }
        if (isPremium) {
          if (imageStaging.cropNorm) syncCropRectFromNorm();
          else if (!imageStaging.cropRect) initCropRect();
          applyCropRatioConstraint();
        }

      async function pickMemoImage() {
        if (!guardMemoImageLimit()) return;
        try {
          const result = await ipcRenderer.invoke("image:pick");
          if (!result?.ok) return;
          showImageStaging(result.dataUrl, result.filePath || null, 100);

          console.error(err);
        }
      }

      function insertInlineMemoImage(dataUrl, widthPx, heightPx, imageId) {
        const w = Math.max(1, Math.round(widthPx));
        const h = Math.max(1, Math.round(heightPx || widthPx));
        const imgHtml = `<span class="peekom-image-wrap"><img class="peekom-memo-image" data-peekom-id="${imageId}" data-peekom-fixed-size="1" src="${dataUrl}" style="width:${w}px;height:${h}px;max-width:none;" alt=""></span>`;
        memoEditor.focus();
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0 && memoEditor.contains(sel.anchorNode)) {
          const range = sel.getRangeAt(0);
          range.collapse(false);
          const temp = document.createElement("div");
          temp.innerHTML = imgHtml;
          const imgNode = temp.firstChild;
          if (imgNode) {
            range.insertNode(imgNode);
            range.setStartAfter(imgNode);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
          }
        } else {
          memoEditor.insertAdjacentHTML("beforeend", `<p>${imgHtml}</p>`);
        }
      }

      async function commitImageStaging() {
        if (!imageStaging) return;
        if (!guardMemoImageLimit()) return;
        const slot = appState.activeSlot;
        const { dataUrl, widthPx, heightPx, nativeWidthPx, nativeHeightPx } = await exportStagedImage();
        const id = crypto.randomUUID();
        if (!Array.isArray(appState.slots[slot].images)) {
          appState.slots[slot].images = [];
        }
        appState.slots[slot].images.push({
          id,
          sourcePath: imageStaging.filePath || null,
          dataUrl,
          widthPx,
          heightPx,
          nativeWidthPx: nativeWidthPx || widthPx,
          nativeHeightPx: nativeHeightPx || heightPx,
          scale: 100,
          insertedAt: new Date().toISOString()
        });
        insertInlineMemoImage(dataUrl, widthPx, heightPx, id);
        hideImageStaging();
        persistActiveMemo();
        notifySettingsChanged(["images", "memoHtml"]);
      }

      function addIndexAtBottom() {
        if (!isPremium && appState.enabledCount >= FREE_MAX_SLOTS) {
          window.PeekomPremiumUI?.showPremiumModal();

        }
        const max = getMaxEnabledSlots();
        if (appState.enabledCount >= max) {

          return;
        }
        persistActiveMemo();
        const newSlot = appState.enabledCount;
        appState.slots[newSlot] = defaultSlot(newSlot);
        appState.enabledCount += 1;
        appState.order = normalizeOrder(appState.order, appState.enabledCount);
        appState.activeSlot = newSlot;
        appState.global.setupCompleted = true;
        if (isPremium) {
          assignNextFreeYSlot(appState.slots, appState.enabledCount, newSlot);
        } else {
          packFreeYSlots();
        }
        prepareSlotRoster();
        saveState(appState);
        applyThemeForSlot(newSlot);
        loadMemoForActiveSlot({ force: true });
        renderHandleStack();

        }).catch(() => {});

      function deleteCurrentIndexWithConfirm() {

      function performDeleteCurrentIndex() {
        if (appState.enabledCount <= 1) return;
        deleteIndexModal?.classList.add("hidden");
        const del = appState.activeSlot;
        persistActiveMemo();
        for (let i = del; i < MAX_SLOTS - 1; i++) {
          appState.slots[i] = appState.slots[i + 1];
        }
        appState.slots[MAX_SLOTS - 1] = defaultSlot(MAX_SLOTS - 1);
        appState.enabledCount -= 1;
        appState.order = normalizeOrder(appState.order, appState.enabledCount);
        appState.activeSlot = clampSlotIndex(Math.max(0, del - 1), appState.enabledCount);
        appState.global.setupCompleted = true;
        if (!isPremium) packFreeYSlots();
        saveState(appState);
        applyThemeForSlot(appState.activeSlot);
        loadMemoForActiveSlot({ force: true });

        }).catch(() => {});
