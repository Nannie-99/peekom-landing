<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peekom</title>
    <link rel="icon" id="appFavicon" href="build/icon.ico" type="image/x-icon" />
    <script src="assets/i18n.js"></script>
    <script src="assets/i18n-locale-extra.js"></script>
    <script src="assets/memo-sanitize.js"></script>
    <script src="assets/memo-state-helpers.js"></script>
    <script src="assets/memo-image-helpers.js"></script>
    <script src="assets/premium-config.js"></script>
    <script src="assets/premium-ui.js"></script>
    <style>
      :root {
        --collapsed-width: 32px;
        --panel-width: 420px;
        --handle-height: 10vh;
        --active-y-slot: 0;
        --note-bg: #fff4b8;
        --note-text: #2f3750;
        --muted-text: #7f8797;
        --accent: #4a79ff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        color: var(--note-text);
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .floating-panel {
        position: relative;
        width: 100%;
        height: 100%;
        isolation: isolate;
        pointer-events: none;
      }

      .handle-column {
        position: absolute;
        top: 0;
        right: 0;
        width: var(--collapsed-width);
        height: 100%;
        z-index: 100;
        pointer-events: none;
      }

      .panel-edge-left .handle-column {
        left: 0;
        right: auto;
      }

      .panel-edge-left .edge-handle {
        left: 0;
        right: auto;
        border-radius: 0 12px 12px 0;
        border-left: 0;
        border-right: 2px solid rgba(79, 84, 95, 0.28);
        box-shadow: inset -2px 0 0 rgba(255, 255, 255, 0.35);
      }

      .panel-edge-left .floating-panel.expanded .edge-handle.is-active {
        border-right: 0;
      }

      .panel-edge-left .note-backing {
        left: 0;
        right: auto;
        border-radius: 0 12px 12px 0;
      }

      .panel-edge-left .note-shell {
        left: 0;
        right: auto;
        padding-left: calc(var(--collapsed-width) + 8px);
        padding-right: 10px;
        border-radius: 0 12px 12px 0;
        transform: translateX(-120%);
      }

      .panel-edge-left.floating-panel.expanded .note-shell {
        transform: translateX(0);
      }

      .edge-handle {
        position: absolute;
        right: 0;
        width: 100%;
        height: var(--handle-height);
        border: 0;
        background: color-mix(in srgb, var(--handle-bg, var(--note-bg)) 90%, var(--handle-text, var(--note-text)) 10%);
        color: var(--handle-text, var(--note-text));
        border-radius: 12px 0 0 12px;
        border-left: 2px solid rgba(79, 84, 95, 0.28);
        box-shadow: inset 2px 0 0 rgba(255, 255, 255, 0.35);
        cursor: ew-resize;
        padding: 4px 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        pointer-events: auto;
      }

      .edge-handle.is-active {
        background: color-mix(in srgb, var(--handle-bg, var(--note-bg)) 78%, var(--handle-text, var(--note-text)) 22%);
      }

      .edge-handle.is-dragging-reorder {
        opacity: 0.92;
        z-index: 120;
      }

      .handle-label-text {
        writing-mode: vertical-rl;
        text-orientation: upright;
        letter-spacing: 1px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.05;
        max-height: 100%;
        overflow: hidden;
        text-align: center;
        color: var(--handle-text, var(--note-text));
        pointer-events: none;
        user-select: none;
      }

      .floating-panel:not(.expanded) .note-shell,
      .floating-panel:not(.expanded) .first-run-tip {
        pointer-events: none;
      }

      .floating-panel.expanded .edge-handle.is-active {
        background: var(--note-bg);
        border-left: 0;
        box-shadow: none;
        color: var(--note-text);
      }

      .note-backing {
        position: absolute;
        right: 0;
        top: 0;
        width: 0;
        height: 0;
        background: var(--note-bg);
        border-radius: 12px 0 0 12px;
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
      }

      .floating-panel.expanded .note-backing {
        opacity: 1;
        visibility: visible;
      }

      .handle-context-menu {
        position: fixed;
        z-index: 200;
        min-width: 140px;
        padding: 4px 0;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #dadce0;
        box-shadow: 0 2px 10px rgba(60, 64, 67, 0.18);
        pointer-events: auto;
      }

      .handle-context-menu.hidden {
        display: none;
      }

      .handle-context-menu button {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        text-align: left;
        padding: 8px 12px;
        font-size: 12px;
        color: #2f3750;
        cursor: pointer;
      }

      .handle-context-menu button:hover:not(:disabled) {
        background: #f1f3f4;
      }

      .handle-context-menu button:disabled {
        color: #9aa0a6;
        cursor: default;
      }

      .handle-context-menu button.danger {
        color: #d04646;
      }

      .toolbar-dropdown-wrap {
        position: relative;
      }

      .toolbar-dropdown {
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 2px;
        padding: 4px 6px;
        background: var(--toolbar-surface, rgba(255, 255, 255, 0.96));
        border: 1px solid var(--toolbar-border, rgba(60, 64, 67, 0.18));
        border-radius: 8px;
        box-shadow: 0 1px 6px var(--toolbar-shadow, rgba(60, 64, 67, 0.15));
        z-index: 50;
        white-space: nowrap;
        align-items: center;
      }

      .toolbar-dropdown.open {
        display: inline-flex;
      }

      .toolbar-caret {
        font-size: 8px;
        margin-left: 1px;
        opacity: 0.65;
      }

      .color-swatch-btn {
        width: 18px;
        height: 18px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 4px;
        cursor: pointer;
        padding: 0;
      }

      .toolbar-dropdown .tool-btn {
        width: 18px;
        height: 18px;
        min-width: 18px;
        padding: 0;
        font-size: 11px;
      }

      .list-style-btn svg {
        display: block;
      }

      .peekom-list-square {
        list-style-type: square;
      }

      .color-swatch-btn[data-color="theme"] {
        background: var(--note-text);
      }

      .image-staging-overlay {
        position: absolute;
        inset: 0;
        background: rgba(20, 26, 40, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 35;
        pointer-events: auto;
      }

      .image-staging-overlay.hidden {
        display: none;
      }

      .image-staging-card {
        width: min(300px, 92%);
        padding: 12px;
        border-radius: 12px;
        background: #fff;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }

      .image-staging-preview-wrap {
        position: relative;
        width: 100%;
        max-height: 200px;
        overflow: hidden;
        border-radius: 6px;
        background: #f4f6fa;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .image-staging-preview-wrap img {
        display: block;
        flex-shrink: 0;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .image-staging-crop-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .image-staging-crop-layer:not(.hidden) {
        pointer-events: auto;
      }

      .image-staging-crop-frame {
        position: absolute;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35), 0 0 0 9999px rgba(0, 0, 0, 0.35);
        cursor: move;
        box-sizing: border-box;
      }

      .image-staging-crop-ratios {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        justify-content: center;
        width: 100%;
      }

      .image-staging-crop-ratios button {
        height: 24px;
        padding: 0 8px;
        border: 1px solid #d7dde9;
        border-radius: 6px;
        background: #fff;
        font-size: 11px;
        cursor: pointer;
        color: #3c4043;
      }

      .image-staging-crop-ratios button.active {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 12%, #fff);
        color: var(--accent);
      }

      .image-staging-card img#imageStagingPreview {
        max-width: none;
        max-height: none;
      }

      .image-staging-actions {
        display: flex;
        gap: 8px;
        width: 100%;
        justify-content: flex-end;
      }

      .image-staging-actions button {
        height: 30px;
        padding: 0 12px;
        border-radius: 8px;
        border: 1px solid #d7dde9;
        background: #fff;
        font-size: 12px;
        cursor: pointer;
      }

      .image-staging-actions button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .image-staging-scale-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        max-width: 240px;
      }

      .image-staging-scale-label {
        font-size: 11px;
        color: #64718b;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .image-staging-scale-wrap {
        flex: 1;
        min-width: 0;
      }

      .image-staging-scale {
        width: 100%;
        accent-color: var(--accent);
      }

      .memo-editor img.peekom-memo-image {
        display: inline-block;
        vertical-align: bottom;
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        margin: 2px 4px;
      }

      .memo-editor img.peekom-memo-image[data-peekom-fixed-size="1"] {
        max-width: none;
        flex-shrink: 0;
      }

      .memo-editor .peekom-image-wrap {
        display: inline;
        line-height: 0;
      }

      .memo-editor h1 {
        font-size: 1.45em;
        font-weight: 700;
        margin: 0.2em 0;
      }

      .memo-editor h2 {
        font-size: 1.25em;
        font-weight: 700;
        margin: 0.2em 0;
      }

      .memo-editor h3 {
        font-size: 1.1em;
        font-weight: 700;
        margin: 0.2em 0;
      }

      .first-run-tip {
        position: absolute;
        right: calc(var(--collapsed-width) + 10px);
        max-width: 220px;
        padding: 10px 11px;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.96);
        color: #404a60;
        font-size: 11px;
        line-height: 1.4;
        z-index: 18;
        pointer-events: auto;
      }

      .note-shell {
        position: absolute;
        top: calc(var(--handle-height) * var(--active-y-slot, 0));
        right: 0;
        width: 100%;
        height: var(--note-shell-height, 40vh);
        max-height: var(--note-shell-maxh, 40vh);
        padding: 10px 10px 6px;
        padding-right: calc(var(--collapsed-width) + 8px);
        border-radius: 12px 0 0 12px;
        background: var(--note-bg);
        transform: translateX(120%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: transform 280ms cubic-bezier(0.2, 1, 0.25, 1), opacity 150ms ease;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 1;
        overflow: hidden;
      }

      .floating-panel.expanded .note-shell {
        transform: translateX(0);
        opacity: 1;
        visibility: visible;
        pointer-events: none;
        z-index: 3;
      }

      .floating-panel.expanded .note-editor-wrap,
      .floating-panel.expanded .note-footer {
        pointer-events: auto;
      }

      .settings-icon-btn {
        display: none !important;
      }

      .note-editor-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        background: transparent;
        overflow: hidden;
      }

      .memo-editor {
        flex: 1;
        min-height: 0;
        padding: 10px 8px 6px;
        outline: none;
        overflow: auto;
        font-size: var(--memo-base-font-size, 18px);
        line-height: 1.52;
        color: var(--note-text);
        background: transparent;
        font-family: var(--note-font-family, "Segoe UI", sans-serif);
        word-break: break-word;
        pointer-events: auto;
      }

      .memo-editor div,
      .memo-editor p,
      .memo-editor li,
      .memo-editor span:not(.peekom-task-check) {
        font-size: inherit;
      }

      .memo-editor a[data-external] {
        color: var(--accent);
        text-decoration: underline;
        cursor: pointer;
      }

      .memo-editor a[data-external]:hover {
        filter: brightness(0.9);
      }

      .memo-editor ul,
      .memo-editor ol {
        margin-left: 18px;
      }

      .peekom-task-list {
        list-style: none;
        margin-left: 0;
        padding-left: 0;
      }

      .peekom-task-list li {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        margin-left: 0;
      }

      .peekom-task-check {
        flex-shrink: 0;
        width: 15px;
        height: 15px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        margin-top: 3px;
        font-size: 11px;
        line-height: 1;
        box-sizing: border-box;
      }

      .peekom-task-list li[data-checked="true"] .peekom-task-check::after {
        content: "✓";
        font-weight: 700;
        font-size: 10px;
      }

      .peekom-task-list li[data-checked="true"] {
        opacity: 0.72;
        text-decoration: line-through;
        text-decoration-color: color-mix(in srgb, currentColor 55%, transparent);
      }

      .memo-image-block {
        flex-shrink: 0;
        padding: 4px 8px 8px;
        border-top: 1px dashed rgba(70, 84, 115, 0.2);
        display: flex;
        flex-direction: column;
        gap: 4px;
        align-items: center;
      }

      .memo-image-block.hidden {
        display: none;
      }

      .memo-image-frame {
        position: relative;
        max-width: 100%;
        line-height: 0;
      }

      .memo-image-frame img {
        display: block;
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        user-select: none;
      }

      .memo-image-remove {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
      }

      .memo-image-scale {
        width: 100%;
        max-width: 180px;
        accent-color: var(--accent);
      }

      .memo-modal {
        position: absolute;
        inset: 0;
        background: rgba(20, 26, 40, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 40;
        pointer-events: auto;
      }

      .memo-modal.hidden {
        display: none;
      }

      .memo-modal-card {
        width: min(280px, 92%);
        padding: 14px 14px 12px;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      }

      .memo-modal-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 6px;
        color: #2f3750;
      }

      .memo-modal-desc {
        font-size: 12px;
        line-height: 1.45;
        color: #64718b;
        margin-bottom: 12px;
      }

      .memo-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .memo-modal-actions button {
        height: 30px;
        padding: 0 12px;
        border-radius: 8px;
        border: 1px solid #d7dde9;
        background: #fff;
        font-size: 12px;
        cursor: pointer;
      }

      .memo-modal-actions button.danger {
        border-color: #d04646;
        background: #d04646;
        color: #fff;
      }

      .note-footer {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: flex-start;
        gap: 0 6px;
        height: 30px;
        min-height: 30px;
        flex-shrink: 0;
        padding-top: 2px;
        color: var(--muted-text);
        font-size: 11px;
        overflow: visible;
        position: relative;
        z-index: 1;
      }

      .mode-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 22px;
        min-width: 42px;
        padding: 0 6px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        flex-shrink: 0;
        border: 0;
        cursor: pointer;
        position: relative;
      }
      .mode-chip:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .mode-chip[title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(30,36,54,0.92);
        color: #fff;
        font-size: 10px;
        font-weight: 400;
        white-space: nowrap;
        padding: 3px 7px;
        border-radius: 5px;
        pointer-events: none;
        z-index: 999;
      }

      .mode-chip.peek {
        background: #f8d878;
        color: #5c4a08;
      }

      .mode-chip.ice {
        background: #cfe5ff;
        color: #21518f;
      }

      .format-bar {
        display: inline-flex;
        flex-wrap: nowrap;
        gap: 0 2px;
        align-items: center;
        flex: 1;
        min-width: 0;
        justify-content: flex-start;
        overflow: visible;
      }

      .tool-btn {
        height: 26px;
        min-width: 26px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--toolbar-fg, #3c4043);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        padding: 0 3px;
        transition: background 120ms ease;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .format-bar .tool-btn[data-tip]:hover::after,
      .toolbar-dropdown .tool-btn[data-tip]:hover::after,
      .toolbar-dropdown .color-swatch-btn[data-tip]:hover::after {
        content: attr(data-tip);
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(30, 36, 54, 0.92);
        color: #fff;
        font-size: 10px;
        font-weight: 400;
        white-space: nowrap;
        padding: 3px 7px;
        border-radius: 5px;
        pointer-events: none;
        z-index: 1000;
      }

      .toolbar-dropdown .color-swatch-btn[data-tip] {
        position: relative;
      }

      .tool-btn:hover {
        background: var(--toolbar-hover-bg, rgba(60, 64, 67, 0.08));
      }

      .tool-btn.active {
        background: var(--toolbar-active-bg, rgba(60, 64, 67, 0.16));
        color: var(--toolbar-active-fg, #202124);
      }

      .tool-btn-icon svg {
        display: block;
      }

      .tool-group {
        display: inline-flex;
        align-items: center;
        gap: 1px;
        flex-shrink: 0;
      }

      .save-indicator {
        position: absolute;
        right: calc(var(--collapsed-width) + 10px);
        bottom: 40px;
        font-size: 10px;
        color: var(--muted-text);
        background: transparent;
        border: 1px solid color-mix(in srgb, var(--muted-text) 35%, transparent);
        border-radius: 999px;
        padding: 1px 7px;
        opacity: 0;
        transition: opacity 280ms ease;
        pointer-events: none;
        z-index: 20;
      }

      .save-indicator.visible {
        opacity: 1;
      }

      .hidden {
        display: none !important;
      }

      @media (prefers-reduced-motion: reduce) {
        .note-shell {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <section id="panel" class="floating-panel" aria-label="Floating index panel">
        <div id="noteBacking" class="note-backing" aria-hidden="true"></div>
        <div id="handleColumn" class="handle-column" aria-hidden="false"></div>

        <div id="firstRunTip" class="first-run-tip hidden">
          손잡이를 클릭하면 인덱스가 나옵니다.<br />
          드래그하면 위치·순서를 바꿀 수 있어요.
        </div>

        <article id="noteShell" class="note-shell">
          <div class="note-editor-wrap">
            <div id="memoEditor" class="memo-editor" contenteditable="true"></div>
          </div>

          <div class="note-footer">
            <button id="modeChip" class="mode-chip peek" type="button">빼꼼</button>

            <div id="formatBar" class="format-bar">
              <div class="tool-group toolbar-dropdown-wrap" id="colorDropdownWrap">
                <button id="colorMenuBtn" class="tool-btn" type="button" data-tip-key="fmtTextColor"><u>A</u><span class="toolbar-caret">▾</span></button>
                <div class="toolbar-dropdown" id="colorDropdown">
                  <button class="color-swatch-btn" type="button" data-color="theme" data-tip-key="fmtColorDefault"></button>
                  <button class="color-swatch-btn" type="button" data-color="#D04646" data-tip-key="fmtColorRed" style="background:#D04646"></button>
                  <button class="color-swatch-btn" type="button" data-color="#2F67D8" data-tip-key="fmtColorBlue" style="background:#2F67D8"></button>

              <p class="memo-modal-desc">현재 인덱스의 메모·제목·색상·이미지가 모두 삭제됩니다. 되돌릴 수 없어요.</p>

                <button id="deleteIndexCancelBtn" type="button">취소</button>
                <button id="deleteIndexConfirmBtn" type="button" class="danger">삭제</button>

    </main>

    <script>
      const ipcRenderer = {
        invoke: (channel, ...args) => window.peekom.invoke(channel, ...args),
        send: (channel, ...args) => window.peekom.send(channel, ...args),
        sendSync: (channel, ...args) => window.peekom.sendSync(channel, ...args),
        on(channel, listener) {
          return window.peekom.on(channel, (...args) => listener(null, ...args));
        }
      };

      let marked = window.peekom?.marked ?? null;

      function parseMarkdownInline(text) {
        if (marked && typeof marked.parseInline === "function") {
          return marked.parseInline(text);
        }
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function ti(key, vars) {
        if (typeof PeekomI18n === "undefined") return key;
        let text = PeekomI18n.t(key, PeekomI18n.getCurrentLang());
        if (vars) {
          Object.keys(vars).forEach((k) => {
            text = text.replace(new RegExp("\\{" + k + "\\}", "g"), vars[k]);
          });
        }
        return text;
      }

      function sanitizeMemoHtml(html) {
        if (typeof PeekomMemoSanitize !== "undefined" && PeekomMemoSanitize.sanitizeMemoHtml) {
          return PeekomMemoSanitize.sanitizeMemoHtml(html);
        }
        return html || "";
      }

      function notifySettingsChanged(fields) {
        ipcRenderer
          .invoke("settings:notify-changed", {
            skipMainReload: true,
            skipSettingsReload: false,
            partial: true,
            fields: Array.isArray(fields) ? fields : ["slots"],
            language: appState.global?.language
          })
          .catch(() => {});
      }

      function applyMainUiLabels() {
        const firstRunTip = document.getElementById("firstRunTip");
        if (firstRunTip) firstRunTip.innerHTML = ti("firstRunTipHtml");
        if (saveIndicator) saveIndicator.textContent = ti("saveIndicatorSaved");
        const deleteTitle = document.getElementById("deleteIndexModalTitle");
        if (deleteTitle) deleteTitle.textContent = ti("deleteIndexModalTitle");
        const deleteDesc = document.querySelector("#deleteIndexModal .memo-modal-desc");
        if (deleteDesc) deleteDesc.textContent = ti("deleteIndexModalDesc");
        if (deleteIndexCancelBtn) deleteIndexCancelBtn.textContent = ti("deleteIndexCancel");
        if (deleteIndexConfirmBtn) deleteIndexConfirmBtn.textContent = ti("deleteIndexConfirm");
        if (imageStagingCancelBtn) imageStagingCancelBtn.textContent = ti("imageStagingCancel");
        if (imageStagingConfirmBtn) imageStagingConfirmBtn.textContent = ti("imageStagingInsert");
        if (imageStagingPreview) imageStagingPreview.alt = ti("imagePreviewAlt");
        const cropFreeBtn = imageStagingCropRatios?.querySelector('[data-ratio="free"]');
        if (cropFreeBtn) cropFreeBtn.textContent = ti("imageCropFree");
        const scaleSmallLabel = document.getElementById("imageStagingScaleSmall");
        if (scaleSmallLabel) scaleSmallLabel.textContent = ti("imageScaleSmall");
        const scaleLargeLabel = document.getElementById("imageStagingScaleLarge");
        if (scaleLargeLabel) scaleLargeLabel.textContent = ti("imageScaleLarge");
        setPinned(isPinned);
        applyFormatBarTooltips();
        window.PeekomPremiumUI?.refreshPremiumModalI18n?.();
      }

      const STATE_KEY = "ppaekkom-plus-state-v5";
      const STATE_KEY_BACKUP = "ppaekkom-plus-state-v5-backup";
      const STATE_KEY_V4 = "ppaekkom-plus-state-v4";
      const LEGACY_V3_KEY = "ppaekkom-app-state-v3";
      const FIRST_RUN_KEY = "ppaekkom-first-run-seen";
      const LEGACY_SETTINGS_KEY = "ppaekkom-app-settings-v2";
      const LEGACY_MEMO_KEY = "ppaekkom-memo-html-v2";

      ipcRenderer.on("shared-state:read-request", (_event, replyChannel) => {
        try {
          ipcRenderer.send(replyChannel, {
            raw: localStorage.getItem(STATE_KEY),
            backup: localStorage.getItem(STATE_KEY_BACKUP)
          });
        } catch (err) {
          ipcRenderer.send(replyChannel, { raw: null, backup: null, error: String(err?.message || err) });
        }
      });

      ipcRenderer.on("shared-state:write-request", (_event, payload = {}) => {
        const replyChannel = payload.replyChannel;
        try {
          const json = payload.json;
          if (typeof json !== "string" || json.length === 0) {
            ipcRenderer.send(replyChannel, { ok: false, reason: "INVALID_PAYLOAD" });
            return;
          }
          const prev = localStorage.getItem(STATE_KEY);
          try {
            localStorage.setItem(STATE_KEY, json);
          } catch (quotaErr) {
            localStorage.removeItem(STATE_KEY_BACKUP);
            localStorage.setItem(STATE_KEY, json);
          }
          if (prev) {
            try {
              localStorage.setItem(STATE_KEY_BACKUP, prev);
            } catch {
              try { localStorage.removeItem(STATE_KEY_BACKUP); } catch { /* ignore */ }
            }
          }
          ipcRenderer.send(replyChannel, { ok: true });
        } catch (err) {
          ipcRenderer.send(replyChannel, { ok: false, reason: String(err?.message || err) });
        }
      });

      const DEFAULT_HOVER_DELAY = 300;
      const LABEL_MAX = 6;
      const MAX_SLOTS = 10;
      const FREE_MAX_SLOTS = PeekomPremiumConfig?.FREE_MAX_SLOTS ?? 3;
      const FREE_MAX_IMAGES_PER_MEMO = 1;
      const PLUS_MAX_IMAGES_PER_MEMO = 5;
      let isPremium = false;
      // 초기 상태 로딩이 끝나기 전에는 premium:changed가 슬롯/저장에 개입하지 못하게 막는다.
      // (초기화 중 createFreshState()인 빈 상태를 저장해 사용자 데이터를 덮어쓰는 것을 방지)
      let appInitialized = false;

      function getMaxEnabledSlots() {
        return isPremium ? MAX_SLOTS : FREE_MAX_SLOTS;
      }

      function enforceSlotLimits() {
        const max = getMaxEnabledSlots();
        if (isPremium) {
          // 재활성화: 다운그레이드 때 숨겨 두었던(데이터는 보존된) 탭 수/순서를 복원한다.
          const suspendedCount =
            typeof appState.suspendedEnabledCount === "number"
              ? clamp(Math.round(appState.suspendedEnabledCount), 1, MAX_SLOTS)
              : 0;
          if (suspendedCount > appState.enabledCount) {
            appState.enabledCount = suspendedCount;
            if (
              Array.isArray(appState.suspendedOrder) &&
              appState.suspendedOrder.length === suspendedCount
            ) {
              appState.order = normalizeOrder(appState.suspendedOrder, suspendedCount);
            } else {
              appState.order = normalizeOrder(appState.order, suspendedCount);
            }
          }
          delete appState.suspendedEnabledCount;
          delete appState.suspendedOrder;
          return;
        }
        if (appState.enabledCount > max) {
          // 다운그레이드: 무료 한도를 넘는 탭은 화면에서 숨긴다.
          // 메모 데이터는 slots 배열에 그대로 보존하고, 재활성화 시 복원할 수 있도록
          // 원래 탭 개수와 순서를 기록해 둔다(가장 오래전에 만든 탭부터 유지됨).
          appState.suspendedEnabledCount = Math.max(
            typeof appState.suspendedEnabledCount === "number"
              ? appState.suspendedEnabledCount
              : 0,
            appState.enabledCount
          );
          appState.suspendedOrder = appState.order.slice(0, appState.enabledCount);
          appState.enabledCount = max;
          appState.order = normalizeOrder(appState.order, max);
          appState.activeSlot = clampSlotIndex(appState.activeSlot, max);
        }
      }

      function packFreeYSlots() {
        if (isPremium) return false;
        const ec = appState.enabledCount;
        if (ec <= 0) return false;
        const ord = appState.order.slice(0, ec);
        const minY = Math.min(...ord.map((si) => appState.slots[si].ySlot ?? 0));
        const baseY = clamp(minY, 0, MAX_Y_SLOTS - ec);
        const now = Date.now();
        let changed = false;
        ord.forEach((si, i) => {
          const next = baseY + i;
          if (appState.slots[si].ySlot !== next) changed = true;
          appState.slots[si].ySlot = next;
          appState.slots[si].ySlotUpdatedAt = now;
        });
        return changed;
      }

      function enforceFreeTypography() {
        if (isPremium) return;
        for (let i = 0; i < appState.enabledCount; i++) {
          appState.slots[i].fontSize = DEFAULT_FONT_SIZE;
          appState.slots[i].fontFamily = null;
        }
        if (appState.global) appState.global.memoDefaultOpacity = 100;
        packFreeYSlots();
      }
      const MAX_Y_SLOTS = 10;
      const PANEL_CONTENT_WIDTH = 420;
      const COLLAPSED_WIDTH = 32;
      const DRAG_THRESHOLD = 12;
      const SWAP_HOLD_MS = 400;
      const FONT_SIZE_MIN = 8;
      const FONT_SIZE_MAX = 36;
      const DEFAULT_FONT_SIZE = 18;
      const THEME_NAMES = ["yellow", "pink", "blue", "green", "custom"];
      const THEME_MAP = {
        yellow: { bg: "#FFF4B8", text: "#2F3750", accent: "#4A79FF" },
        pink: { bg: "#FFD9E8", text: "#3B3350", accent: "#B1457A" },
        blue: { bg: "#DDEBFF", text: "#2B3D5D", accent: "#2F67D8" },
        green: { bg: "#DCF5DE", text: "#2A4B38", accent: "#2A7C44" },
        custom: null
      };

      const URL_REGEX = /\b((?:https?:\/\/|www\.)[^\s<>"]+)/gi;

      function defaultGlobal() {
        return {
          anchor: "middle",
          lengthMode: "long",
          triggerMode: "hover",
          shortcut: "CommandOrControl+Shift+M",
          shortcutSlotPrev: "CommandOrControl+Shift+Up",
          shortcutSlotNext: "CommandOrControl+Shift+Down",
          hoverDelayMs: DEFAULT_HOVER_DELAY,
          manualYOffset: 0,
          openAtLogin: false,
          language: null,
          monitorMode: "auto",
          monitorTargetId: null,
          pinToggleMode: "dblclick",
          setupCompleted: false,
          showTrayIcon: true,
          memoAspectRatio: "3:4",
          imageLayout: "below",
          lastOpenedSlotIndex: 0,
          memoDefaultOpacity: 100,
          panelEdge: "right"
        };
      }

      function defaultSlot(index = 0) {
        return {
          label: "",
          theme: "yellow",
          memoHtml: "",
          ySlot: clamp(index, 0, MAX_Y_SLOTS - 1),
          ySlotUpdatedAt: 0,
          fontSize: DEFAULT_FONT_SIZE,
          customBg: "#FFF4B8",
          customText: "#2F3750",
          imageData: null,
          imageScale: 100,
          images: [],
          fontFamily: null
        };
      }

      function normalizeSlotImageEntry(raw) {
        if (!raw || typeof raw !== "object") return null;
        const dataUrl =
          typeof raw.dataUrl === "string" && raw.dataUrl.startsWith("data:image/") ? raw.dataUrl : null;
        if (!dataUrl) return null;
        return {
          id: typeof raw.id === "string" && raw.id ? raw.id : crypto.randomUUID(),
          sourcePath: typeof raw.sourcePath === "string" ? raw.sourcePath : null,
          dataUrl,
          scale:
            typeof raw.scale === "number" && Number.isFinite(raw.scale)
              ? clamp(Math.round(raw.scale), 50, 150)
              : 100,
          insertedAt: typeof raw.insertedAt === "string" ? raw.insertedAt : new Date().toISOString()
        };
      }

      function migrateLegacySlotImage(slot) {
        if (!slot || typeof slot !== "object") return slot;
        if (!Array.isArray(slot.images)) slot.images = [];
        if (slot.imageData && String(slot.imageData).startsWith("data:image/")) {
          const id = crypto.randomUUID();
          const scale = slot.imageScale ?? 100;
          const imgTag = `<p><img class="peekom-memo-image" data-peekom-id="${id}" src="${slot.imageData}" style="width:${scale}%;max-width:100%;" alt=""></p>`;
          if (!String(slot.memoHtml || "").includes("peekom-memo-image")) {
            slot.memoHtml = (slot.memoHtml || "") + imgTag;
          }
          slot.images.push({
            id,
            sourcePath: null,
            dataUrl: slot.imageData,
            scale,
            insertedAt: new Date().toISOString()
          });
          slot.imageData = null;
          slot.imageScale = 100;
        }
        if (slot.theme === "custom" && !isPremium) {
          slot.theme = "yellow";
        }
        return slot;
      }

      function normalizeSlot(raw, index) {
        const base = defaultSlot(index);
        const slot = {
          label: typeof raw?.label === "string" ? raw.label.slice(0, LABEL_MAX) : "",
          theme: THEME_NAMES.includes(raw?.theme) ? raw.theme : "yellow",
          memoHtml: typeof raw?.memoHtml === "string" ? raw.memoHtml : "",
          ySlot: clamp(
            typeof raw?.ySlot === "number" && Number.isFinite(raw.ySlot)
              ? Math.round(raw.ySlot)
              : index,
            0,
            MAX_Y_SLOTS - 1
          ),
          ySlotUpdatedAt:
            typeof raw?.ySlotUpdatedAt === "number" && Number.isFinite(raw.ySlotUpdatedAt)
              ? raw.ySlotUpdatedAt
              : 0,
          fontSize: clamp(
            typeof raw?.fontSize === "number" && Number.isFinite(raw.fontSize)
              ? Math.round(raw.fontSize)
              : DEFAULT_FONT_SIZE,
            FONT_SIZE_MIN,
            FONT_SIZE_MAX
          ),
          customBg:
            typeof raw?.customBg === "string" && /^#[0-9A-Fa-f]{6}$/.test(raw.customBg)
              ? raw.customBg
              : base.customBg,
          customText:
            typeof raw?.customText === "string" && /^#[0-9A-Fa-f]{6}$/.test(raw.customText)
              ? raw.customText
              : base.customText,
          imageData: null,
          imageScale: 100,
          images: Array.isArray(raw?.images)
            ? raw.images.map(normalizeSlotImageEntry).filter(Boolean)
            : [],
          fontFamily:
            typeof raw?.fontFamily === "string" && raw.fontFamily.trim().length > 0
              ? raw.fontFamily.trim()
              : null
        };
        if (
          typeof raw?.imageData === "string" &&
          raw.imageData.startsWith("data:image/") &&
          !slot.images.length
        ) {
          slot.imageData = raw.imageData;
          slot.imageScale =
            typeof raw?.imageScale === "number" && Number.isFinite(raw.imageScale)
              ? clamp(Math.round(raw.imageScale), 50, 150)
              : 100;
        }
        return migrateLegacySlotImage(slot);
      }

      function createFreshState() {
        return {
          version: 5,
          global: defaultGlobal(),
          enabledCount: 1,
          slots: Array.from({ length: MAX_SLOTS }, (_, i) => defaultSlot(i)),
          order: [0],
          activeSlot: 0
        };
      }

      function normalizeMemoAspectRatio(ratio) {
        return ratio === "1:1" ? "1:1" : "3:4";
      }

      function migrateFromV4(v4) {
        const global = { ...defaultGlobal(), ...v4.global };
        global.memoAspectRatio = normalizeMemoAspectRatio(global.memoAspectRatio);
        return {
          version: 5,
          global,
          enabledCount: clamp(Math.round(v4.enabledCount) || 1, 1, MAX_SLOTS),
          slots: v4.slots.map((sl, i) => normalizeSlot(sl, i)),
          order: normalizeOrder(v4.order, clamp(Math.round(v4.enabledCount) || 1, 1, MAX_SLOTS)),
          activeSlot: clampSlotIndex(v4.activeSlot, clamp(Math.round(v4.enabledCount) || 1, 1, MAX_SLOTS))
        };
      }

      function migrateFromV3(v3) {
        const enabledCount = clamp(Math.round(v3.enabledCount) || 1, 1, MAX_SLOTS);
        const slots = Array.from({ length: MAX_SLOTS }, (_, i) => defaultSlot(i));
        for (let i = 0; i < Math.min(3, MAX_SLOTS); i++) {
          if (v3.slots?.[i]) {
            slots[i] = normalizeSlot(v3.slots[i], i);
          }
        }
        return {
          version: 5,
          global: { ...defaultGlobal(), ...v3.global },
          enabledCount,
          slots,
          order: normalizeOrder(v3.order, enabledCount),
          activeSlot: clampSlotIndex(v3.activeSlot, enabledCount)
        };
      }

      function migrateLegacy() {
        let g = defaultGlobal();
        try {
          const raw = localStorage.getItem(LEGACY_SETTINGS_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            g = { ...g, ...parsed };
          }
        } catch {
          /* ignore */
        }
        const memoHtml = localStorage.getItem(LEGACY_MEMO_KEY) || "";
        const theme = g.theme || "yellow";
        delete g.theme;
        return {
          version: 5,
          global: g,
          enabledCount: 1,
          slots: Array.from({ length: MAX_SLOTS }, (_, i) =>
            i === 0 ? { ...defaultSlot(0), theme, memoHtml } : defaultSlot(i)
          ),
          order: [0],
          activeSlot: 0
        };
      }

      function ensureMinimumOneSlot(state) {
        if (!state.enabledCount || state.enabledCount < 1) {
          state.enabledCount = 1;
          if (!state.slots[0] || typeof state.slots[0].memoHtml !== "string") {
            state.slots[0] = defaultSlot(0);
          }
          state.order = [0];
          state.activeSlot = 0;
        }
        return state;
      }

      function tryParseV5State(raw) {
        if (!raw) return null;
        try {
          const s = JSON.parse(raw);
          if (!s || s.version !== 5 || !Array.isArray(s.slots) || s.slots.length !== MAX_SLOTS) return null;
          s.global = { ...defaultGlobal(), ...s.global };
          delete s.global.imageSize;
          s.global.memoAspectRatio = normalizeMemoAspectRatio(s.global.memoAspectRatio);
          s.slots = s.slots.map((sl, i) => normalizeSlot(sl, i));
          s.enabledCount = clamp(Math.round(s.enabledCount) || 1, 1, MAX_SLOTS);
          s.order = normalizeOrder(s.order, s.enabledCount);
          s.activeSlot = clampSlotIndex(s.activeSlot, s.enabledCount);
          return ensureMinimumOneSlot(s);
        } catch {
          return null;
        }
      }

      async function reloadAppStateFromDisk() {
        try {
          const res = await ipcRenderer.invoke("shared-state:get");
          if (res?.ok) {
            const parsed =
              tryParseV5State(res.raw) || tryParseV5State(res.backup);
            if (parsed) return parsed;
          }
        } catch (err) {
          console.error(err);
        }
        return loadState();
      }

      function loadState() {
        try {
          const parsed = tryParseV5State(localStorage.getItem(STATE_KEY));
          if (parsed) return parsed;
        } catch {
          /* try backup */
        }

        try {
          const parsedBackup = tryParseV5State(localStorage.getItem(STATE_KEY_BACKUP));
          if (parsedBackup) return parsedBackup;
        } catch {
          /* fallthrough */
        }

        try {
          const rawV4 = localStorage.getItem(STATE_KEY_V4);
          if (rawV4) {
            const v4 = JSON.parse(rawV4);
            if (v4 && v4.version === 4 && Array.isArray(v4.slots) && v4.slots.length === MAX_SLOTS) {
              return ensureMinimumOneSlot(migrateFromV4(v4));
            }
          }

          const rawV3 = localStorage.getItem(LEGACY_V3_KEY);
          if (rawV3) {
            const v3 = JSON.parse(rawV3);
            if (v3 && v3.version === 3 && Array.isArray(v3.slots)) {
              return ensureMinimumOneSlot(migrateFromV3(v3));
            }
          }
        } catch {
          /* fallthrough */
        }
        return migrateLegacy();
      }

      function saveState(state) {
        const json = JSON.stringify(state);
        let prev = null;
        try {
          prev = localStorage.getItem(STATE_KEY);
        } catch {
          /* ignore */
        }
        // 메인 상태 저장을 최우선으로 한다. 이미지(base64)로 용량이 커져
        // 저장에 실패하면, 백업본을 비워 공간을 확보한 뒤 다시 시도한다.
        try {
          localStorage.setItem(STATE_KEY, json);
        } catch (err) {
          try {
            localStorage.removeItem(STATE_KEY_BACKUP);
            localStorage.setItem(STATE_KEY, json);
          } catch (err2) {
            console.error("saveState failed (storage quota?)", err2);
            return false;
          }
        }
        // 직전 상태를 백업으로 보관 (여유 공간이 없으면 백업은 포기).
        if (prev) {
          try {
            localStorage.setItem(STATE_KEY_BACKUP, prev);
          } catch {
            try {
              localStorage.removeItem(STATE_KEY_BACKUP);
            } catch {
              /* ignore */
            }
          }
        }
        return true;
      }

      function clamp(n, a, b) {
        return Math.max(a, Math.min(b, n));
      }

      function clampSlotIndex(slot, enabledCount) {
        return clamp(slot, 0, enabledCount - 1);
      }

      function normalizeOrder(order, enabledCount) {
        const base = [];
        for (let i = 0; i < enabledCount; i++) base.push(i);
        if (!Array.isArray(order) || order.length !== enabledCount) return base;
        const set = new Set(order);
        if (set.size !== enabledCount) return base;
        for (let i = 0; i < enabledCount; i++) {
          if (!set.has(i)) return base;
        }
        return order;
      }

      /** @type {ReturnType<typeof createFreshState>} */

      const isMemoHtmlEffectivelyEmpty = PeekomMemoState.isMemoHtmlEffectivelyEmpty;

      function getMemoEditorTargetSlot() {
        if (loadedMemoSlotIndex !== null && Number.isFinite(loadedMemoSlotIndex)) {
          return clampSlotIndex(loadedMemoSlotIndex, appState.enabledCount);
        }
        return appState.activeSlot;
      }

      function flushMemoEditorToActiveSlot() {
        if (!memoEditor || !appState?.slots) return;

        appState.slots[slot].memoHtml = memoEditor.innerHTML;
